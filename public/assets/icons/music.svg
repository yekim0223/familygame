<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 음표 (밝은 흰색/노랑) -->
  <!-- 음표 1 (왼쪽) -->
  <rect x="3"  y="2" width="2" height="7" fill="#FFFFFF"/>
  <rect x="3"  y="2" width="6" height="2" fill="#FFFFFF"/>
  <rect x="7"  y="2" width="2" height="5" fill="#FFFFFF"/>
  <!-- 음표 동그라미 1 -->
  <rect x="2"  y="8" width="3" height="3" fill="#FFEE00"/>
  <rect x="1"  y="9" width="4" height="2" fill="#FFEE00"/>
  <rect x="2"  y="9" width="3" height="1" fill="#FFFF88"/>
  <!-- 음표 동그라미 2 -->
  <rect x="6"  y="6" width="3" height="3" fill="#FFEE00"/>
  <rect x="5"  y="7" width="4" height="2" fill="#FFEE00"/>
  <rect x="6"  y="7" width="3" height="1" fill="#FFFF88"/>
  <!-- 꾸밈음표 (오른쪽) -->
  <rect x="11" y="4" width="2" height="5" fill="#FFFFFF"/>
  <rect x="11" y="4" width="4" height="2" fill="#FFFFFF"/>
  <!-- 동그라미 3 -->
  <rect x="10" y="8" width="3" height="3" fill="#FFEE00"/>
  <rect x="9"  y="9" width="4" height="2" fill="#FFEE00"/>
  <rect x="10" y="9" width="3" height="1" fill="#FFFF88"/>
</svg>
