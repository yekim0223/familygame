<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 지붕 (밝은 빨강) -->
  <rect x="7"  y="1" width="2" height="1" fill="#FF3311"/>
  <rect x="6"  y="2" width="4" height="1" fill="#FF4422"/>
  <rect x="5"  y="3" width="6" height="1" fill="#FF5533"/>
  <rect x="4"  y="4" width="8" height="1" fill="#FF6644"/>
  <rect x="3"  y="5" width="10" height="1" fill="#FF7755"/>
  <!-- 지붕 하이라이트 -->
  <rect x="7"  y="1" width="1" height="1" fill="#FFBB99"/>
  <rect x="5"  y="3" width="1" height="1" fill="#FF9977"/>
  <!-- 굴뚝 -->
  <rect x="10" y="2" width="2" height="4" fill="#BBBBBB"/>
  <rect x="10" y="2" width="2" height="1" fill="#DDDDDD"/>
  <!-- 벽 (밝은 황금) -->
  <rect x="3"  y="6" width="10" height="8" fill="#FFD700"/>
  <rect x="4"  y="6" width="8"  height="1" fill="#FFE84D"/>
  <!-- 창문 (밝은 하늘색) -->
  <rect x="4"  y="7" width="3" height="3" fill="#44DDFF"/>
  <rect x="9"  y="7" width="3" height="3" fill="#44DDFF"/>
  <rect x="4"  y="7" width="1" height="3" fill="#99EEFF"/>
  <rect x="9"  y="7" width="1" height="3" fill="#99EEFF"/>
  <!-- 창문 틀 -->
  <rect x="4"  y="7" width="3" height="1" fill="#99EEFF"/>
  <rect x="9"  y="7" width="3" height="1" fill="#99EEFF"/>
  <!-- 문 (갈색) -->
  <rect x="6"  y="10" width="4" height="4" fill="#CC6622"/>
  <rect x="6"  y="10" width="4" height="1" fill="#EE8844"/>
  <!-- 문손잡이 -->
  <rect x="9"  y="12" width="1" height="1" fill="#FFD700"/>
</svg>
