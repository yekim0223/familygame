<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 해골 (위험 — 빨간/다크) -->
  <!-- 두개골 -->
  <rect x="2"  y="1"  width="12" height="9"  fill="#CC2222"/>
  <rect x="1"  y="2"  width="14" height="7"  fill="#CC2222"/>
  <rect x="2"  y="2"  width="12" height="7"  fill="#DD3333"/>
  <!-- 눈 구멍 (흰색) -->
  <rect x="3"  y="4"  width="4"  height="4"  fill="#FFFFFF"/>
  <rect x="9"  y="4"  width="4"  height="4"  fill="#FFFFFF"/>
  <!-- 눈동자 (검정) -->
  <rect x="4"  y="5"  width="2"  height="2"  fill="#1A0000"/>
  <rect x="10" y="5"  width="2"  height="2"  fill="#1A0000"/>
  <!-- 코 구멍 -->
  <rect x="7"  y="6"  width="2"  height="2"  fill="#AA1111"/>
  <!-- 턱 -->
  <rect x="2"  y="10" width="12" height="3"  fill="#CC2222"/>
  <rect x="3"  y="11" width="10" height="2"  fill="#DD3333"/>
  <!-- 이빨 -->
  <rect x="3"  y="12" width="2"  height="3"  fill="#FFFFFF"/>
  <rect x="6"  y="12" width="2"  height="3"  fill="#FFFFFF"/>
  <rect x="9"  y="12" width="2"  height="3"  fill="#FFFFFF"/>
  <rect x="12" y="12" width="1"  height="3"  fill="#FFFFFF"/>
  <!-- 두개골 하이라이트 -->
  <rect x="3"  y="2"  width="4"  height="2"  fill="#FF5555"/>
  <rect x="11" y="2"  width="2"  height="2"  fill="#FF5555"/>
</svg>
