<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 별 (칭찬 스티커 — 황금) -->
  <!-- 별 상단 뾰족 -->
  <rect x="7"  y="0"  width="2"  height="3"  fill="#FFD700"/>
  <!-- 좌상 뾰족 -->
  <rect x="1"  y="3"  width="4"  height="2"  fill="#FFD700"/>
  <rect x="2"  y="5"  width="3"  height="2"  fill="#FFD700"/>
  <!-- 우상 뾰족 -->
  <rect x="11" y="3"  width="4"  height="2"  fill="#FFD700"/>
  <rect x="11" y="5"  width="3"  height="2"  fill="#FFD700"/>
  <!-- 가운데 몸통 -->
  <rect x="3"  y="5"  width="10" height="4"  fill="#FFD700"/>
  <rect x="4"  y="4"  width="8"  height="6"  fill="#FFD700"/>
  <rect x="5"  y="3"  width="6"  height="8"  fill="#FFD700"/>
  <!-- 좌하 뾰족 -->
  <rect x="1"  y="10" width="4"  height="2"  fill="#FFD700"/>
  <rect x="2"  y="8"  width="3"  height="2"  fill="#FFD700"/>
  <!-- 우하 뾰족 -->
  <rect x="11" y="10" width="4"  height="2"  fill="#FFD700"/>
  <rect x="11" y="8"  width="3"  height="2"  fill="#FFD700"/>
  <!-- 하단 뾰족 -->
  <rect x="7"  y="12" width="2"  height="3"  fill="#FFD700"/>
  <!-- 하이라이트 -->
  <rect x="6"  y="2"  width="2"  height="2"  fill="#FFEE88"/>
  <rect x="5"  y="5"  width="3"  height="2"  fill="#FFE84D"/>
  <!-- 그림자 -->
  <rect x="8"  y="6"  width="3"  height="2"  fill="#CC9900"/>
  <rect x="9"  y="8"  width="2"  height="2"  fill="#CC9900"/>
</svg>
