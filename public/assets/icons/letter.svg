<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 편지 봉투 (분홍/하트) -->
  <!-- 봉투 몸통 -->
  <rect x="1"  y="3"  width="14" height="10" fill="#E8A0BF"/>
  <rect x="2"  y="4"  width="12" height="8"  fill="#F0B8CC"/>
  <!-- 봉투 뚜껑 (삼각) -->
  <rect x="1"  y="3"  width="14" height="1"  fill="#CC6699"/>
  <rect x="2"  y="4"  width="12" height="1"  fill="#DD88AA"/>
  <rect x="3"  y="5"  width="10" height="1"  fill="#DD88AA"/>
  <rect x="4"  y="6"  width="8"  height="1"  fill="#CC6699"/>
  <rect x="5"  y="7"  width="6"  height="1"  fill="#CC6699"/>
  <rect x="6"  y="8"  width="4"  height="1"  fill="#BB5588"/>
  <rect x="7"  y="9"  width="2"  height="1"  fill="#BB5588"/>
  <!-- 봉투 하단 선 -->
  <rect x="1"  y="12" width="14" height="1"  fill="#CC6699"/>
  <!-- 하트 인장 -->
  <rect x="6"  y="9"  width="4"  height="3"  fill="#FF3366"/>
  <rect x="5"  y="10" width="6"  height="2"  fill="#FF3366"/>
  <rect x="6"  y="11" width="1"  height="1"  fill="#FF88AA"/>
  <!-- 테두리 -->
  <rect x="0"  y="3"  width="1"  height="10" fill="#CC6699"/>
  <rect x="15" y="3"  width="1"  height="10" fill="#CC6699"/>
</svg>
