<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 달력 프레임 (밝은 파랑) -->
  <rect x="1"  y="3" width="14" height="12" fill="#2255CC"/>
  <!-- 헤더 (밝은 빨강) -->
  <rect x="1"  y="3" width="14" height="3" fill="#EE3333"/>
  <rect x="1"  y="3" width="14" height="1" fill="#FF6655"/>
  <!-- 링 -->
  <rect x="4"  y="1" width="2" height="4" fill="#CCCCCC"/>
  <rect x="4"  y="2" width="2" height="2" fill="#FFFFFF"/>
  <rect x="10" y="1" width="2" height="4" fill="#CCCCCC"/>
  <rect x="10" y="2" width="2" height="2" fill="#FFFFFF"/>
  <!-- 그리드 구분선 (밝은 선) -->
  <rect x="1"  y="9"  width="14" height="1" fill="#1133AA"/>
  <rect x="1"  y="12" width="14" height="1" fill="#1133AA"/>
  <rect x="5"  y="6"  width="1"  height="9" fill="#1133AA"/>
  <rect x="9"  y="6"  width="1"  height="9" fill="#1133AA"/>
  <rect x="13" y="6"  width="1"  height="9" fill="#1133AA"/>
  <!-- 날짜 점 (밝은 흰색) -->
  <rect x="2"  y="7"  width="2" height="1" fill="#AABBFF"/>
  <rect x="6"  y="7"  width="2" height="1" fill="#AABBFF"/>
  <rect x="10" y="7"  width="2" height="1" fill="#AABBFF"/>
  <rect x="2"  y="10" width="2" height="1" fill="#AABBFF"/>
  <rect x="6"  y="10" width="2" height="1" fill="#AABBFF"/>
  <!-- 오늘 날짜 강조 (밝은 노랑) -->
  <rect x="10" y="10" width="2" height="2" fill="#FFEE00"/>
  <rect x="10" y="10" width="2" height="1" fill="#FFFF88"/>
  <rect x="2"  y="13" width="2" height="1" fill="#AABBFF"/>
</svg>
