<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated">
  <!-- 나무 검 — 직선 날, -25도 회전 (몸 반대방향) -->
  <g transform="rotate(-25, 16, 16)">
    <!-- 검날 (밝은 회색/은색) -->
    <rect x="14" y="1"  width="4"  height="20" fill="#C8C8D0"/>
    <rect x="15" y="1"  width="2"  height="18" fill="#E0E0E8"/>
    <!-- 날 끝 -->
    <rect x="14" y="0"  width="4"  height="3"  fill="#E8E8F0"/>
    <rect x="15" y="0"  width="2"  height="2"  fill="#FFFFFF"/>
    <!-- 날 하이라이트 -->
    <rect x="14" y="3"  width="1"  height="14" fill="#D8D8E0"/>
    <!-- 가드 (황금) -->
    <rect x="8"  y="20" width="16" height="3"  fill="#FFD700"/>
    <rect x="8"  y="20" width="16" height="1"  fill="#FFEE88"/>
    <rect x="6"  y="20" width="4"  height="4"  fill="#C8A000"/>
    <rect x="22" y="20" width="4"  height="4"  fill="#C8A000"/>
    <rect x="6"  y="21" width="2"  height="2"  fill="#FFD700"/>
    <rect x="24" y="21" width="2"  height="2"  fill="#FFD700"/>
    <!-- 손잡이 (나무) -->
    <rect x="13" y="23" width="6"  height="7"  fill="#8B5A1A"/>
    <rect x="14" y="23" width="1"  height="6"  fill="#C8A060"/>
    <rect x="13" y="26" width="6"  height="1"  fill="#A06A2A"/>
    <!-- 끝 장식 (황금) -->
    <rect x="12" y="30" width="8"  height="2"  fill="#FFD700"/>
    <rect x="14" y="30" width="4"  height="1"  fill="#FFEE88"/>
  </g>
</svg>
