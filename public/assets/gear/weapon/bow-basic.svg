<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- bow curve (wood) -->
  <rect x="2"  y="1"  width="3" height="2" fill="#8B5A1A"/>
  <rect x="1"  y="3"  width="2" height="4" fill="#7A4A10"/>
  <rect x="2"  y="7"  width="2" height="3" fill="#8B5A1A"/>
  <rect x="3"  y="10" width="2" height="3" fill="#7A4A10"/>
  <rect x="4"  y="13" width="3" height="2" fill="#8B5A1A"/>
  <!-- bow outer edge -->
  <rect x="3"  y="0"  width="3" height="2" fill="#A07030"/>
  <rect x="2"  y="2"  width="2" height="3" fill="#A07030"/>
  <rect x="3"  y="5"  width="2" height="4" fill="#A07030"/>
  <rect x="4"  y="9"  width="2" height="3" fill="#A07030"/>
  <rect x="5"  y="12" width="3" height="2" fill="#A07030"/>
  <!-- string -->
  <rect x="5"  y="1"  width="1" height="14" fill="#DDDDCC"/>
  <!-- grip (middle) -->
  <rect x="2"  y="6"  width="4" height="4" fill="#5A3A10"/>
  <rect x="3"  y="7"  width="2" height="2" fill="#C8A060"/>
  <!-- arrow -->
  <rect x="6"  y="7"  width="9" height="1" fill="#A07030"/>
  <rect x="14" y="6"  width="2" height="3" fill="#FF8080"/>
  <rect x="15" y="6"  width="1" height="1" fill="#DD4444"/>
  <rect x="15" y="8"  width="1" height="1" fill="#DD4444"/>
  <!-- feathers -->
  <rect x="6"  y="6"  width="2" height="1" fill="#FFFFFF"/>
  <rect x="6"  y="8"  width="2" height="1" fill="#FFFFFF"/>
</svg>
