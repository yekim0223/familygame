<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated">
  <!-- 용창 (드래곤 랜스) -->
  <!-- 창날 (붉은 용 비늘) -->
  <rect x="14" y="0"  width="4"  height="2"  fill="#FFFFFF"/>
  <rect x="13" y="2"  width="6"  height="2"  fill="#FF8800"/>
  <rect x="12" y="4"  width="8"  height="2"  fill="#EE6600"/>
  <rect x="13" y="6"  width="6"  height="2"  fill="#DD5500"/>
  <rect x="14" y="8"  width="4"  height="2"  fill="#CC4400"/>
  <!-- 창 보조 날 (양쪽) -->
  <rect x="8"  y="6"  width="6"  height="3"  fill="#FF4400"/>
  <rect x="18" y="6"  width="6"  height="3"  fill="#FF4400"/>
  <rect x="8"  y="7"  width="4"  height="1"  fill="#FF7744"/>
  <rect x="20" y="7"  width="4"  height="1"  fill="#FF7744"/>
  <!-- 창 몸통 -->
  <rect x="15" y="10" width="2"  height="18" fill="#8B5E3C"/>
  <rect x="15" y="11" width="2"  height="4"  fill="#AA7A55"/>
  <rect x="15" y="18" width="2"  height="4"  fill="#AA7A55"/>
  <!-- 금속 링 -->
  <rect x="14" y="14" width="4"  height="2"  fill="#FFD700"/>
  <rect x="14" y="22" width="4"  height="2"  fill="#FFD700"/>
  <!-- 끝 마개 -->
  <rect x="14" y="28" width="4"  height="4"  fill="#CC4400"/>
  <rect x="15" y="28" width="2"  height="4"  fill="#FF6622"/>
</svg>
