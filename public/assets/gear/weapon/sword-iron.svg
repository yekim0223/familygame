<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated">
  <!-- 철 검 — 직선 넓은 날, -25도 회전 (몸 반대방향) -->
  <g transform="rotate(-25, 16, 16)">
    <!-- 철 검날 (넓고 무거움) -->
    <rect x="13" y="1"  width="6"  height="20" fill="#A0A8B8"/>
    <rect x="14" y="1"  width="4"  height="18" fill="#B0B8C8"/>
    <rect x="15" y="1"  width="2"  height="16" fill="#C8D0E0"/>
    <!-- 핏줄 홈 -->
    <rect x="15" y="2"  width="1"  height="14" fill="#707888"/>
    <!-- 날 끝 -->
    <rect x="13" y="0"  width="6"  height="3"  fill="#C0C8D8"/>
    <rect x="15" y="0"  width="2"  height="2"  fill="#E0E8F0"/>
    <!-- 가드 (철) -->
    <rect x="8"  y="20" width="16" height="3"  fill="#808090"/>
    <rect x="8"  y="20" width="16" height="1"  fill="#9090A0"/>
    <rect x="6"  y="20" width="4"  height="4"  fill="#606070"/>
    <rect x="22" y="20" width="4"  height="4"  fill="#606070"/>
    <rect x="6"  y="21" width="2"  height="2"  fill="#8080A0"/>
    <rect x="24" y="21" width="2"  height="2"  fill="#8080A0"/>
    <!-- 손잡이 (가죽 감기) -->
    <rect x="13" y="23" width="6"  height="7"  fill="#5A3A18"/>
    <rect x="13" y="24" width="6"  height="1"  fill="#C8A060"/>
    <rect x="13" y="26" width="6"  height="1"  fill="#C8A060"/>
    <rect x="13" y="28" width="6"  height="1"  fill="#C8A060"/>
    <!-- 끝 장식 (철) -->
    <rect x="12" y="30" width="8"  height="2"  fill="#707080"/>
    <rect x="14" y="30" width="4"  height="1"  fill="#9090A0"/>
  </g>
</svg>
