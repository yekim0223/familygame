<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- orb (top) -->
  <rect x="5"  y="0" width="6" height="6" fill="#A040FF"/>
  <rect x="4"  y="1" width="8" height="4" fill="#B060FF"/>
  <rect x="5"  y="0" width="6" height="1" fill="#C080FF"/>
  <!-- orb glow -->
  <rect x="6"  y="1" width="2" height="2" fill="#FFFFFF"/>
  <rect x="8"  y="2" width="2" height="2" fill="#E0C0FF"/>
  <!-- orb sparkles -->
  <rect x="3"  y="0" width="1" height="1" fill="#FF80FF"/>
  <rect x="12" y="1" width="1" height="1" fill="#FF80FF"/>
  <rect x="4"  y="5" width="1" height="1" fill="#C0A0FF"/>
  <!-- staff shaft -->
  <rect x="7"  y="6" width="2" height="9" fill="#8B5A1A"/>
  <rect x="8"  y="6" width="1" height="9" fill="#C8A060"/>
  <!-- magic runes -->
  <rect x="6"  y="8" width="1" height="1" fill="#C080FF"/>
  <rect x="9"  y="10" width="1" height="1" fill="#C080FF"/>
  <rect x="6"  y="12" width="1" height="1" fill="#C080FF"/>
  <!-- base -->
  <rect x="6"  y="15" width="4" height="1" fill="#5A3A0A"/>
  <rect x="7"  y="14" width="2" height="2" fill="#FFD700"/>
</svg>
