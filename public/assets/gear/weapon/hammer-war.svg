<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated">
  <!-- 전쟁 해머 -->
  <!-- 해머 헤드 (철) -->
  <rect x="4"  y="2"  width="20" height="14" fill="#8898A8"/>
  <rect x="4"  y="2"  width="20" height="2"  fill="#AABBCC"/>
  <rect x="6"  y="4"  width="16" height="10" fill="#9AAABB"/>
