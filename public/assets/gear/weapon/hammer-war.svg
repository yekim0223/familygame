  <rect x="14" y="23" width="4"  height="2"  fill="#AA7A55"/>
  <!-- 끝 마개 -->
  <rect x="13" y="29" width="6"  height="3"  fill="#FFD700"/>
  <rect x="14" y="29" width="4"  height="1"  fill="#FFEE66"/>
</svg>
