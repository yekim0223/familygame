<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated">
  <!-- 수정검, -25도 회전 (몸 반대방향) -->
  <g transform="rotate(-25, 16, 16)">
    <!-- 검날 (수정/하늘색) -->
    <rect x="14" y="0"  width="4"  height="20" fill="#88DDFF"/>
    <rect x="15" y="0"  width="2"  height="20" fill="#AAEEFF"/>
    <!-- 칼날 끝 -->
    <rect x="14" y="0"  width="4"  height="3"  fill="#DDFFFF"/>
    <rect x="15" y="0"  width="2"  height="2"  fill="#FFFFFF"/>
    <!-- 수정 패싯 (빛 굴절) -->
    <rect x="14" y="5"  width="2"  height="3"  fill="#44CCFF"/>
    <rect x="16" y="9"  width="2"  height="3"  fill="#44CCFF"/>
    <rect x="14" y="13" width="2"  height="3"  fill="#44CCFF"/>
    <!-- 날 하이라이트 -->
    <rect x="14" y="2"  width="1"  height="15" fill="#DDFEFF"/>
    <!-- 가드 (수정 날개) -->
    <rect x="8"  y="19" width="16" height="3"  fill="#88CCFF"/>
    <rect x="8"  y="19" width="16" height="1"  fill="#CCEEFF"/>
    <rect x="6"  y="20" width="4"  height="4"  fill="#66BBFF"/>
    <rect x="22" y="20" width="4"  height="4"  fill="#66BBFF"/>
    <rect x="6"  y="21" width="2"  height="2"  fill="#AADDFF"/>
    <rect x="24" y="21" width="2"  height="2"  fill="#AADDFF"/>
    <!-- 손잡이 -->
    <rect x="13" y="22" width="6"  height="8"  fill="#335577"/>
    <rect x="13" y="23" width="6"  height="2"  fill="#446688"/>
    <rect x="13" y="27" width="6"  height="2"  fill="#446688"/>
    <!-- 끝 수정 보석 -->
    <rect x="12" y="29" width="8"  height="3"  fill="#88CCFF"/>
    <rect x="14" y="29" width="4"  height="3"  fill="#DDFEFF"/>
  </g>
</svg>
