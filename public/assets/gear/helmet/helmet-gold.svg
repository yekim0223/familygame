<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- gold crown/helm -->
  <!-- crown peaks -->
  <rect x="4"  y="0" width="2" height="3" fill="#FFD700"/>
  <rect x="7"  y="0" width="2" height="4" fill="#FFD700"/>
  <rect x="10" y="0" width="2" height="3" fill="#FFD700"/>
  <!-- crown gems -->
  <rect x="5"  y="0" width="1" height="1" fill="#FF4488"/>
  <rect x="7"  y="0" width="2" height="1" fill="#4488FF"/>
  <rect x="11" y="0" width="1" height="1" fill="#44CC44"/>
  <!-- dome -->
  <rect x="3"  y="3" width="10" height="7" fill="#E8C040"/>
  <rect x="2"  y="5" width="12" height="5" fill="#E8C040"/>
  <rect x="4"  y="2" width="8"  height="3" fill="#F0D050"/>
  <!-- dome highlight -->
  <rect x="5"  y="3" width="4"  height="1" fill="#FFE880"/>
  <rect x="6"  y="2" width="2"  height="1" fill="#FFFF88"/>
  <!-- visor (narrow slit) -->
  <rect x="5"  y="8" width="6" height="1" fill="#2A1808"/>
  <!-- brim (gold) -->
  <rect x="1"  y="9" width="14" height="3" fill="#C8A000"/>
  <rect x="2"  y="9" width="12" height="1" fill="#E8C020"/>
  <!-- decorative band -->
  <rect x="3"  y="6" width="10" height="1" fill="#FFD700"/>
  <rect x="4"  y="6" width="2"  height="1" fill="#FF4488"/>
  <rect x="10" y="6" width="2"  height="1" fill="#4488FF"/>
</svg>
