<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated">
  <!-- 마법 투구 (파란 마법) -->
  <!-- 투구 본체 -->
  <rect x="4"  y="10" width="24" height="14" fill="#1144AA"/>
  <rect x="6"  y="8"  width="20" height="6"  fill="#1144AA"/>
  <rect x="8"  y="6"  width="16" height="4"  fill="#2255BB"/>
  <rect x="10" y="4"  width="12" height="4"  fill="#2255BB"/>
  <rect x="12" y="2"  width="8"  height="4"  fill="#3366CC"/>
  <!-- 투구 상단 장식 (보석) -->
  <rect x="14" y="0"  width="4"  height="3"  fill="#00DDFF"/>
  <rect x="15" y="0"  width="2"  height="3"  fill="#88EEFF"/>
  <!-- 하이라이트 -->
  <rect x="6"  y="9"  width="4"  height="6"  fill="#3366CC"/>
  <rect x="8"  y="7"  width="4"  height="2"  fill="#4477DD"/>
  <!-- 눈 슬릿 -->
  <rect x="5"  y="16" width="22" height="3"  fill="#000820"/>
  <rect x="6"  y="17" width="8"  height="2"  fill="#001840"/>
  <rect x="18" y="17" width="8"  height="2"  fill="#001840"/>
  <!-- 마법 룬 (금) -->
  <rect x="10" y="12" width="4"  height="2"  fill="#00AAFF"/>
  <rect x="18" y="12" width="4"  height="2"  fill="#00AAFF"/>
  <!-- 투구 테두리 -->
  <rect x="4"  y="23" width="24" height="3"  fill="#0033AA"/>
  <rect x="4"  y="23" width="24" height="1"  fill="#2266DD"/>
  <!-- 볼 가드 -->
  <rect x="2"  y="18" width="4"  height="8"  fill="#0033AA"/>
  <rect x="26" y="18" width="4"  height="8"  fill="#0033AA"/>
</svg>
