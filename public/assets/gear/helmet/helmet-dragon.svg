  <rect x="7"  y="17" width="4"  height="2"  fill="#FF0000"/>
  <rect x="21" y="17" width="4"  height="2"  fill="#FF0000"/>
  <!-- 테두리 -->
  <rect x="4"  y="23" width="24" height="3"  fill="#881100"/>
