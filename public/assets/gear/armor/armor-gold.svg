<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated">
  <!-- 황금 갑옷 -->
  <!-- 어깨 판 (크고 화려) -->
  <rect x="0"  y="3"  width="11" height="9"  fill="#FFD700"/>
  <rect x="21" y="3"  width="11" height="9"  fill="#FFD700"/>
  <rect x="0"  y="3"  width="11" height="2"  fill="#FFEE88"/>
  <rect x="21" y="3"  width="11" height="2"  fill="#FFEE88"/>
  <rect x="0"  y="4"  width="4"  height="6"  fill="#FFFF99"/>
  <rect x="28" y="4"  width="4"  height="6"  fill="#FFFF99"/>
  <!-- 어깨 장식 -->
  <rect x="3"  y="5"  width="4"  height="5"  fill="#EEB800"/>
  <rect x="25" y="5"  width="4"  height="5"  fill="#EEB800"/>
  <!-- 흉갑 (황금) -->
  <rect x="6"  y="9"  width="20" height="16" fill="#FFD700"/>
  <rect x="4"  y="11" width="24" height="12" fill="#FFD700"/>
  <!-- 하이라이트 -->
  <rect x="6"  y="10" width="5"  height="10" fill="#FFEE88"/>
  <rect x="9"  y="9"  width="7"  height="2"  fill="#FFEE88"/>
  <!-- 중앙 문장 (태양 문양) -->
  <rect x="14" y="12" width="4"  height="8"  fill="#EEB800"/>
  <rect x="12" y="14" width="8"  height="4"  fill="#EEB800"/>
  <rect x="14" y="13" width="4"  height="1"  fill="#FFFF44"/>
  <rect x="15" y="14" width="2"  height="4"  fill="#FFFF44"/>
  <!-- 리벳 (빛나는) -->
  <rect x="8"  y="12" width="2"  height="2"  fill="#FFFFFF"/>
  <rect x="22" y="12" width="2"  height="2"  fill="#FFFFFF"/>
  <rect x="8"  y="20" width="2"  height="2"  fill="#FFFFFF"/>
  <rect x="22" y="20" width="2"  height="2"  fill="#FFFFFF"/>
  <!-- 하단 -->
  <rect x="6"  y="24" width="20" height="4"  fill="#EEB800"/>
  <rect x="6"  y="24" width="20" height="1"  fill="#FFD700"/>
</svg>
