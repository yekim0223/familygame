  <rect x="0"  y="5" width="8"  height="6" fill="#110022"/>
  <rect x="24" y="5" width="8"  height="6" fill="#110022"/>
  <rect x="4"  y="2" width="6"  height="4" fill="#220033"/>
  <rect x="22" y="10" width="6" height="4" fill="#220033"/>
  <!-- 나선 팔 세부 -->
  <rect x="2"  y="6" width="6" height="2" fill="#331155"/>
  <rect x="3"  y="5" width="4" height="2" fill="#442266"/>
  <rect x="24" y="8" width="6" height="2" fill="#331155"/>
