  <rect x="15" y="5" width="2"  height="6" fill="#FFFFFF"/>
  <rect x="14" y="7" width="4"  height="2" fill="#FFFFFF"/>
  <!-- 별 무리 -->
  <rect x="10" y="4" width="1" height="1" fill="#FFDDAA"/>
  <rect x="12" y="3" width="1" height="1" fill="#FFDDAA"/>
  <rect x="20" y="12" width="1" height="1" fill="#FFDDAA"/>
  <rect x="18" y="11" width="1" height="1" fill="#EEBBAA"/>
  <rect x="9"  y="9" width="1" height="1" fill="#FFDDAA"/>
  <rect x="22" y="4" width="1" height="1" fill="#FFDDAA"/>
