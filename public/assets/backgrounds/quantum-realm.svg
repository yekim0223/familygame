<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 16" style="image-rendering:pixelated">
  <rect x="0" y="0" width="32" height="16" fill="#001020"/>
  <!-- 확률 파동 (가로 파형) -->
  <rect x="0"  y="3" width="32" height="1" fill="#003344"/>
  <rect x="0"  y="7" width="32" height="1" fill="#004455"/>
  <rect x="0"  y="11" width="32" height="1" fill="#003344"/>
  <!-- 파동 굴곡 (에너지 레벨) -->
  <rect x="4"  y="2" width="4" height="3" fill="#005566"/>
  <rect x="12" y="4" width="4" height="3" fill="#006677"/>
  <rect x="20" y="2" width="4" height="3" fill="#005566"/>
  <rect x="28" y="4" width="4" height="3" fill="#006677"/>
  <!-- 양자 입자들 (이중 슬릿 패턴) -->
  <rect x="2"  y="6" width="1" height="1" fill="#00FFAA"/>
  <rect x="6"  y="4" width="1" height="1" fill="#00DDFF"/>
  <rect x="10" y="8" width="1" height="1" fill="#00FFAA"/>
  <rect x="14" y="5" width="1" height="1" fill="#AAFFFF"/>
  <rect x="18" y="9" width="1" height="1" fill="#00FFAA"/>
  <rect x="22" y="6" width="1" height="1" fill="#00DDFF"/>
  <rect x="26" y="8" width="1" height="1" fill="#00FFAA"/>
  <rect x="30" y="5" width="1" height="1" fill="#AAFFFF"/>
  <!-- 간섭 패턴 (밝은 부분) -->
  <rect x="1"  y="7" width="2" height="2" fill="#0055AA"/>
  <rect x="9"  y="5" width="2" height="2" fill="#0066BB"/>
  <rect x="17" y="9" width="2" height="2" fill="#0055AA"/>
  <rect x="25" y="5" width="2" height="2" fill="#0066BB"/>
  <!-- 양자 얽힘 선 -->
  <rect x="5"  y="7" width="22" height="1" fill="#002233"/>
  <rect x="0"  y="8" width="32" height="1" fill="#001122"/>
