<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 16" style="image-rendering:pixelated">
  <rect x="0" y="0" width="32" height="16" fill="#000820"/>
  <!-- 천상의 바다 (깊은 파란빛) -->
  <rect x="0"  y="6" width="32" height="10" fill="#001040"/>
  <rect x="0"  y="7" width="32" height="9"  fill="#002060"/>
  <rect x="0"  y="8" width="32" height="8"  fill="#003070"/>
  <!-- 발광 파도 -->
  <rect x="0"  y="6" width="32" height="2" fill="#004488"/>
  <rect x="2"  y="5" width="4"  height="2" fill="#0055AA"/>
  <rect x="10" y="5" width="6"  height="2" fill="#0066BB"/>
  <rect x="20" y="5" width="5"  height="2" fill="#0055AA"/>
  <rect x="28" y="5" width="4"  height="2" fill="#004499"/>
  <!-- 빛나는 파도 능선 -->
  <rect x="0"  y="6" width="32" height="1" fill="#0088CC"/>
  <rect x="3"  y="5" width="3"  height="1" fill="#00AADD"/>
  <rect x="11" y="5" width="4"  height="1" fill="#00BBEE"/>
  <rect x="21" y="5" width="3"  height="1" fill="#00AADD"/>
  <!-- 하늘 (별) -->
  <rect x="2"  y="1" width="1" height="1" fill="#AACCFF"/>
  <rect x="9"  y="2" width="1" height="1" fill="#FFFFFF"/>
  <rect x="15" y="1" width="1" height="1" fill="#AACCFF"/>
  <rect x="22" y="3" width="1" height="1" fill="#FFFFFF"/>
  <rect x="29" y="1" width="1" height="1" fill="#AACCFF"/>
  <rect x="5"  y="4" width="1" height="1" fill="#8899FF"/>
  <rect x="27" y="3" width="1" height="1" fill="#8899FF"/>
  <!-- 천상의 해파리 (발광) -->
  <rect x="5"  y="9"  width="4" height="3" fill="#004488"/>
  <rect x="6"  y="8"  width="2" height="2" fill="#0066AA"/>
  <rect x="6"  y="11" width="1" height="2" fill="#0044AA"/>
  <rect x="7"  y="11" width="1" height="3" fill="#0033AA"/>
  <!-- 별 빛 수면 반사 -->
  <rect x="9"  y="7" width="1" height="1" fill="#AADDFF"/>
  <rect x="22" y="8" width="1" height="1" fill="#AADDFF"/>
  <rect x="15" y="7" width="2" height="1" fill="#88BBFF"/>
  <!-- 심해 발광 생물 -->
  <rect x="20" y="12" width="3" height="2" fill="#001E88"/>
  <rect x="21" y="11" width="1" height="2" fill="#0033BB"/>
</svg>
