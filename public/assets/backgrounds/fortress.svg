<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 16" style="image-rendering:pixelated">
  <!-- 어두운 하늘 -->
  <rect x="0" y="0" width="32" height="8" fill="#2A2A3A"/>
  <!-- 달 -->
  <rect x="27" y="1" width="3" height="3" fill="#EEEECC"/>
  <rect x="28" y="0" width="2" height="4" fill="#FFFFFF"/>
  <!-- 요새 성벽 -->
  <rect x="0" y="6" width="32" height="10" fill="#5A5050"/>
  <rect x="0" y="6" width="32" height="2" fill="#6A6060"/>
  <!-- 성벽 흉벽 -->
  <rect x="2"  y="4" width="3" height="3" fill="#5A5050"/>
  <rect x="8"  y="4" width="3" height="3" fill="#5A5050"/>
  <rect x="14" y="4" width="3" height="3" fill="#5A5050"/>
  <rect x="20" y="4" width="3" height="3" fill="#5A5050"/>
  <rect x="26" y="4" width="3" height="3" fill="#5A5050"/>
  <!-- 중앙 탑 -->
  <rect x="12" y="0" width="8" height="7" fill="#4A4040"/>
  <rect x="13" y="0" width="6" height="7" fill="#5A5050"/>
  <!-- 탑 흉벽 -->
  <rect x="12" y="0" width="2" height="2" fill="#4A4040"/>
  <rect x="16" y="0" width="2" height="2" fill="#4A4040"/>
  <rect x="18" y="0" width="2" height="2" fill="#4A4040"/>
  <!-- 깃발 -->
  <rect x="15" y="0" width="1" height="3" fill="#8A6030"/>
  <rect x="16" y="0" width="3" height="2" fill="#CC0020"/>
  <!-- 창문 (불 빛) -->
  <rect x="14" y="3" width="2" height="2" fill="#FF8800"/>
  <rect x="18" y="3" width="2" height="2" fill="#FF8800"/>
  <!-- 정문 -->
  <rect x="14" y="9" width="4" height="7" fill="#1A1010"/>
  <rect x="14" y="9" width="4" height="2" fill="#2A1818"/>
  <!-- 돌바닥 무늬 -->
  <rect x="4"  y="9" width="4" height="1" fill="#6A6060"/>
  <rect x="22" y="10" width="4" height="1" fill="#6A6060"/>
</svg>
