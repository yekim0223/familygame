  <rect x="16" y="11" width="2" height="2" fill="#CC66FF"/>
  <rect x="15" y="13" width="2" height="3" fill="#BB44FF"/>
  <!-- 틈 내부 빛 -->
  <rect x="15" y="1" width="1" height="2" fill="#FFFFFF"/>
