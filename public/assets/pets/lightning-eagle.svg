<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 번개 후광 -->
  <rect x="0" y="3" width="2" height="2" fill="#FFD700"/>
  <rect x="14" y="3" width="2" height="2" fill="#FFD700"/>
  <rect x="1" y="1" width="1" height="4" fill="#FFEE00"/>
  <rect x="14" y="1" width="1" height="4" fill="#FFEE00"/>
  <!-- 날개 (전기빛 노랑) -->
  <rect x="0" y="5" width="5" height="5" fill="#D0A000"/>
  <rect x="11" y="5" width="5" height="5" fill="#D0A000"/>
  <rect x="1" y="5" width="4" height="4" fill="#F0C000"/>
  <rect x="11" y="5" width="4" height="4" fill="#F0C000"/>
  <!-- 번개 무늬 날개 -->
  <rect x="2" y="6" width="2" height="1" fill="#FFEE00"/>
  <rect x="3" y="7" width="2" height="1" fill="#FFEE00"/>
  <rect x="12" y="6" width="2" height="1" fill="#FFEE00"/>
  <rect x="11" y="7" width="2" height="1" fill="#FFEE00"/>
  <!-- 머리 (진한 금) -->
  <rect x="5" y="2" width="6" height="5" fill="#D09000"/>
  <rect x="4" y="3" width="8" height="4" fill="#E0A800"/>
  <!-- 눈 (번개빛) -->
  <rect x="6" y="4" width="2" height="2" fill="#FFEE00"/>
  <rect x="7" y="4" width="1" height="2" fill="#1A0808"/>
  <rect x="6" y="4" width="1" height="1" fill="#FFFFFF"/>
  <!-- 부리 -->
  <rect x="9" y="5" width="4" height="2" fill="#FF8800"/>
  <rect x="10" y="7" width="3" height="1" fill="#CC6600"/>
  <!-- 몸 -->
  <rect x="4" y="7" width="8" height="6" fill="#8B6010"/>
  <rect x="3" y="8" width="10" height="5" fill="#A07020"/>
  <!-- 발톱 -->
  <rect x="5" y="13" width="2" height="2" fill="#D09000"/>
  <rect x="9" y="13" width="2" height="2" fill="#D09000"/>
</svg>
