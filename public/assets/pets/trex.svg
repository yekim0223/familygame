  <rect x="6" y="2" width="9" height="4" fill="#6AA020"/>
  <rect x="8" y="1" width="6" height="1" fill="#80C030"/>
  <!-- 이빨 -->
  <rect x="9" y="6" width="1" height="2" fill="#FFFFFF"/>
