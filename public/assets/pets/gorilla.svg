<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 머리 (크고 납작) -->
  <rect x="2" y="1" width="12" height="3" fill="#2A2A2A"/>
  <rect x="1" y="2" width="14" height="2" fill="#333333"/>
  <!-- 얼굴 -->
  <rect x="3" y="3" width="10" height="8" fill="#2A2A2A"/>
  <rect x="2" y="4" width="12" height="6" fill="#2A2A2A"/>
  <rect x="4" y="3" width="8" height="1" fill="#444444"/>
  <!-- 눈썹 (두꺼운) -->
  <rect x="4" y="4" width="3" height="1" fill="#1A1A1A"/>
  <rect x="9" y="4" width="3" height="1" fill="#1A1A1A"/>
  <!-- 눈 (갈색) -->
  <rect x="5" y="5" width="2" height="2" fill="#604020"/>
  <rect x="9" y="5" width="2" height="2" fill="#604020"/>
  <rect x="5" y="5" width="1" height="1" fill="#FFFFFF"/>
  <rect x="9" y="5" width="1" height="1" fill="#FFFFFF"/>
  <!-- 코 (납작) -->
  <rect x="6" y="7" width="4" height="2" fill="#1A1A1A"/>
  <rect x="6" y="8" width="2" height="1" fill="#333333"/>
  <rect x="8" y="8" width="2" height="1" fill="#333333"/>
  <!-- 주둥이 (큰) -->
  <rect x="4" y="9" width="8" height="3" fill="#504030"/>
  <rect x="5" y="10" width="6" height="1" fill="#1A1A1A"/>
  <!-- 몸 -->
  <rect x="2" y="11" width="12" height="5" fill="#2A2A2A"/>
  <rect x="1" y="12" width="14" height="4" fill="#333333"/>
  <!-- 팔 -->
  <rect x="0" y="11" width="3" height="5" fill="#2A2A2A"/>
  <rect x="13" y="11" width="3" height="5" fill="#2A2A2A"/>
</svg>
