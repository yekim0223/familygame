<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 몸통 (원뿔형) -->
  <rect x="5" y="1" width="6" height="7" fill="#8020A0"/>
  <rect x="4" y="2" width="8" height="6" fill="#9030B0"/>
  <rect x="5" y="1" width="6" height="1" fill="#A040C0"/>
  <!-- 눈 (크고 동그랗게) -->
  <rect x="4" y="3" width="4" height="3" fill="#FFDD00"/>
  <rect x="8" y="3" width="4" height="3" fill="#FFDD00"/>
  <rect x="5" y="3" width="3" height="3" fill="#1A0828"/>
  <rect x="8" y="3" width="3" height="3" fill="#1A0828"/>
  <rect x="5" y="3" width="1" height="1" fill="#FFFFFF"/>
  <rect x="8" y="3" width="1" height="1" fill="#FFFFFF"/>
  <!-- 촉수 (8개) -->
  <rect x="2" y="8" width="2" height="6" fill="#9030B0"/>
  <rect x="4" y="8" width="2" height="7" fill="#8020A0"/>
  <rect x="6" y="8" width="2" height="8" fill="#9030B0"/>
  <rect x="8" y="8" width="2" height="8" fill="#9030B0"/>
  <rect x="10" y="8" width="2" height="7" fill="#8020A0"/>
  <rect x="12" y="8" width="2" height="6" fill="#9030B0"/>
  <!-- 촉수 끝 동그라미 -->
  <rect x="2" y="14" width="2" height="2" fill="#C060E0"/>
  <rect x="4" y="15" width="2" height="1" fill="#C060E0"/>
  <rect x="10" y="15" width="2" height="1" fill="#C060E0"/>
  <rect x="12" y="14" width="2" height="2" fill="#C060E0"/>
</svg>
