<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 머리 깃털 (볏) -->
  <rect x="6" y="0" width="1" height="3" fill="#FF4040"/>
  <rect x="8" y="0" width="1" height="3" fill="#FFCC00"/>
  <rect x="7" y="1" width="2" height="2" fill="#FF8800"/>
  <!-- 머리 (초록) -->
  <rect x="3" y="2" width="10" height="8" fill="#20A020"/>
  <rect x="2" y="3" width="12" height="6" fill="#20A020"/>
  <rect x="4" y="2" width="8" height="1" fill="#40C040"/>
  <!-- 눈 (노랑 테두리) -->
  <rect x="4" y="5" width="4" height="3" fill="#FFCC00"/>
  <rect x="5" y="5" width="2" height="3" fill="#1A0808"/>
  <rect x="5" y="5" width="1" height="1" fill="#FFFFFF"/>
  <!-- 부리 -->
  <rect x="7" y="7" width="4" height="2" fill="#FF8800"/>
  <rect x="7" y="7" width="4" height="1" fill="#FFAA00"/>
  <rect x="8" y="9" width="3" height="1" fill="#CC6600"/>
  <!-- 몸 (파란 날개) -->
  <rect x="2" y="10" width="5" height="6" fill="#2060E0"/>
  <rect x="9" y="10" width="5" height="6" fill="#2060E0"/>
  <rect x="4" y="10" width="8" height="6" fill="#20A020"/>
  <!-- 가슴 (노랑) -->
  <rect x="5" y="11" width="6" height="4" fill="#FFCC00"/>
</svg>
