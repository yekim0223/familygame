<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 통통한 볼 -->
  <rect x="1" y="6" width="3" height="5" fill="#F4C07A"/>
  <rect x="12" y="6" width="3" height="5" fill="#F4C07A"/>
  <!-- 귀 (작고 둥글) -->
  <rect x="3" y="2" width="3" height="3" fill="#F08080"/>
  <rect x="10" y="2" width="3" height="3" fill="#F08080"/>
  <rect x="4" y="2" width="2" height="2" fill="#FFB0A0"/>
  <rect x="10" y="2" width="2" height="2" fill="#FFB0A0"/>
  <!-- 얼굴 (크고 둥글게) -->
  <rect x="3" y="4" width="10" height="9" fill="#F4C07A"/>
  <rect x="2" y="5" width="12" height="7" fill="#F4C07A"/>
  <!-- 흰 배 부분 -->
  <rect x="5" y="8" width="6" height="4" fill="#FFF0E0"/>
  <!-- 눈 (크고 반짝) -->
  <rect x="4" y="6" width="3" height="3" fill="#1A0808"/>
  <rect x="9" y="6" width="3" height="3" fill="#1A0808"/>
  <rect x="4" y="6" width="3" height="2" fill="#3A1818"/>
  <rect x="9" y="6" width="3" height="2" fill="#3A1818"/>
  <rect x="4" y="6" width="1" height="1" fill="#FFFFFF"/>
  <rect x="9" y="6" width="1" height="1" fill="#FFFFFF"/>
  <!-- 코 -->
  <rect x="7" y="9" width="2" height="1" fill="#FF8080"/>
  <!-- 볼 분홍 -->
  <rect x="3" y="8" width="2" height="1" fill="#FFB0B0"/>
  <rect x="11" y="8" width="2" height="1" fill="#FFB0B0"/>
</svg>
