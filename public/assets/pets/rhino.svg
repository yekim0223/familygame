<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 뿔 (코 위) -->
  <rect x="12" y="2" width="2" height="4" fill="#888888"/>
  <rect x="12" y="2" width="2" height="1" fill="#AAAAAA"/>
  <!-- 귀 -->
  <rect x="2" y="3" width="3" height="3" fill="#888888"/>
  <rect x="2" y="4" width="2" height="2" fill="#AAAAAA"/>
  <!-- 머리/몸 (큰) -->
  <rect x="3" y="4" width="11" height="7" fill="#909090"/>
  <rect x="2" y="5" width="13" height="5" fill="#909090"/>
  <rect x="4" y="4" width="9" height="1" fill="#AAAAAA"/>
  <!-- 눈 (작은) -->
  <rect x="5" y="6" width="2" height="2" fill="#1A1A1A"/>
  <rect x="5" y="6" width="1" height="1" fill="#FFFFFF"/>
  <!-- 코 주변 (주름) -->
  <rect x="10" y="7" width="4" height="3" fill="#787878"/>
  <rect x="10" y="8" width="4" height="1" fill="#888888"/>
  <!-- 콧구멍 -->
  <rect x="11" y="7" width="1" height="1" fill="#505050"/>
  <rect x="13" y="7" width="1" height="1" fill="#505050"/>
  <!-- 발 (짧고 두꺼운) -->
  <rect x="3" y="11" width="3" height="4" fill="#888888"/>
  <rect x="7" y="11" width="3" height="4" fill="#888888"/>
  <!-- 꼬리 -->
  <rect x="1" y="8" width="2" height="3" fill="#888888"/>
</svg>
