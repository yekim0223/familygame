<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 등지느러미 (삼각형) -->
  <rect x="8" y="1" width="2" height="5" fill="#708090"/>
  <rect x="7" y="2" width="4" height="4" fill="#708090"/>
  <rect x="7" y="3" width="5" height="3" fill="#6070808"/>
  <!-- 몸 (유선형) -->
  <rect x="2" y="5" width="12" height="5" fill="#708090"/>
  <rect x="1" y="6" width="14" height="3" fill="#708090"/>
  <rect x="3" y="5" width="10" height="1" fill="#8090A0"/>
  <!-- 배 (흰) -->
  <rect x="3" y="8" width="9" height="2" fill="#E8E8F0"/>
  <!-- 주둥이 -->
  <rect x="13" y="6" width="3" height="2" fill="#708090"/>
  <!-- 눈 -->
  <rect x="11" y="6" width="2" height="2" fill="#1A1A1A"/>
  <rect x="11" y="6" width="1" height="1" fill="#FFFFFF"/>
  <!-- 입 (이빨 보임) -->
  <rect x="12" y="8" width="3" height="1" fill="#FFFFFF"/>
  <rect x="12" y="8" width="1" height="1" fill="#1A1A1A"/>
  <rect x="14" y="8" width="1" height="1" fill="#1A1A1A"/>
  <!-- 꼬리 -->
  <rect x="0" y="5" width="3" height="3" fill="#607080"/>
  <rect x="0" y="8" width="3" height="3" fill="#607080"/>
  <!-- 가슴지느러미 -->
  <rect x="5" y="9" width="5" height="3" fill="#607080"/>
</svg>
