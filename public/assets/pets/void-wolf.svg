<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 공허 균열 (배경) -->
  <rect x="0" y="5" width="3" height="5" fill="#0A0010"/>
  <rect x="13" y="5" width="3" height="5" fill="#0A0010"/>
  <rect x="1" y="4" width="1" height="7" fill="#200030"/>
  <rect x="14" y="4" width="1" height="7" fill="#200030"/>
  <!-- 귀 -->
  <rect x="3" y="1" width="3" height="5" fill="#0A0010"/>
  <rect x="10" y="1" width="3" height="5" fill="#0A0010"/>
  <rect x="4" y="2" width="1" height="3" fill="#6000A0"/>
  <rect x="11" y="2" width="1" height="3" fill="#6000A0"/>
  <!-- 얼굴 (공허 검정) -->
  <rect x="4" y="3" width="8" height="9" fill="#0A0010"/>
  <rect x="3" y="4" width="10" height="8" fill="#100018"/>
  <rect x="5" y="3" width="6" height="1" fill="#200030"/>
  <!-- 균열 무늬 -->
  <rect x="5" y="5" width="1" height="4" fill="#6000A0"/>
  <rect x="10" y="5" width="1" height="4" fill="#6000A0"/>
  <rect x="7" y="6" width="2" height="2" fill="#8000C0"/>
  <!-- 눈 (공허 빛) -->
  <rect x="5" y="5" width="3" height="2" fill="#A000FF"/>
  <rect x="8" y="5" width="3" height="2" fill="#A000FF"/>
  <rect x="6" y="5" width="1" height="1" fill="#FFFFFF"/>
  <rect x="9" y="5" width="1" height="1" fill="#FFFFFF"/>
  <!-- 주둥이 -->
  <rect x="5" y="8" width="6" height="3" fill="#0A0010"/>
  <!-- 코 -->
  <rect x="6" y="8" width="4" height="2" fill="#0A0010"/>
  <!-- 공허 입김 -->
  <rect x="10" y="9" width="4" height="1" fill="#6000A0"/>
  <rect x="11" y="8" width="3" height="1" fill="#4000608"/>
</svg>
