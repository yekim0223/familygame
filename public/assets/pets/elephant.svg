<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 귀 (크게) -->
  <rect x="0" y="4" width="5" height="7" fill="#909090"/>
  <rect x="1" y="5" width="3" height="5" fill="#AAAAAA"/>
  <!-- 머리 -->
  <rect x="4" y="3" width="8" height="7" fill="#909090"/>
  <rect x="3" y="4" width="9" height="5" fill="#A0A0A0"/>
  <rect x="5" y="3" width="6" height="1" fill="#B0B0B0"/>
  <!-- 코 (긴 내림) -->
  <rect x="10" y="6" width="3" height="8" fill="#909090"/>
  <rect x="11" y="13" width="3" height="2" fill="#808080"/>
  <!-- 눈 (작은) -->
  <rect x="6" y="5" width="2" height="2" fill="#1A1A1A"/>
  <rect x="6" y="5" width="1" height="1" fill="#FFFFFF"/>
  <!-- 엄니 (흰 상아) -->
  <rect x="9" y="9" width="5" height="1" fill="#FFFAE0"/>
  <rect x="10" y="10" width="4" height="1" fill="#EEE8C0"/>
  <!-- 몸 -->
  <rect x="3" y="10" width="7" height="5" fill="#909090"/>
  <rect x="2" y="11" width="8" height="4" fill="#A0A0A0"/>
  <!-- 발 -->
  <rect x="3" y="14" width="2" height="2" fill="#808080"/>
  <rect x="6" y="14" width="2" height="2" fill="#808080"/>
</svg>
