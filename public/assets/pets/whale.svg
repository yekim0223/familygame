<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 물 뿜기 (위) -->
  <rect x="6" y="0" width="1" height="3" fill="#88CCFF"/>
  <rect x="8" y="0" width="1" height="4" fill="#88CCFF"/>
  <rect x="10" y="0" width="1" height="3" fill="#88CCFF"/>
  <!-- 등지느러미 -->
  <rect x="9" y="2" width="3" height="4" fill="#1A4080"/>
  <!-- 몸 (크게) -->
  <rect x="2" y="5" width="12" height="6" fill="#2050A0"/>
  <rect x="1" y="6" width="14" height="4" fill="#2060B0"/>
  <rect x="3" y="5" width="10" height="1" fill="#3070C0"/>
  <!-- 배 (흰) -->
  <rect x="3" y="9" width="8" height="2" fill="#E0F0FF"/>
  <!-- 눈 -->
  <rect x="11" y="7" width="2" height="2" fill="#1A1A2A"/>
  <rect x="11" y="7" width="1" height="1" fill="#FFFFFF"/>
  <!-- 주둥이 -->
  <rect x="13" y="7" width="3" height="2" fill="#1A4080"/>
  <!-- 웃음 라인 -->
  <rect x="12" y="9" width="3" height="1" fill="#AADDFF"/>
  <!-- 꼬리지느러미 -->
  <rect x="0" y="6" width="3" height="3" fill="#1A4080"/>
  <rect x="0" y="5" width="2" height="3" fill="#2050A0"/>
  <rect x="0" y="9" width="2" height="3" fill="#2050A0"/>
  <!-- 가슴지느러미 -->
  <rect x="5" y="10" width="4" height="3" fill="#1A4080"/>
</svg>
