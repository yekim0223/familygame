<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 후드 (펼쳐진) -->
  <rect x="3" y="3" width="10" height="5" fill="#C85020"/>
  <rect x="2" y="4" width="12" height="4" fill="#D86030"/>
  <!-- 무늬 -->
  <rect x="4" y="4" width="8" height="1" fill="#E87040"/>
  <rect x="4" y="7" width="8" height="1" fill="#E87040"/>
  <!-- 머리 -->
  <rect x="6" y="2" width="5" height="4" fill="#A04010"/>
  <rect x="7" y="1" width="3" height="3" fill="#C05020"/>
  <!-- 눈 (노랑) -->
  <rect x="7" y="3" width="2" height="2" fill="#FFD700"/>
  <rect x="8" y="3" width="1" height="2" fill="#1A0808"/>
  <rect x="7" y="3" width="1" height="1" fill="#FFFFFF"/>
  <!-- 혀 (빨간 Y형) -->
  <rect x="9" y="5" width="4" height="1" fill="#FF2020"/>
  <rect x="11" y="4" width="1" height="2" fill="#FF2020"/>
  <rect x="12" y="3" width="1" height="2" fill="#FF2020"/>
  <rect x="13" y="6" width="1" height="1" fill="#FF2020"/>
  <!-- 몸 (코일) -->
  <rect x="4" y="8" width="8" height="3" fill="#A04010"/>
  <rect x="3" y="9" width="10" height="2" fill="#B05020"/>
  <rect x="5" y="11" width="7" height="3" fill="#A04010"/>
  <rect x="6" y="12" width="6" height="2" fill="#B05020"/>
  <!-- 배 무늬 -->
  <rect x="5" y="9" width="6" height="1" fill="#E8A060"/>
  <rect x="6" y="12" width="4" height="1" fill="#E8A060"/>
</svg>
