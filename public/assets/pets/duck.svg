<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 머리 (노랑) -->
  <rect x="4" y="2" width="8" height="8" fill="#FFD700"/>
  <rect x="3" y="3" width="10" height="6" fill="#FFD700"/>
  <!-- 이마 밝은 부분 -->
  <rect x="5" y="2" width="6" height="1" fill="#FFEE88"/>
  <!-- 부리 (주황) -->
  <rect x="10" y="6" width="4" height="3" fill="#FF8800"/>
  <rect x="10" y="6" width="4" height="1" fill="#FFAA00"/>
  <rect x="11" y="9" width="3" height="1" fill="#CC6600"/>
  <!-- 눈 (검정) -->
  <rect x="5" y="5" width="2" height="2" fill="#1A0808"/>
  <rect x="5" y="5" width="1" height="1" fill="#FFFFFF"/>
  <!-- 몸통 (노랑) -->
  <rect x="3" y="9" width="10" height="5" fill="#FFD700"/>
  <rect x="2" y="10" width="12" height="4" fill="#FFCC00"/>
  <!-- 날개 라인 -->
  <rect x="4" y="10" width="8" height="1" fill="#E8AA00"/>
  <!-- 발 (주황) -->
  <rect x="5" y="14" width="3" height="2" fill="#FF8800"/>
  <rect x="8" y="14" width="3" height="2" fill="#FF8800"/>
</svg>
