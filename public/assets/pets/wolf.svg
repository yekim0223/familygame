  <rect x="6" y="9" width="4" height="2" fill="#1A1A1A"/>
  <rect x="7" y="9" width="2" height="1" fill="#333333"/>
  <!-- 입 -->
  <rect x="7" y="11" width="1" height="1" fill="#888888"/>
