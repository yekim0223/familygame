<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 뿔 -->
  <rect x="5" y="0" width="2" height="3" fill="#FF8800"/>
  <rect x="9" y="0" width="2" height="3" fill="#FF8800"/>
  <!-- 날개 -->
  <rect x="0" y="5" width="4" height="5" fill="#FF4040"/>
  <rect x="12" y="5" width="4" height="5" fill="#FF4040"/>
  <rect x="1" y="5" width="3" height="4" fill="#FF8080"/>
  <rect x="12" y="5" width="3" height="4" fill="#FF8080"/>
  <!-- 머리 -->
  <rect x="4" y="2" width="8" height="6" fill="#30A030"/>
  <rect x="3" y="3" width="10" height="5" fill="#40B840"/>
  <!-- 주둥이 -->
