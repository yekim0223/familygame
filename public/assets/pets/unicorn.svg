<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 뿔 (무지개색) -->
  <rect x="8" y="0" width="2" height="5" fill="#FFFFFF"/>
  <rect x="8" y="0" width="2" height="1" fill="#FF80FF"/>
  <rect x="8" y="1" width="2" height="1" fill="#FF80C0"/>
  <rect x="8" y="2" width="2" height="1" fill="#FFD700"/>
  <rect x="9" y="0" width="1" height="5" fill="#C0C0FF"/>
  <!-- 갈기 (무지개) -->
  <rect x="4" y="3" width="3" height="7" fill="#FF69B4"/>
  <rect x="3" y="5" width="3" height="5" fill="#9B59FF"/>
  <rect x="2" y="7" width="3" height="4" fill="#5588FF"/>
  <!-- 머리 (흰) -->
  <rect x="5" y="3" width="7" height="6" fill="#FFFFFF"/>
  <rect x="4" y="4" width="8" height="5" fill="#FFFAF0"/>
  <rect x="6" y="3" width="5" height="1" fill="#FFFFFF"/>
  <!-- 눈 (파랗게 반짝) -->
  <rect x="7" y="5" width="3" height="2" fill="#60A0FF"/>
  <rect x="8" y="5" width="2" height="2" fill="#1A0848"/>
  <rect x="8" y="5" width="1" height="1" fill="#FFFFFF"/>
  <!-- 주둥이 -->
  <rect x="10" y="7" width="3" height="2" fill="#FFE0F0"/>
  <!-- 코 -->
  <rect x="11" y="7" width="1" height="1" fill="#FFAACC"/>
  <!-- 볼 (핑크) -->
  <rect x="6" y="7" width="2" height="1" fill="#FFB0D0"/>
  <!-- 몸 (흰) -->
  <rect x="3" y="9" width="10" height="5" fill="#FFFFFF"/>
  <rect x="2" y="10" width="12" height="4" fill="#FFFAF0"/>
  <!-- 별무늬 -->
  <rect x="7" y="10" width="2" height="1" fill="#FFD700"/>
  <rect x="8" y="9" width="1" height="3" fill="#FFD700"/>
  <!-- 발 -->
  <rect x="4" y="14" width="2" height="2" fill="#FFFAF0"/>
  <rect x="7" y="14" width="2" height="2" fill="#FFFAF0"/>
  <rect x="10" y="14" width="2" height="2" fill="#FFFAF0"/>
</svg>
