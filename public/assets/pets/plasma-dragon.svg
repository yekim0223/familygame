<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 플라즈마 후광 -->
  <rect x="0" y="3" width="2" height="8" fill="#8040FF"/>
  <rect x="14" y="3" width="2" height="8" fill="#8040FF"/>
  <rect x="1" y="1" width="1" height="12" fill="#A060FF"/>
  <rect x="14" y="1" width="1" height="12" fill="#A060FF"/>
  <!-- 뿔 (플라즈마) -->
  <rect x="5" y="0" width="2" height="4" fill="#C080FF"/>
  <rect x="9" y="0" width="2" height="4" fill="#C080FF"/>
  <rect x="6" y="0" width="1" height="3" fill="#FFFFFF"/>
  <rect x="10" y="0" width="1" height="3" fill="#FFFFFF"/>
  <!-- 날개 -->
  <rect x="1" y="5" width="4" height="6" fill="#6020C0"/>
  <rect x="11" y="5" width="4" height="6" fill="#6020C0"/>
  <rect x="2" y="5" width="3" height="5" fill="#8040E0"/>
  <rect x="11" y="5" width="3" height="5" fill="#8040E0"/>
  <!-- 몸 (어두운 보라) -->
  <rect x="5" y="3" width="6" height="8" fill="#5020A0"/>
  <rect x="4" y="4" width="8" height="7" fill="#6030B0"/>
  <!-- 플라즈마 가슴 -->
  <rect x="6" y="6" width="4" height="4" fill="#C080FF"/>
  <rect x="7" y="5" width="2" height="6" fill="#E0A0FF"/>
  <!-- 눈 (플라즈마) -->
  <rect x="5" y="5" width="3" height="2" fill="#E040FF"/>
  <rect x="6" y="5" width="2" height="2" fill="#1A0828"/>
  <rect x="6" y="5" width="1" height="1" fill="#FFFFFF"/>
  <!-- 불꽃 (보라) -->
  <rect x="11" y="6" width="4" height="2" fill="#C080FF"/>
  <rect x="12" y="5" width="3" height="1" fill="#FFFFFF"/>
  <!-- 꼬리 -->
  <rect x="2" y="9" width="4" height="3" fill="#5020A0"/>
  <rect x="2" y="11" width="3" height="3" fill="#6030B0"/>
</svg>
