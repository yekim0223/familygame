<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 귀 (뾰족) -->
  <rect x="2" y="1" width="4" height="5" fill="#E06020"/>
  <rect x="10" y="1" width="4" height="5" fill="#E06020"/>
  <rect x="3" y="2" width="2" height="3" fill="#FFFFFF"/>
  <rect x="11" y="2" width="2" height="3" fill="#FFFFFF"/>
  <!-- 얼굴 -->
  <rect x="3" y="4" width="10" height="8" fill="#E87030"/>
  <rect x="2" y="5" width="12" height="6" fill="#E87030"/>
  <!-- 눈가 흰색 -->
  <rect x="3" y="5" width="3" height="3" fill="#F8EEE0"/>
  <rect x="10" y="5" width="3" height="3" fill="#F8EEE0"/>
  <!-- 눈 -->
  <rect x="4" y="6" width="2" height="2" fill="#1A0808"/>
  <rect x="10" y="6" width="2" height="2" fill="#1A0808"/>
  <rect x="4" y="6" width="1" height="1" fill="#FFFFFF"/>
  <rect x="10" y="6" width="1" height="1" fill="#FFFFFF"/>
  <!-- 코 주변 (흰) -->
  <rect x="5" y="9" width="6" height="3" fill="#F8EEE0"/>
  <!-- 코 -->
  <rect x="7" y="9" width="2" height="1" fill="#1A0808"/>
  <!-- 입 -->
  <rect x="7" y="11" width="1" height="1" fill="#AA4444"/>
  <rect x="8" y="11" width="1" height="1" fill="#AA4444"/>
  <!-- 이마 무늬 -->
  <rect x="7" y="4" width="2" height="2" fill="#CC5010"/>
</svg>
