<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 머리 (성운빛) -->
  <rect x="8" y="0" width="6" height="4" fill="#4010808"/>
  <rect x="7" y="1" width="7" height="3" fill="#501090"/>
  <rect x="9" y="0" width="5" height="2" fill="#6020A0"/>
  <!-- 성운 무늬 머리 -->
  <rect x="10" y="1" width="2" height="2" fill="#FF60A0"/>
  <rect x="12" y="0" width="2" height="2" fill="#8040FF"/>
  <!-- 눈 (성운빛 분홍) -->
  <rect x="10" y="1" width="3" height="2" fill="#FF60A0"/>
  <rect x="11" y="1" width="2" height="2" fill="#1A0828"/>
  <rect x="11" y="1" width="1" height="1" fill="#FFFFFF"/>
  <!-- 혀 (보라) -->
  <rect x="13" y="3" width="3" height="1" fill="#C040FF"/>
  <rect x="14" y="2" width="1" height="2" fill="#C040FF"/>
  <rect x="15" y="1" width="1" height="2" fill="#A020E0"/>
  <!-- 몸 (성운 곡선) -->
  <rect x="4" y="3" width="8" height="3" fill="#4010808"/>
  <rect x="3" y="4" width="9" height="3" fill="#501090"/>
  <!-- 성운 비늘 -->
  <rect x="5" y="4" width="2" height="1" fill="#FF60A0"/>
  <rect x="8" y="4" width="2" height="1" fill="#8040FF"/>
  <rect x="11" y="5" width="1" height="1" fill="#60C0FF"/>
  <!-- 중간 코일 -->
  <rect x="2" y="7" width="8" height="3" fill="#4010808"/>
  <rect x="1" y="8" width="10" height="2" fill="#501090"/>
  <!-- 성운 무늬 -->
  <rect x="3" y="8" width="3" height="1" fill="#FF60A0"/>
  <rect x="7" y="8" width="2" height="1" fill="#8040FF"/>
  <!-- 꼬리 코일 -->
  <rect x="3" y="10" width="7" height="3" fill="#4010808"/>
  <rect x="4" y="11" width="6" height="2" fill="#501090"/>
  <rect x="5" y="12" width="4" height="2" fill="#6020A0"/>
</svg>
