<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 귀 (둥글) -->
  <rect x="2" y="2" width="4" height="4" fill="#5A3010"/>
  <rect x="10" y="2" width="4" height="4" fill="#5A3010"/>
  <rect x="3" y="3" width="2" height="2" fill="#8B5030"/>
  <rect x="11" y="3" width="2" height="2" fill="#8B5030"/>
  <!-- 얼굴 -->
  <rect x="3" y="4" width="10" height="9" fill="#7A4820"/>
  <rect x="2" y="5" width="12" height="7" fill="#7A4820"/>
  <rect x="4" y="4" width="8" height="1" fill="#9A6030"/>
  <!-- 주둥이 -->
  <rect x="5" y="9" width="6" height="3" fill="#A06840"/>
  <!-- 눈 -->
  <rect x="5" y="6" width="2" height="2" fill="#1A0808"/>
  <rect x="9" y="6" width="2" height="2" fill="#1A0808"/>
  <rect x="5" y="6" width="1" height="1" fill="#FFFFFF"/>
  <rect x="9" y="6" width="1" height="1" fill="#FFFFFF"/>
  <!-- 코 (큰) -->
  <rect x="6" y="9" width="4" height="2" fill="#1A0808"/>
  <rect x="7" y="9" width="2" height="1" fill="#333333"/>
  <!-- 입 -->
  <rect x="7" y="11" width="1" height="1" fill="#6B3010"/>
  <rect x="8" y="11" width="1" height="1" fill="#6B3010"/>
</svg>
