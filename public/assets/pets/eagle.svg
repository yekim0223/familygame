<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 머리 (흰색 독수리) -->
  <rect x="4" y="1" width="8" height="7" fill="#FFFFFF"/>
  <rect x="3" y="2" width="10" height="5" fill="#FFFFFF"/>
  <!-- 부리 (노랑, 갈고리) -->
  <rect x="10" y="5" width="4" height="2" fill="#FFD700"/>
  <rect x="11" y="7" width="3" height="1" fill="#CC9900"/>
  <rect x="12" y="4" width="2" height="2" fill="#FFEE00"/>
  <!-- 눈 (노랑 테두리) -->
  <rect x="5" y="4" width="3" height="2" fill="#FFD700"/>
  <rect x="6" y="4" width="2" height="2" fill="#1A0808"/>
  <rect x="6" y="4" width="1" height="1" fill="#FFFFFF"/>
  <!-- 몸 (갈색) -->
  <rect x="3" y="7" width="10" height="7" fill="#8B5A1A"/>
  <rect x="2" y="8" width="12" height="6" fill="#8B5A1A"/>
  <rect x="4" y="7" width="8" height="1" fill="#A07030"/>
  <!-- 날개 -->
  <rect x="0" y="9" width="4" height="4" fill="#6B4010"/>
  <rect x="12" y="9" width="4" height="4" fill="#6B4010"/>
  <!-- 발톱 -->
  <rect x="5" y="14" width="2" height="2" fill="#FFD700"/>
  <rect x="9" y="14" width="2" height="2" fill="#FFD700"/>
  <rect x="4" y="15" width="1" height="1" fill="#FFD700"/>
  <rect x="11" y="15" width="1" height="1" fill="#FFD700"/>
</svg>
