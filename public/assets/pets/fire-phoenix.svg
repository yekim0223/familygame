  <!-- 머리 -->
  <rect x="5" y="2" width="6" height="5" fill="#FF6600"/>
  <rect x="4" y="3" width="8" height="4" fill="#FF8800"/>
  <!-- 볏 -->
  <rect x="6" y="0" width="4" height="3" fill="#FF4400"/>
  <rect x="7" y="0" width="2" height="2" fill="#FFCC00"/>
  <!-- 눈 (불꽃) -->
  <rect x="6" y="4" width="2" height="2" fill="#FFEE00"/>
  <rect x="7" y="4" width="1" height="2" fill="#1A0808"/>
  <rect x="6" y="4" width="1" height="1" fill="#FFFFFF"/>
  <!-- 부리 -->
  <rect x="10" y="5" width="3" height="2" fill="#FFD700"/>
