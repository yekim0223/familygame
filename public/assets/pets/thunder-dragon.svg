<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 번개 후광 -->
  <rect x="0" y="3" width="2" height="9" fill="#FFEE00"/>
  <rect x="14" y="3" width="2" height="9" fill="#FFEE00"/>
  <rect x="1" y="1" width="1" height="13" fill="#FFD700"/>
  <rect x="14" y="1" width="1" height="13" fill="#FFD700"/>
  <!-- 뿔 (번개 모양) -->
  <rect x="6" y="0" width="2" height="2" fill="#FFD700"/>
  <rect x="8" y="0" width="2" height="2" fill="#FFD700"/>
  <rect x="5" y="1" width="2" height="2" fill="#FF8800"/>
  <rect x="9" y="1" width="2" height="2" fill="#FF8800"/>
  <!-- 날개 (번개빛) -->
  <rect x="1" y="5" width="5" height="6" fill="#1A3040"/>
  <rect x="10" y="5" width="5" height="6" fill="#1A3040"/>
  <rect x="2" y="5" width="4" height="5" fill="#203848"/>
  <rect x="10" y="5" width="4" height="5" fill="#203848"/>
  <!-- 날개 번개 무늬 -->
  <rect x="2" y="6" width="3" height="1" fill="#FFD700"/>
  <rect x="3" y="7" width="2" height="1" fill="#FFEE00"/>
  <rect x="11" y="6" width="3" height="1" fill="#FFD700"/>
  <rect x="11" y="7" width="2" height="1" fill="#FFEE00"/>
  <!-- 몸 (전기 파랑) -->
  <rect x="5" y="3" width="6" height="8" fill="#1A2840"/>
  <rect x="4" y="4" width="8" height="7" fill="#203050"/>
  <!-- 번개 가슴 무늬 -->
  <rect x="7" y="5" width="2" height="5" fill="#FFD700"/>
  <rect x="6" y="6" width="4" height="1" fill="#FFEE00"/>
  <rect x="6" y="8" width="4" height="1" fill="#FFEE00"/>
  <!-- 눈 (전기) -->
  <rect x="5" y="5" width="3" height="2" fill="#FFD700"/>
  <rect x="6" y="5" width="2" height="2" fill="#1A1A1A"/>
  <rect x="6" y="5" width="1" height="1" fill="#FFFFFF"/>
  <!-- 입 번개 -->
  <rect x="11" y="7" width="4" height="1" fill="#FFD700"/>
  <rect x="13" y="6" width="2" height="2" fill="#FFEE00"/>
</svg>
