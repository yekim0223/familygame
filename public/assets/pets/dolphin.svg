<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 등지느러미 -->
  <rect x="8" y="1" width="3" height="4" fill="#5090C8"/>
  <rect x="9" y="1" width="2" height="3" fill="#70B0E8"/>
  <!-- 몸 -->
  <rect x="2" y="5" width="12" height="5" fill="#5090C8"/>
  <rect x="1" y="6" width="14" height="3" fill="#5090C8"/>
  <rect x="3" y="5" width="10" height="1" fill="#70B0E8"/>
  <!-- 배 (흰) -->
  <rect x="3" y="8" width="8" height="2" fill="#DDEEFF"/>
  <!-- 주둥이 (긴) -->
  <rect x="13" y="6" width="3" height="2" fill="#5090C8"/>
  <!-- 눈 -->
  <rect x="11" y="6" width="2" height="2" fill="#1A1A2A"/>
  <rect x="11" y="6" width="1" height="1" fill="#FFFFFF"/>
  <!-- 꼬리지느러미 -->
  <rect x="0" y="7" width="3" height="2" fill="#4080B8"/>
  <rect x="0" y="5" width="2" height="3" fill="#4080B8"/>
  <rect x="0" y="9" width="2" height="3" fill="#4080B8"/>
  <!-- 가슴지느러미 -->
  <rect x="5" y="9" width="4" height="3" fill="#4080B8"/>
  <!-- 미소 -->
  <rect x="12" y="8" width="2" height="1" fill="#AACCFF"/>
</svg>
