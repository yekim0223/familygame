<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 긴 귀 -->
  <rect x="4" y="0" width="3" height="7" fill="#F0F0F0"/>
  <rect x="9" y="0" width="3" height="7" fill="#F0F0F0"/>
  <rect x="5" y="1" width="1" height="5" fill="#FFAAAA"/>
  <rect x="10" y="1" width="1" height="5" fill="#FFAAAA"/>
  <!-- 얼굴 -->
  <rect x="3" y="6" width="10" height="8" fill="#F8F8F8"/>
  <rect x="2" y="7" width="12" height="6" fill="#F8F8F8"/>
  <!-- 눈 (빨간/핑크) -->
  <rect x="5" y="8" width="2" height="2" fill="#FF6666"/>
  <rect x="9" y="8" width="2" height="2" fill="#FF6666"/>
  <rect x="5" y="8" width="1" height="1" fill="#FFFFFF"/>
  <rect x="9" y="8" width="1" height="1" fill="#FFFFFF"/>
  <!-- 코 -->
  <rect x="7" y="10" width="2" height="1" fill="#FFB0B0"/>
  <!-- 수염 -->
  <rect x="3" y="11" width="3" height="1" fill="#DDDDDD"/>
  <rect x="10" y="11" width="3" height="1" fill="#DDDDDD"/>
  <!-- 입 -->
  <rect x="7" y="11" width="1" height="1" fill="#FFAAAA"/>
  <rect x="8" y="11" width="1" height="1" fill="#FFAAAA"/>
  <!-- 볼 -->
  <rect x="3" y="10" width="2" height="1" fill="#FFCCCC"/>
  <rect x="11" y="10" width="2" height="1" fill="#FFCCCC"/>
</svg>
