  <rect x="5" y="6" width="2" height="2" fill="#1A0808"/>
  <rect x="9" y="6" width="2" height="2" fill="#1A0808"/>
  <rect x="5" y="6" width="2" height="1" fill="#D08020"/>
  <rect x="9" y="6" width="2" height="1" fill="#D08020"/>
  <rect x="6" y="6" width="1" height="1" fill="#1A0808"/>
