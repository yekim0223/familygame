<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 전설의 존재 - 무지개 빛 드래곤 + 신 -->
  <!-- 무지개 후광 -->
  <rect x="0" y="3" width="2" height="9" fill="#FF0000"/>
  <rect x="14" y="3" width="2" height="9" fill="#8B00FF"/>
  <rect x="1" y="1" width="1" height="13" fill="#FF6600"/>
  <rect x="14" y="1" width="1" height="13" fill="#0000FF"/>
  <!-- 왕관 (황금) -->
  <rect x="4" y="0" width="8" height="3" fill="#FFD700"/>
  <rect x="5" y="0" width="1" height="4" fill="#FFD700"/>
  <rect x="8" y="0" width="1" height="4" fill="#FFD700"/>
  <rect x="10" y="0" width="1" height="4" fill="#FFD700"/>
  <rect x="6" y="0" width="1" height="1" fill="#FF0000"/>
  <rect x="8" y="0" width="1" height="1" fill="#00FF00"/>
  <rect x="10" y="0" width="1" height="1" fill="#0000FF"/>
  <!-- 몸 (무지개 빛) -->
  <rect x="4" y="3" width="8" height="9" fill="#FFD700"/>
  <rect x="3" y="4" width="10" height="8" fill="#FFEE00"/>
  <!-- 무지개 무늬 -->
  <rect x="4" y="5" width="8" height="1" fill="#FF8800"/>
  <rect x="4" y="7" width="8" height="1" fill="#FF00FF"/>
  <rect x="4" y="9" width="8" height="1" fill="#00CCFF"/>
  <!-- 눈 (전설빛) -->
  <rect x="5" y="5" width="3" height="2" fill="#FF0080"/>
  <rect x="8" y="5" width="3" height="2" fill="#FF0080"/>
  <rect x="6" y="5" width="1" height="2" fill="#1A0808"/>
  <rect x="9" y="5" width="1" height="2" fill="#1A0808"/>
  <rect x="5" y="5" width="1" height="1" fill="#FFFFFF"/>
  <rect x="8" y="5" width="1" height="1" fill="#FFFFFF"/>
  <!-- 날개 -->
  <rect x="0" y="5" width="4" height="6" fill="#CC8800"/>
  <rect x="12" y="5" width="4" height="6" fill="#CC8800"/>
  <rect x="1" y="6" width="3" height="4" fill="#FFAA00"/>
</svg>
