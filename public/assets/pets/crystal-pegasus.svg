<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 날개 (수정) -->
  <rect x="0" y="4" width="5" height="7" fill="#88CCFF"/>
  <rect x="11" y="4" width="5" height="7" fill="#88CCFF"/>
  <rect x="1" y="4" width="4" height="6" fill="#AADDFF"/>
  <rect x="11" y="4" width="4" height="6" fill="#AADDFF"/>
  <rect x="2" y="5" width="3" height="5" fill="#CCF0FF"/>
  <rect x="11" y="5" width="3" height="5" fill="#CCF0FF"/>
  <!-- 수정 깃털 무늬 -->
  <rect x="1" y="6" width="2" height="1" fill="#FFFFFF"/>
  <rect x="2" y="7" width="2" height="1" fill="#FFFFFF"/>
  <rect x="12" y="6" width="2" height="1" fill="#FFFFFF"/>
  <rect x="12" y="7" width="2" height="1" fill="#FFFFFF"/>
  <!-- 뿔 (무지개 수정) -->
  <rect x="8" y="0" width="2" height="4" fill="#FFFFFF"/>
  <rect x="9" y="0" width="1" height="4" fill="#FFB0FF"/>
  <!-- 머리 (흰) -->
  <rect x="5" y="2" width="6" height="5" fill="#F8F8FF"/>
  <rect x="4" y="3" width="8" height="4" fill="#FFFFFF"/>
  <!-- 눈 (수정보라) -->
  <rect x="6" y="4" width="2" height="2" fill="#9966FF"/>
  <rect x="7" y="4" width="1" height="2" fill="#1A0848"/>
  <rect x="6" y="4" width="1" height="1" fill="#FFFFFF"/>
  <!-- 주둥이 -->
  <rect x="10" y="5" width="3" height="2" fill="#FFE0F0"/>
  <!-- 콧구멍 -->
  <rect x="11" y="5" width="1" height="1" fill="#FFAACC"/>
  <!-- 몸 (흰) -->
  <rect x="5" y="7" width="6" height="6" fill="#F8F8FF"/>
  <rect x="4" y="8" width="8" height="5" fill="#FFFFFF"/>
  <!-- 수정 장식 -->
  <rect x="7" y="9" width="2" height="2" fill="#AADDFF"/>
  <!-- 발 -->
  <rect x="5" y="13" width="2" height="3" fill="#F0F0FF"/>
  <rect x="9" y="13" width="2" height="3" fill="#F0F0FF"/>
</svg>
