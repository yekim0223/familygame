<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 운석 불꽃 꼬리 -->
  <rect x="0" y="8" width="4" height="3" fill="#FF4400"/>
  <rect x="0" y="7" width="3" height="2" fill="#FF8800"/>
  <rect x="1" y="10" width="3" height="3" fill="#FFCC00"/>
  <!-- 귀 -->
  <rect x="4" y="2" width="3" height="4" fill="#D4A820"/>
  <rect x="9" y="2" width="3" height="4" fill="#D4A820"/>
  <rect x="5" y="3" width="1" height="2" fill="#FFF0A0"/>
  <rect x="10" y="3" width="1" height="2" fill="#FFF0A0"/>
  <!-- 얼굴 (금빛 표범) -->
  <rect x="4" y="4" width="8" height="8" fill="#D4A820"/>
  <rect x="3" y="5" width="10" height="7" fill="#E0B830"/>
  <rect x="5" y="4" width="6" height="1" fill="#F0C840"/>
  <!-- 표범 무늬 (검은 점) -->
  <rect x="5" y="6" width="2" height="2" fill="#1A0808"/>
  <rect x="9" y="6" width="2" height="2" fill="#1A0808"/>
  <rect x="6" y="6" width="1" height="1" fill="#D4A820"/>
  <rect x="10" y="6" width="1" height="1" fill="#D4A820"/>
  <rect x="5" y="9" width="2" height="2" fill="#1A0808"/>
  <rect x="9" y="9" width="2" height="2" fill="#1A0808"/>
  <!-- 눈 (운석 오렌지) -->
  <rect x="5" y="6" width="2" height="1" fill="#FF8800"/>
  <rect x="9" y="6" width="2" height="1" fill="#FF8800"/>
  <rect x="5" y="6" width="1" height="1" fill="#FFFFFF"/>
  <rect x="9" y="6" width="1" height="1" fill="#FFFFFF"/>
  <!-- 주둥이 -->
  <rect x="6" y="9" width="4" height="2" fill="#F8D860"/>
  <!-- 코 -->
  <rect x="7" y="9" width="2" height="1" fill="#1A0808"/>
</svg>
