<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 우주 갈기 (은하빛) -->
  <rect x="1" y="3" width="14" height="9" fill="#0A0818"/>
  <rect x="0" y="5" width="16" height="5" fill="#0A0818"/>
  <rect x="2" y="2" width="12" height="2" fill="#1A1828"/>
  <!-- 갈기 별빛 -->
  <rect x="2" y="5" width="1" height="1" fill="#FFD700"/>
  <rect x="5" y="3" width="1" height="1" fill="#FFFFFF"/>
  <rect x="13" y="4" width="1" height="1" fill="#8888FF"/>
  <rect x="1" y="8" width="1" height="1" fill="#FF8888"/>
  <rect x="14" y="9" width="1" height="1" fill="#88FF88"/>
  <rect x="11" y="11" width="1" height="1" fill="#FFD700"/>
  <!-- 갈기 성운빛 -->
  <rect x="3" y="6" width="2" height="2" fill="#2020608"/>
  <rect x="11" y="6" width="2" height="2" fill="#200060"/>
  <!-- 얼굴 (금빛) -->
  <rect x="5" y="4" width="6" height="7" fill="#D09020"/>
  <rect x="4" y="5" width="8" height="6" fill="#E0A030"/>
  <rect x="6" y="4" width="4" height="1" fill="#F0C040"/>
  <!-- 우주 눈 (은하 소용돌이) -->
  <rect x="5" y="6" width="2" height="2" fill="#4040FF"/>
  <rect x="9" y="6" width="2" height="2" fill="#4040FF"/>
  <rect x="5" y="6" width="2" height="1" fill="#8080FF"/>
  <rect x="9" y="6" width="2" height="1" fill="#8080FF"/>
  <rect x="5" y="6" width="1" height="1" fill="#FFFFFF"/>
  <rect x="9" y="6" width="1" height="1" fill="#FFFFFF"/>
  <!-- 코 -->
  <rect x="6" y="9" width="4" height="2" fill="#1A0808"/>
  <!-- 주둥이 -->
  <rect x="5" y="9" width="6" height="2" fill="#F0C060"/>
  <rect x="6" y="9" width="4" height="2" fill="#1A0808"/>
  <!-- 수염 (빛) -->
  <rect x="2" y="10" width="3" height="1" fill="#CCCC88"/>
  <rect x="11" y="10" width="3" height="1" fill="#CCCC88"/>
</svg>
