<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 귀 (검정) -->
  <rect x="2" y="2" width="4" height="3" fill="#1A1A1A"/>
  <rect x="10" y="2" width="4" height="3" fill="#1A1A1A"/>
  <!-- 얼굴 (흰색) -->
  <rect x="3" y="4" width="10" height="9" fill="#FFFFFF"/>
  <rect x="2" y="5" width="12" height="7" fill="#FFFFFF"/>
  <!-- 눈 주위 (검정 패치) -->
  <rect x="3" y="5" width="4" height="4" fill="#1A1A1A"/>
  <rect x="9" y="5" width="4" height="4" fill="#1A1A1A"/>
  <!-- 눈 (흰자 + 검은자) -->
  <rect x="4" y="6" width="2" height="2" fill="#FFFFFF"/>
  <rect x="10" y="6" width="2" height="2" fill="#FFFFFF"/>
  <rect x="4" y="6" width="1" height="2" fill="#1A0808"/>
  <rect x="10" y="6" width="1" height="2" fill="#1A0808"/>
  <rect x="5" y="6" width="1" height="1" fill="#FFFFFF"/>
  <rect x="11" y="6" width="1" height="1" fill="#FFFFFF"/>
  <!-- 코 -->
  <rect x="6" y="10" width="4" height="2" fill="#2A2A2A"/>
  <rect x="7" y="10" width="2" height="1" fill="#444444"/>
  <!-- 입 -->
  <rect x="7" y="12" width="1" height="1" fill="#888888"/>
  <rect x="8" y="12" width="1" height="1" fill="#888888"/>
  <!-- 볼 -->
  <rect x="3" y="10" width="2" height="1" fill="#FFCCCC"/>
  <rect x="11" y="10" width="2" height="1" fill="#FFCCCC"/>
</svg>
