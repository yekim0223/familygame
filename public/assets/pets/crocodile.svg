<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="image-rendering:pixelated">
  <!-- 주둥이 (납작하게 긴) -->
  <rect x="8" y="2" width="8" height="3" fill="#406820"/>
  <rect x="8" y="5" width="8" height="2" fill="#304810"/>
  <!-- 이빨 -->
  <rect x="9" y="5" width="1" height="2" fill="#FFFFFF"/>
  <rect x="11" y="5" width="1" height="2" fill="#FFFFFF"/>
  <rect x="13" y="5" width="1" height="2" fill="#FFFFFF"/>
  <!-- 눈 (튀어나옴) -->
