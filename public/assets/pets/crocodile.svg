  <rect x="3" y="8" width="2" height="1" fill="#406020"/>
  <rect x="6" y="8" width="2" height="1" fill="#406020"/>
  <!-- 꼬리 -->
  <rect x="0" y="7" width="3" height="3" fill="#406820"/>
  <rect x="0" y="9" width="2" height="2" fill="#304810"/>
  <!-- 발 -->
  <rect x="3" y="11" width="3" height="2" fill="#507828"/>
  <rect x="7" y="11" width="3" height="2" fill="#507828"/>
</svg>
