  <rect x="22" y="19" width="4" height="7" fill="#6020A0"/>
  <!-- hands -->
  <rect x="5"  y="25" width="4" height="3" fill="#F5C17A"/>
  <rect x="23" y="25" width="4" height="3" fill="#F5C17A"/>

