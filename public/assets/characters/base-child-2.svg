  <rect x="17" y="0" width="3" height="3" fill="#7020C0"/>
  <rect x="10" y="1" width="12" height="3" fill="#8030D8"/>
  <rect x="9"  y="3" width="14" height="2" fill="#9040E8"/>
  <rect x="8"  y="4" width="2"  height="9" fill="#7020C0"/>
  <rect x="22" y="4" width="2"  height="9" fill="#7020C0"/>
  <rect x="13" y="0" width="1"  height="2" fill="#A060F0"/>
