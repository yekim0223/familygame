  <rect x="10" y="27" width="5" height="3" fill="#300860"/>
  <rect x="17" y="27" width="5" height="3" fill="#300860"/>

  <!-- ══ ARMORED BOOTS ══ -->
  <rect x="9"  y="30" width="6" height="2" fill="#401080"/>
  <rect x="9"  y="30" width="6" height="1" fill="#6020A0"/>
  <rect x="17" y="30" width="6" height="2" fill="#401080"/>
  <rect x="17" y="30" width="6" height="1" fill="#6020A0"/>
