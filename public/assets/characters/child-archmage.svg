<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 대마법사 고깔 (마법진 새겨짐) -->
  <rect x="15" y="0" width="2"  height="1" fill="#0820608"/>
  <rect x="14" y="1" width="4"  height="1" fill="#102070"/>
  <rect x="13" y="2" width="6"  height="2" fill="#1830A0"/>
  <rect x="12" y="4" width="8"  height="2" fill="#2040C0"/>
  <rect x="11" y="6" width="10" height="2" fill="#3050D8"/>
  <!-- 고깔 별자리 -->
  <rect x="20" y="2" width="1"  height="1" fill="#FFD700"/>
  <rect x="15" y="1" width="1"  height="1" fill="#88CCFF"/>
  <rect x="12" y="4" width="1"  height="1" fill="#FF80FF"/>
  <!-- 고깔 챙 (화려) -->
  <rect x="7"  y="7" width="18" height="3" fill="#0820608"/>
  <rect x="6"  y="8" width="20" height="2" fill="#1030808"/>
  <!-- 챙 별 장식 -->
  <rect x="8"  y="8" width="2"  height="1" fill="#FFD700"/>
  <rect x="22" y="8" width="2"  height="1" fill="#FFD700"/>
  <rect x="14" y="7" width="4"  height="1" fill="#88CCFF"/>

  <!-- ══ 머리 (순백) ══ -->
  <rect x="8"  y="9" width="2"  height="8" fill="#D0D8F0"/>
  <rect x="22" y="9" width="2"  height="8" fill="#D0D8F0"/>
  <rect x="7"  y="11" width="2" height="6" fill="#B0B8D8"/>
  <rect x="23" y="11" width="2" height="6" fill="#B0B8D8"/>
  <rect x="8"  y="17" width="3" height="2" fill="#D0D8F0"/>
  <rect x="21" y="17" width="3" height="2" fill="#D0D8F0"/>

  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="9"  width="14" height="9" fill="#EEDDBB"/>
  <rect x="10" y="18" width="12" height="1" fill="#EEDDBB"/>
  <rect x="11" y="19" width="10" height="1" fill="#EEDDBB"/>

  <!-- ══ 눈썹·눈 (은하빛) ══ -->
  <rect x="10" y="10" width="5" height="1" fill="#8080B0"/>
  <rect x="17" y="10" width="5" height="1" fill="#8080B0"/>
  <rect x="10" y="12" width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="12" width="5" height="3" fill="#6040C0"/>
  <rect x="10" y="12" width="5" height="1" fill="#C0A0FF"/>
  <rect x="14" y="12" width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="12" width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="12" width="5" height="3" fill="#6040C0"/>
  <rect x="17" y="12" width="5" height="1" fill="#C0A0FF"/>
  <rect x="17" y="12" width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ 볼·입 ══ -->
  <rect x="9"  y="15" width="3" height="1" fill="#DDA090"/>
  <rect x="20" y="15" width="3" height="1" fill="#DDA090"/>
  <rect x="13" y="16" width="6" height="1" fill="#AA7744"/>
  <rect x="14" y="17" width="4" height="1" fill="#886633"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="20" width="4" height="2" fill="#EEDDBB"/>

  <!-- ══ 대마법사 로브 (우주빛) ══ -->
  <rect x="7"  y="22" width="18" height="2" fill="#0818508"/>
  <rect x="7"  y="22" width="18" height="1" fill="#103060"/>
  <rect x="8"  y="24" width="16" height="6" fill="#08163888"/>
  <rect x="7"  y="25" width="18" height="5" fill="#0818508"/>
  <rect x="9"  y="24" width="5"  height="3" fill="#103060"/>
  <!-- 성좌 무늬 -->
  <rect x="14" y="26" width="1"  height="1" fill="#FFD700"/>
  <rect x="12" y="27" width="1"  height="1" fill="#88CCFF"/>
  <rect x="17" y="27" width="1"  height="1" fill="#FF80FF"/>
  <rect x="19" y="25" width="1"  height="1" fill="#FFD700"/>
  <rect x="11" y="25" width="1"  height="1" fill="#FFFFFF"/>
  <!-- 마력 광휘 (테두리) -->
  <rect x="6"  y="24" width="2" height="6" fill="#4060C0"/>
  <rect x="24" y="24" width="2" height="6" fill="#4060C0"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="30" width="5" height="2" fill="#0818508"/>
  <rect x="17" y="30" width="5" height="2" fill="#0818508"/>
</svg>
