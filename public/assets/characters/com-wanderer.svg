<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 방랑자 모자 (낡은 챙) -->
  <rect x="10" y="2" width="12" height="3" fill="#7A6040"/>
  <rect x="5"  y="4" width="22" height="2" fill="#6A5030"/>
  <rect x="6"  y="4" width="20" height="1" fill="#9A8050"/>
  <!-- 모자 패치 -->
  <rect x="18" y="2" width="3"  height="2" fill="#5A4020"/>
  <!-- ══ 머리 ══ -->
  <rect x="8"  y="5" width="2"  height="7" fill="#9B6A30"/>
  <rect x="22" y="5" width="2"  height="7" fill="#9B6A30"/>
  <rect x="8"  y="12" width="3" height="1" fill="#9B6A30"/>
  <rect x="21" y="12" width="3" height="1" fill="#9B6A30"/>
  <!-- ══ 얼굴 (여행자 그을림) ══ -->
  <rect x="9"  y="5"  width="14" height="8" fill="#D09050"/>
  <rect x="10" y="13" width="12" height="1" fill="#D09050"/>
  <rect x="11" y="14" width="10" height="1" fill="#D09050"/>
  <!-- 눈썹·눈 -->
  <rect x="10" y="6"  width="5" height="1" fill="#5A2A08"/>
  <rect x="17" y="6"  width="5" height="1" fill="#5A2A08"/>
  <rect x="10" y="8"  width="5" height="3" fill="#1A0828"/>
  <rect x="10" y="8"  width="5" height="2" fill="#604020"/>
  <rect x="10" y="8"  width="5" height="1" fill="#908050"/>
  <rect x="14" y="8"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="8"  width="5" height="3" fill="#1A0828"/>
  <rect x="17" y="8"  width="5" height="2" fill="#604020"/>
  <rect x="17" y="8"  width="5" height="1" fill="#908050"/>
  <rect x="17" y="8"  width="1" height="1" fill="#FFFFFF"/>
  <!-- 볼·입 -->
  <rect x="9"  y="10" width="3" height="1" fill="#C07040"/>
  <rect x="20" y="10" width="3" height="1" fill="#C07040"/>
  <rect x="13" y="12" width="6" height="1" fill="#AA5522"/>
  <!-- 목 -->
  <rect x="14" y="15" width="4" height="2" fill="#D09050"/>
  <!-- ══ 방랑자 코트 ══ -->
  <rect x="9"  y="17" width="14" height="2" fill="#6A5030"/>
  <rect x="9"  y="17" width="14" height="1" fill="#9A7050"/>
  <rect x="9"  y="19" width="14" height="9" fill="#7A6040"/>
  <rect x="8"  y="20" width="16" height="8" fill="#8A7050"/>
  <rect x="10" y="19" width="4"  height="3" fill="#9A8050"/>
  <!-- 코트 패치들 -->
  <rect x="9"  y="22" width="3"  height="2" fill="#5A4020"/>
  <rect x="20" y="24" width="3"  height="2" fill="#5A4020"/>
  <!-- 중앙 버튼 -->
  <rect x="15" y="20" width="2"  height="7" fill="#6A5030"/>
  <rect x="15" y="21" width="2"  height="1" fill="#4A3010"/>
  <rect x="15" y="24" width="2"  height="1" fill="#4A3010"/>
  <!-- 지팡이 -->
  <rect x="5"  y="17" width="2"  height="15" fill="#8B5A1A"/>
  <rect x="4"  y="16" width="4"  height="2"  fill="#C8A060"/>
  <!-- 배낭 끈 -->
  <rect x="21" y="18" width="2"  height="8" fill="#6A5030"/>
  <rect x="21" y="23" width="4"  height="4" fill="#8B5A1A"/>
  <rect x="22" y="24" width="2"  height="2" fill="#C8A060"/>
  <!-- 다리·부츠 -->
  <rect x="10" y="28" width="5" height="2" fill="#5A4020"/>
  <rect x="17" y="28" width="5" height="2" fill="#5A4020"/>
  <rect x="9"  y="30" width="6" height="2" fill="#7A5030"/>
  <rect x="9"  y="30" width="6" height="1" fill="#9A7050"/>
  <rect x="17" y="30" width="6" height="2" fill="#7A5030"/>
  <rect x="17" y="30" width="6" height="1" fill="#9A7050"/>
</svg>
