<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- ══ 머리띠 ══ -->
  <rect x="8"  y="3" width="16" height="2" fill="#C84020"/>
  <rect x="8"  y="3" width="16" height="1" fill="#E05030"/>

  <!-- ══ 머리 (갈색, 근육질) ══ -->
  <rect x="9"  y="1" width="14" height="3" fill="#5A2A08"/>
  <rect x="8"  y="2" width="16" height="3" fill="#7A4A18"/>
  <rect x="7"  y="4" width="2"  height="8" fill="#5A2A08"/>
  <rect x="23" y="4" width="2"  height="8" fill="#5A2A08"/>
  <rect x="8"  y="12" width="3" height="1" fill="#5A2A08"/>
  <rect x="21" y="12" width="3" height="1" fill="#5A2A08"/>

  <!-- ══ 얼굴 (그을린) ══ -->
  <rect x="9"  y="5"  width="14" height="8" fill="#D89050"/>
  <rect x="10" y="13" width="12" height="1" fill="#D89050"/>
  <rect x="11" y="14" width="10" height="1" fill="#D89050"/>

  <!-- ══ 눈썹 (두껍게) ══ -->
  <rect x="10" y="6" width="6" height="2" fill="#3A1808"/>
  <rect x="16" y="6" width="6" height="2" fill="#3A1808"/>

  <!-- ══ 눈 (갈색, 날카로운) ══ -->
  <rect x="10" y="8" width="5" height="3" fill="#1A0828"/>
  <rect x="10" y="8" width="5" height="2" fill="#704020"/>
  <rect x="10" y="8" width="5" height="1" fill="#A06030"/>
  <rect x="14" y="8" width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="8" width="5" height="3" fill="#1A0828"/>
  <rect x="17" y="8" width="5" height="2" fill="#704020"/>
  <rect x="17" y="8" width="5" height="1" fill="#A06030"/>
  <rect x="17" y="8" width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ 코·입 ══ -->
  <rect x="15" y="10" width="2" height="1" fill="#B07040"/>
  <rect x="13" y="12" width="6" height="1" fill="#AA4422"/>
  <rect x="14" y="13" width="4" height="1" fill="#882200"/>
  <!-- 흉터 -->
  <rect x="10" y="8" width="1" height="2" fill="#E8A060"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="15" width="4" height="2" fill="#D89050"/>

  <!-- ══ 검투사 갑옷 ══ -->
  <!-- 어깨 한쪽만 (검투사 스타일) -->
  <rect x="5"  y="17" width="7"  height="5" fill="#C87020"/>
  <rect x="5"  y="17" width="7"  height="1" fill="#E89030"/>
  <rect x="5"  y="21" width="7"  height="1" fill="#A05010"/>
  <!-- 오른쪽은 노출 -->
  <rect x="20" y="17" width="7"  height="5" fill="#C87020"/>
  <rect x="20" y="17" width="7"  height="1" fill="#E89030"/>
  <!-- 가슴 갑옷 -->
  <rect x="9"  y="17" width="14" height="7" fill="#C87020"/>
  <rect x="10" y="17" width="5"  height="3" fill="#E89030"/>
  <!-- 전사 문양 -->
  <rect x="14" y="20" width="4"  height="4" fill="#8B4A10"/>
  <rect x="13" y="21" width="6"  height="2" fill="#8B4A10"/>
  <rect x="14" y="20" width="4"  height="1" fill="#C86820"/>
  <!-- 허리 가죽 스커트 -->
  <rect x="8"  y="24" width="16" height="4" fill="#8B5A20"/>
  <rect x="8"  y="24" width="16" height="1" fill="#C87820"/>
  <!-- 스커트 분절 -->
  <rect x="10" y="24" width="1"  height="4" fill="#6B3A10"/>
  <rect x="13" y="24" width="1"  height="4" fill="#6B3A10"/>
  <rect x="16" y="24" width="1"  height="4" fill="#6B3A10"/>
  <rect x="19" y="24" width="1"  height="4" fill="#6B3A10"/>
  <rect x="22" y="24" width="1"  height="4" fill="#6B3A10"/>

  <!-- ══ 다리·샌들 ══ -->
  <rect x="10" y="28" width="5" height="2" fill="#C88840"/>
  <rect x="17" y="28" width="5" height="2" fill="#C88840"/>
  <rect x="9"  y="30" width="6" height="2" fill="#8B5A20"/>
  <rect x="9"  y="30" width="6" height="1" fill="#C87820"/>
  <rect x="17" y="30" width="6" height="2" fill="#8B5A20"/>
  <rect x="17" y="30" width="6" height="1" fill="#C87820"/>
</svg>
