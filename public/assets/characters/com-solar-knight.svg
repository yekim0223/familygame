<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 태양 기사 투구 (황금+불꽃) -->
  <rect x="8"  y="1" width="16" height="5" fill="#C87020"/>
  <rect x="7"  y="3" width="18" height="4" fill="#E89030"/>
  <!-- 태양 광선 투구 -->
  <rect x="6"  y="0" width="3"  height="4" fill="#FFD700"/>
  <rect x="10" y="0" width="2"  height="3" fill="#FFD700"/>
  <rect x="14" y="0" width="4"  height="3" fill="#FFD700"/>
  <rect x="20" y="0" width="2"  height="3" fill="#FFD700"/>
  <rect x="23" y="0" width="3"  height="4" fill="#FFD700"/>
  <rect x="7"  y="0" width="2"  height="1" fill="#FFEE88"/>
  <rect x="15" y="0" width="2"  height="1" fill="#FFEE88"/>
  <rect x="24" y="0" width="2"  height="1" fill="#FFEE88"/>
  <!-- 바이저 -->
  <rect x="9"  y="5" width="14" height="3" fill="#A86010"/>
  <rect x="10" y="6" width="5"  height="1" fill="#FFD700"/>
  <rect x="17" y="6" width="5"  height="1" fill="#FFD700"/>
