  <rect x="11" y="8" width="10" height="3" fill="#A86010"/>
  <rect x="14" y="11" width="4" height="2" fill="#FFEECC"/>
  <!-- ══ 태양 기사 갑옷 ══ -->
  <!-- 태양 아우라 -->
  <rect x="3"  y="17" width="4" height="14" fill="#FFD700"/>
  <rect x="25" y="17" width="4" height="14" fill="#FFD700"/>
  <rect x="2"  y="20" width="3" height="9"  fill="#FF8800"/>
  <rect x="27" y="20" width="3" height="9"  fill="#FF8800"/>
  <!-- 어깨 (금) -->
  <rect x="4"  y="17" width="8"  height="6" fill="#C87020"/>
  <rect x="20" y="17" width="8"  height="6" fill="#C87020"/>
  <rect x="4"  y="17" width="8"  height="1" fill="#FFD700"/>
  <rect x="20" y="17" width="8"  height="1" fill="#FFD700"/>
  <rect x="4"  y="22" width="8"  height="1" fill="#FF8800"/>
  <rect x="20" y="22" width="8"  height="1" fill="#FF8800"/>
  <rect x="11" y="17" width="10" height="1" fill="#FFD700"/>
  <!-- 가슴 -->
  <rect x="9"  y="18" width="14" height="6" fill="#A86010"/>
  <rect x="10" y="18" width="5"  height="3" fill="#C87020"/>
  <!-- 태양 문양 -->
  <rect x="14" y="21" width="4"  height="3" fill="#FFD700"/>
  <rect x="13" y="22" width="6"  height="1" fill="#FFD700"/>
  <rect x="15" y="20" width="2"  height="4" fill="#FFEE88"/>
  <rect x="11" y="22" width="3"  height="1" fill="#FF8800"/>
  <rect x="18" y="22" width="3"  height="1" fill="#FF8800"/>
  <!-- ══ 벨트·다리·부츠 ══ -->
  <rect x="9"  y="24" width="14" height="2" fill="#906010"/>
  <rect x="9"  y="24" width="14" height="1" fill="#C87020"/>
  <rect x="10" y="26" width="5"  height="4" fill="#906010"/>
  <rect x="17" y="26" width="5"  height="4" fill="#906010"/>
  <rect x="9"  y="30" width="6"  height="2" fill="#C87020"/>
  <rect x="9"  y="30" width="6"  height="1" fill="#FFD700"/>
  <rect x="17" y="30" width="6"  height="2" fill="#C87020"/>
  <rect x="17" y="30" width="6"  height="1" fill="#FFD700"/>
</svg>
