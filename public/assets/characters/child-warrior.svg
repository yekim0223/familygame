  <rect x="9"  y="2" width="14" height="2" fill="#3D1870"/>
  <rect x="8"  y="4" width="2"  height="9" fill="#3D1870"/>
  <rect x="22" y="4" width="2"  height="9" fill="#3D1870"/>
