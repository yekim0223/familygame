<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 대장장이 — 억센 머리 -->
  <rect x="9"  y="1" width="14" height="3" fill="#3A2010"/>
  <rect x="8"  y="2" width="16" height="3" fill="#5A3020"/>
  <rect x="7"  y="4" width="2"  height="8" fill="#3A2010"/>
  <rect x="23" y="4" width="2"  height="8" fill="#3A2010"/>
  <rect x="8"  y="12" width="3" height="1" fill="#3A2010"/>
  <rect x="21" y="12" width="3" height="1" fill="#3A2010"/>
  <!-- ══ 얼굴 (그을림+수염) ══ -->
  <rect x="9"  y="4"  width="14" height="9" fill="#C07840"/>
  <rect x="10" y="13" width="12" height="1" fill="#C07840"/>
  <rect x="11" y="14" width="10" height="1" fill="#C07840"/>
  <!-- 수염 -->
  <rect x="9"  y="11" width="14" height="3" fill="#4A2A10"/>
  <rect x="10" y="12" width="12" height="2" fill="#6A3A18"/>
  <!-- 눈썹 (두꺼운) -->
  <rect x="10" y="5"  width="6" height="2" fill="#2A1008"/>
  <rect x="16" y="5"  width="6" height="2" fill="#2A1008"/>
  <!-- 눈 -->
  <rect x="10" y="7"  width="5" height="3" fill="#1A0828"/>
  <rect x="10" y="7"  width="5" height="2" fill="#804020"/>
  <rect x="10" y="7"  width="5" height="1" fill="#C06030"/>
  <rect x="14" y="7"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="7"  width="5" height="3" fill="#1A0828"/>
  <rect x="17" y="7"  width="5" height="2" fill="#804020"/>
  <rect x="17" y="7"  width="5" height="1" fill="#C06030"/>
  <rect x="17" y="7"  width="1" height="1" fill="#FFFFFF"/>
  <!-- 코 -->
  <rect x="15" y="9"  width="2" height="2" fill="#A06040"/>
  <!-- 목 -->
  <rect x="14" y="15" width="4" height="2" fill="#C07840"/>
  <!-- ══ 대장장이 앞치마 ══ -->
  <rect x="9"  y="17" width="14" height="2" fill="#2A1808"/>
  <rect x="9"  y="17" width="14" height="1" fill="#4A2818"/>
  <rect x="8"  y="19" width="16" height="9" fill="#4A3010"/>
  <rect x="7"  y="20" width="18" height="8" fill="#5A4020"/>
  <!-- 가죽 앞치마 -->
  <rect x="10" y="19" width="12" height="8" fill="#8B5A1A"/>
  <rect x="10" y="19" width="12" height="1" fill="#A07030"/>
  <!-- 앞치마 버클 -->
  <rect x="14" y="21" width="4"  height="2" fill="#C8A000"/>
  <rect x="15" y="20" width="2"  height="3" fill="#E8C020"/>
  <!-- 망치 (오른손) -->
  <rect x="22" y="14" width="3"  height="10" fill="#8B5A1A"/>
  <rect x="21" y="13" width="6"  height="4"  fill="#606060"/>
  <rect x="21" y="13" width="6"  height="1"  fill="#808080"/>
  <rect x="24" y="12" width="3"  height="6"  fill="#4A4A4A"/>
  <!-- 불꽃 이펙트 (모루 위) -->
  <rect x="4"  y="20" width="4"  height="3" fill="#FF4400"/>
  <rect x="5"  y="19" width="3"  height="2" fill="#FF8800"/>
  <rect x="5"  y="19" width="2"  height="1" fill="#FFCC00"/>
  <!-- 다리·부츠 (두꺼운 작업화) -->
  <rect x="10" y="28" width="5" height="2" fill="#3A2010"/>
  <rect x="17" y="28" width="5" height="2" fill="#3A2010"/>
  <rect x="9"  y="30" width="6" height="2" fill="#5A3820"/>
  <rect x="9"  y="30" width="6" height="1" fill="#806040"/>
  <rect x="17" y="30" width="6" height="2" fill="#5A3820"/>
  <rect x="17" y="30" width="6" height="1" fill="#806040"/>
</svg>
