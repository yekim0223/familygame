<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 십자군 투구 (흰+금) -->
  <rect x="8"  y="1" width="16" height="5" fill="#E8E8F0"/>
  <rect x="7"  y="3" width="18" height="4" fill="#F0F0F8"/>
  <rect x="9"  y="1" width="14" height="1" fill="#FFFFFF"/>
  <!-- 붉은 십자 -->
  <rect x="14" y="1" width="4"  height="5" fill="#CC0020"/>
  <rect x="9"  y="3" width="14" height="2" fill="#CC0020"/>
  <rect x="15" y="1" width="2"  height="5" fill="#EE3040"/>
  <rect x="10" y="3" width="12" height="1" fill="#EE3040"/>
  <!-- 바이저 -->
  <rect x="9"  y="5" width="14" height="3" fill="#C0C8D0"/>
  <rect x="10" y="6" width="5"  height="1" fill="#E8E8F8"/>
  <rect x="17" y="6" width="5"  height="1" fill="#E8E8F8"/>
  <!-- 목 -->
  <rect x="11" y="8" width="10" height="3" fill="#C0C8D0"/>
  <rect x="14" y="11" width="4" height="2" fill="#FFEECC"/>
  <!-- ══ 십자군 갑옷 (흰+붉은) ══ -->
  <!-- 망토 (붉은) -->
  <rect x="4"  y="19" width="5" height="13" fill="#CC0020"/>
  <rect x="23" y="19" width="5" height="13" fill="#CC0020"/>
  <rect x="3"  y="23" width="4" height="9"  fill="#AA0010"/>
  <rect x="25" y="23" width="4" height="9"  fill="#AA0010"/>
  <!-- 어깨 (흰) -->
  <rect x="6"  y="18" width="6"  height="5" fill="#E8E8F0"/>
  <rect x="20" y="18" width="6"  height="5" fill="#E8E8F0"/>
  <rect x="6"  y="18" width="6"  height="1" fill="#FFFFFF"/>
  <rect x="20" y="18" width="6"  height="1" fill="#FFFFFF"/>
  <rect x="6"  y="22" width="6"  height="1" fill="#CC0020"/>
  <rect x="20" y="22" width="6"  height="1" fill="#CC0020"/>
  <rect x="11" y="18" width="10" height="1" fill="#CC0020"/>
  <!-- 가슴 (흰+붉은 십자) -->
  <rect x="9"  y="19" width="14" height="6" fill="#E8E8F0"/>
  <rect x="10" y="19" width="5"  height="3" fill="#FFFFFF"/>
  <!-- 대형 십자 -->
  <rect x="14" y="21" width="4"  height="4" fill="#CC0020"/>
  <rect x="11" y="23" width="10" height="2" fill="#CC0020"/>
  <rect x="15" y="21" width="2"  height="4" fill="#EE3040"/>
  <!-- ══ 벨트·다리·부츠 ══ -->
  <rect x="9"  y="25" width="14" height="2" fill="#AA0010"/>
  <rect x="9"  y="25" width="14" height="1" fill="#CC0020"/>
  <rect x="10" y="27" width="5"  height="3" fill="#C0C8D0"/>
  <rect x="17" y="27" width="5"  height="3" fill="#C0C8D0"/>
  <rect x="9"  y="30" width="6"  height="2" fill="#A0A8B0"/>
  <rect x="9"  y="30" width="6"  height="1" fill="#C0C8D0"/>
  <rect x="17" y="30" width="6"  height="2" fill="#A0A8B0"/>
  <rect x="17" y="30" width="6"  height="1" fill="#C0C8D0"/>
</svg>
