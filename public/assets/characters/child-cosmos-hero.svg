<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 우주영웅 — 은하 왕관 + 별자리 -->
  <!-- 왕관 (무지개) -->
  <rect x="8"  y="1" width="16" height="3" fill="#1A0838"/>
  <rect x="7"  y="2" width="18" height="2" fill="#2A1050"/>
  <!-- 왕관 봉우리 (무지개색) -->
  <rect x="9"  y="0" width="3"  height="3" fill="#FF0040"/>
  <rect x="10" y="0" width="1"  height="2" fill="#FF4080"/>
  <rect x="14" y="0" width="4"  height="4" fill="#FFD700"/>
  <rect x="15" y="0" width="2"  height="3" fill="#FFEE88"/>
  <rect x="20" y="0" width="3"  height="3" fill="#00C0FF"/>
  <rect x="21" y="0" width="1"  height="2" fill="#80E0FF"/>
  <!-- 은하 왕관 보석 -->
  <rect x="10" y="1" width="1"  height="1" fill="#FF80C0"/>
  <rect x="15" y="1" width="2"  height="1" fill="#FFFFFF"/>
  <rect x="21" y="1" width="1"  height="1" fill="#80CCFF"/>

  <!-- ══ 머리 (은하 은발) ══ -->
  <rect x="8"  y="3" width="16" height="3" fill="#6060A0"/>
  <rect x="7"  y="5" width="2"  height="8" fill="#5050908"/>
  <rect x="23" y="5" width="2"  height="8" fill="#505090"/>
  <rect x="6"  y="7" width="2"  height="6" fill="#404080"/>
  <rect x="24" y="7" width="2"  height="6" fill="#404080"/>
  <rect x="7"  y="13" width="3" height="2" fill="#6060A0"/>
  <rect x="22" y="13" width="3" height="2" fill="#6060A0"/>
  <!-- 은하 스트릭 -->
  <rect x="12" y="3" width="8"  height="1" fill="#8080C0"/>
  <rect x="13" y="4" width="6"  height="1" fill="#A0A0E0"/>

  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="5"  width="14" height="9" fill="#E8D8F0"/>
  <rect x="10" y="14" width="12" height="1" fill="#E8D8F0"/>
  <rect x="11" y="15" width="10" height="1" fill="#E8D8F0"/>

  <!-- ══ 눈썹·눈 (우주 무지개) ══ -->
  <rect x="10" y="6"  width="5" height="1" fill="#4040808"/>
  <rect x="17" y="6"  width="5" height="1" fill="#404080"/>
  <!-- 왼쪽 눈: 황금 -->
  <rect x="10" y="8"  width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="8"  width="5" height="3" fill="#806000"/>
  <rect x="10" y="8"  width="5" height="1" fill="#FFD700"/>
  <rect x="14" y="8"  width="1" height="1" fill="#FFFFFF"/>
  <!-- 오른쪽 눈: 우주빛 -->
  <rect x="17" y="8"  width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="8"  width="5" height="3" fill="#0040A0"/>
  <rect x="17" y="8"  width="5" height="1" fill="#00C0FF"/>
  <rect x="17" y="8"  width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ 볼·입 ══ -->
  <rect x="9"  y="11" width="3" height="1" fill="#D0B0E0"/>
  <rect x="20" y="11" width="3" height="1" fill="#D0B0E0"/>
  <rect x="12" y="12" width="8" height="1" fill="#CC5599"/>
  <rect x="11" y="11" width="1" height="1" fill="#CC5599"/>
  <rect x="20" y="11" width="1" height="1" fill="#CC5599"/>
  <rect x="13" y="13" width="6" height="1" fill="#AA3377"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="16" width="4" height="2" fill="#E8D8F0"/>

  <!-- ══ 우주영웅 수트 ══ -->
  <!-- 우주 망토 (은하) -->
  <rect x="3"  y="19" width="6" height="13" fill="#0A0520"/>
  <rect x="23" y="19" width="6" height="13" fill="#0A0520"/>
  <!-- 망토 별 -->
  <rect x="5"  y="22" width="1" height="1" fill="#FFD700"/>
  <rect x="25" y="24" width="1" height="1" fill="#FFFFFF"/>
  <rect x="4"  y="27" width="1" height="1" fill="#00C0FF"/>
  <rect x="26" y="20" width="1" height="1" fill="#FF80C0"/>
  <!-- 어깨 (무지개) -->
  <rect x="6"  y="18" width="7"  height="6" fill="#0A0520"/>
  <rect x="19" y="18" width="7"  height="6" fill="#0A0520"/>
  <rect x="6"  y="18" width="7"  height="1" fill="#FF0040"/>
  <rect x="19" y="18" width="7"  height="1" fill="#00C0FF"/>
  <rect x="6"  y="23" width="3"  height="1" fill="#FFD700"/>
  <rect x="10" y="23" width="3"  height="1" fill="#FF80C0"/>
  <rect x="19" y="23" width="3"  height="1" fill="#FF0040"/>
  <rect x="22" y="23" width="3"  height="1" fill="#FFD700"/>
  <!-- 칼라 (무지개) -->
  <rect x="12" y="18" width="2"  height="1" fill="#FF0040"/>
  <rect x="14" y="18" width="2"  height="1" fill="#FFD700"/>
  <rect x="16" y="18" width="2"  height="1" fill="#00C0FF"/>
  <rect x="18" y="18" width="2"  height="1" fill="#FF80C0"/>
  <!-- 가슴 (어둠) -->
  <rect x="9"  y="19" width="14" height="6" fill="#050318"/>
  <rect x="10" y="19" width="4"  height="3" fill="#0A0520"/>
  <!-- 우주 에너지 문양 -->
  <rect x="13" y="22" width="6"  height="3" fill="#A040FF"/>
  <rect x="12" y="23" width="8"  height="1" fill="#A040FF"/>
  <rect x="15" y="21" width="2"  height="4" fill="#FFD700"/>
  <rect x="14" y="22" width="4"  height="2" fill="#00C0FF"/>
  <rect x="15" y="23" width="2"  height="1" fill="#FFFFFF"/>

  <!-- ══ 벨트 ══ -->
  <rect x="9"  y="25" width="14" height="2" fill="#050318"/>
  <rect x="9"  y="25" width="14" height="1" fill="#0A0520"/>
  <rect x="14" y="24" width="4"  height="3" fill="#A040FF"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="27" width="5" height="3" fill="#080420"/>
  <rect x="17" y="27" width="5" height="3" fill="#080420"/>
  <rect x="9"  y="30" width="6" height="2" fill="#050318"/>
  <rect x="9"  y="30" width="3" height="1" fill="#FF0040"/>
  <rect x="12" y="30" width="3" height="1" fill="#FFD700"/>
  <rect x="17" y="30" width="3" height="1" fill="#00C0FF"/>
  <rect x="20" y="30" width="3" height="1" fill="#FF80C0"/>
</svg>
