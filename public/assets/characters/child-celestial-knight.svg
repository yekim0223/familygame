<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 천기사 투구 (하늘빛+금) -->
  <rect x="8"  y="1" width="16" height="5" fill="#4080C0"/>
  <rect x="7"  y="3" width="18" height="4" fill="#5090D0"/>
  <rect x="9"  y="1" width="14" height="1" fill="#80C0FF"/>
  <!-- 천사 날개 투구 -->
  <rect x="3"  y="2" width="6"  height="4" fill="#FFFFF0"/>
  <rect x="23" y="2" width="6"  height="4" fill="#FFFFF0"/>
  <rect x="3"  y="2" width="6"  height="1" fill="#FFD700"/>
  <rect x="23" y="2" width="6"  height="1" fill="#FFD700"/>
  <!-- 투구 슬릿 -->
  <rect x="9"  y="5" width="14" height="3" fill="#2060A0"/>
  <rect x="10" y="6" width="5"  height="1" fill="#80EEFF"/>
  <rect x="17" y="6" width="5"  height="1" fill="#80EEFF"/>
  <!-- 목 -->
  <rect x="11" y="8" width="10" height="3" fill="#3070B0"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="11" width="4" height="2" fill="#FFEECC"/>

  <!-- ══ 천기사 갑옷 (하늘+금) ══ -->
  <!-- 빛 아우라 -->
  <rect x="3"  y="17" width="4" height="12" fill="#80C0FF"/>
  <rect x="25" y="17" width="4" height="12" fill="#80C0FF"/>
  <rect x="2"  y="20" width="3" height="8"  fill="#FFFFF0"/>
  <rect x="27" y="20" width="3" height="8"  fill="#FFFFF0"/>
  <!-- 어깨 (하늘) -->
  <rect x="5"  y="17" width="7"  height="6" fill="#4080C0"/>
  <rect x="20" y="17" width="7"  height="6" fill="#4080C0"/>
  <rect x="5"  y="17" width="7"  height="1" fill="#80C0FF"/>
  <rect x="20" y="17" width="7"  height="1" fill="#80C0FF"/>
  <rect x="5"  y="22" width="7"  height="1" fill="#FFD700"/>
  <rect x="20" y="22" width="7"  height="1" fill="#FFD700"/>
  <!-- 칼라 (금) -->
  <rect x="11" y="17" width="10" height="1" fill="#FFD700"/>
  <!-- 가슴 (하늘) -->
  <rect x="9"  y="18" width="14" height="7" fill="#3070B0"/>
  <rect x="10" y="18" width="5"  height="3" fill="#4080C0"/>
  <!-- 천공 문양 (별자리) -->
  <rect x="14" y="21" width="4"  height="4" fill="#FFD700"/>
  <rect x="13" y="22" width="6"  height="2" fill="#FFD700"/>
  <rect x="15" y="21" width="2"  height="4" fill="#FFFFFF"/>
  <rect x="11" y="23" width="2"  height="1" fill="#80EEFF"/>
  <rect x="19" y="21" width="2"  height="1" fill="#80EEFF"/>

  <!-- ══ 벨트 ══ -->
  <rect x="9"  y="25" width="14" height="2" fill="#2060A0"/>
  <rect x="9"  y="25" width="14" height="1" fill="#4080C0"/>
  <rect x="14" y="24" width="4"  height="3" fill="#FFD700"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="27" width="5" height="3" fill="#2060A0"/>
  <rect x="17" y="27" width="5" height="3" fill="#2060A0"/>
  <rect x="9"  y="30" width="6" height="2" fill="#3070B0"/>
  <rect x="9"  y="30" width="6" height="1" fill="#80C0FF"/>
  <rect x="17" y="30" width="6" height="2" fill="#3070B0"/>
  <rect x="17" y="30" width="6" height="1" fill="#80C0FF"/>
</svg>
