<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- ══ 음유시인 깃털 모자 ══ -->
  <rect x="8"  y="2" width="16" height="3" fill="#6030A0"/>
  <rect x="7"  y="3" width="18" height="2" fill="#7040B0"/>
  <rect x="8"  y="3" width="16" height="1" fill="#9060C8"/>
  <!-- 모자 깃털 -->
  <rect x="22" y="0" width="3" height="6" fill="#FF69B4"/>
  <rect x="23" y="0" width="2" height="5" fill="#FF99CC"/>
  <rect x="24" y="0" width="1" height="4" fill="#FFFFFF"/>

  <!-- ══ 머리 (갈색 웨이브) ══ -->
  <rect x="8"  y="4" width="2"  height="9" fill="#8B5A1A"/>
  <rect x="22" y="4" width="2"  height="9" fill="#8B5A1A"/>
  <rect x="7"  y="6" width="2"  height="7" fill="#6B3A0A"/>
  <rect x="23" y="6" width="2"  height="7" fill="#6B3A0A"/>
  <rect x="8"  y="13" width="3" height="2" fill="#8B5A1A"/>
  <rect x="21" y="13" width="3" height="2" fill="#8B5A1A"/>

  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="5"  width="14" height="9" fill="#F5C17A"/>
  <rect x="10" y="14" width="12" height="1" fill="#F5C17A"/>
  <rect x="11" y="15" width="10" height="1" fill="#F5C17A"/>

  <!-- ══ 눈썹 ══ -->
  <rect x="10" y="6" width="5" height="1" fill="#5A2A0A"/>
  <rect x="17" y="6" width="5" height="1" fill="#5A2A0A"/>

  <!-- ══ 눈 (보라, 예술가) ══ -->
  <rect x="10" y="8" width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="8" width="5" height="3" fill="#7030B8"/>
  <rect x="10" y="8" width="5" height="1" fill="#A060E0"/>
  <rect x="14" y="8" width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="8" width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="8" width="5" height="3" fill="#7030B8"/>
  <rect x="17" y="8" width="5" height="1" fill="#A060E0"/>
  <rect x="17" y="8" width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ 볼·입 ══ -->
  <rect x="9"  y="10" width="3" height="1" fill="#F0A090"/>
  <rect x="20" y="10" width="3" height="1" fill="#F0A090"/>
  <rect x="12" y="12" width="8" height="1" fill="#CC5533"/>
  <rect x="11" y="11" width="1" height="1" fill="#CC5533"/>
  <rect x="20" y="11" width="1" height="1" fill="#CC5533"/>
  <rect x="13" y="13" width="6" height="1" fill="#AA3311"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="16" width="4" height="2" fill="#F5C17A"/>

  <!-- ══ 화려한 의상 (보라+노랑) ══ -->
  <!-- 칼라 -->
  <rect x="10" y="18" width="12" height="2" fill="#FFCC00"/>
  <rect x="10" y="18" width="12" height="1" fill="#FFEE88"/>
  <!-- 소매 -->
  <rect x="5"  y="19" width="6"  height="7" fill="#6030A0"/>
  <rect x="21" y="19" width="6"  height="7" fill="#6030A0"/>
  <rect x="5"  y="19" width="6"  height="1" fill="#9060C8"/>
  <rect x="21" y="19" width="6"  height="1" fill="#9060C8"/>
  <!-- 루트 (오른손) -->
  <rect x="21" y="22" width="5"  height="3" fill="#C8A060"/>
  <rect x="24" y="20" width="2"  height="6" fill="#C8A060"/>
  <rect x="25" y="19" width="2"  height="3" fill="#C8A060"/>
  <rect x="25" y="22" width="1"  height="1" fill="#1A0808"/>
  <!-- 악보 (왼손) -->
  <rect x="5"  y="21" width="5"  height="4" fill="#FFFFFF"/>
  <rect x="6"  y="22" width="3"  height="1" fill="#1A1A1A"/>
  <rect x="6"  y="24" width="3"  height="1" fill="#1A1A1A"/>
  <!-- 코트 몸통 -->
  <rect x="9"  y="20" width="14" height="6" fill="#6030A0"/>
  <rect x="10" y="20" width="5"  height="3" fill="#8050C0"/>
  <!-- 중앙 장식 (노랑) -->
  <rect x="14" y="22" width="4"  height="3" fill="#FFCC00"/>
  <rect x="15" y="21" width="2"  height="4" fill="#FFE044"/>

  <!-- ══ 벨트 ══ -->
  <rect x="9"  y="26" width="14" height="2" fill="#4020808"/>
  <rect x="9"  y="26" width="14" height="1" fill="#6030A0"/>
  <rect x="14" y="25" width="4"  height="3" fill="#FFCC00"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="28" width="5" height="2" fill="#3020608"/>
  <rect x="17" y="28" width="5" height="2" fill="#302060"/>
  <rect x="9"  y="30" width="6" height="2" fill="#4030808"/>
  <rect x="9"  y="30" width="6" height="1" fill="#6040A0"/>
  <rect x="17" y="30" width="6" height="2" fill="#403080"/>
  <rect x="17" y="30" width="6" height="1" fill="#6040A0"/>
</svg>
