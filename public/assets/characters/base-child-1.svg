  <rect x="8"  y="23" width="16" height="3" fill="#F060A0"/>
  <rect x="8"  y="23" width="16" height="1" fill="#FF90C0"/>
  <rect x="7"  y="26" width="18" height="3" fill="#E04090"/>
  <rect x="7"  y="26" width="18" height="1" fill="#F060A0"/>
  <rect x="6"  y="29" width="20" height="1" fill="#FF90C0"/>

