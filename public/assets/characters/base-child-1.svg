  <!-- ══ HAIR (warm golden-pink) ══ -->
  <rect x="9"  y="2" width="14" height="3" fill="#E8A840"/>
  <rect x="8"  y="4" width="2"  height="11" fill="#E8A840"/>
  <rect x="22" y="4" width="2"  height="11" fill="#E8A840"/>
  <rect x="6"  y="6" width="3"  height="9"  fill="#D09030"/>
