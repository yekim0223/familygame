<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 시간 마법사 — 시계 머리장식 -->
  <rect x="9"  y="1" width="14" height="4" fill="#3A2010"/>
  <rect x="8"  y="2" width="16" height="3" fill="#5A3020"/>
  <!-- 시계 문양 -->
  <rect x="13" y="1" width="6"  height="4" fill="#C8A000"/>
  <rect x="14" y="1" width="4"  height="3" fill="#E8C020"/>
  <rect x="15" y="1" width="2"  height="3" fill="#FFEE80"/>
  <rect x="15" y="2" width="2"  height="1" fill="#1A0808"/>
  <!-- 시침/분침 -->
  <rect x="16" y="2" width="1"  height="2" fill="#1A0808"/>
  <rect x="14" y="3" width="2"  height="1" fill="#1A0808"/>
  <!-- ══ 머리 (갈색) ══ -->
  <rect x="7"  y="4" width="2"  height="8" fill="#6A3A18"/>
  <rect x="23" y="4" width="2"  height="8" fill="#6A3A18"/>
  <rect x="8"  y="12" width="3" height="2" fill="#6A3A18"/>
  <rect x="21" y="12" width="3" height="2" fill="#6A3A18"/>
  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="4"  width="14" height="9" fill="#E8C080"/>
  <rect x="10" y="13" width="12" height="1" fill="#E8C080"/>
  <rect x="11" y="14" width="10" height="1" fill="#E8C080"/>
  <!-- 눈썹·눈 -->
  <rect x="10" y="5"  width="5" height="1" fill="#3A1808"/>
  <rect x="17" y="5"  width="5" height="1" fill="#3A1808"/>
  <rect x="10" y="7"  width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="7"  width="5" height="3" fill="#906000"/>
  <rect x="10" y="7"  width="5" height="1" fill="#E8C020"/>
  <rect x="14" y="7"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="7"  width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="7"  width="5" height="3" fill="#906000"/>
  <rect x="17" y="7"  width="5" height="1" fill="#E8C020"/>
  <rect x="17" y="7"  width="1" height="1" fill="#FFFFFF"/>
  <!-- 볼·입 -->
  <rect x="9"  y="10" width="3" height="1" fill="#D0A060"/>
  <rect x="20" y="10" width="3" height="1" fill="#D0A060"/>
  <rect x="13" y="11" width="6" height="1" fill="#A07030"/>
  <!-- 목 -->
  <rect x="14" y="15" width="4" height="2" fill="#E8C080"/>
  <!-- ══ 시간 로브 (갈색+금) ══ -->
  <rect x="9"  y="17" width="14" height="2" fill="#3A2010"/>
  <rect x="9"  y="17" width="14" height="1" fill="#7A5020"/>
  <rect x="9"  y="19" width="14" height="8" fill="#2A1808"/>
  <rect x="8"  y="20" width="16" height="7" fill="#3A2810"/>
  <rect x="10" y="19" width="4"  height="3" fill="#4A3018"/>
  <!-- 시계 문양 로브 -->
  <rect x="13" y="23" width="6"  height="4" fill="#C8A000"/>
  <rect x="12" y="24" width="8"  height="2" fill="#C8A000"/>
  <rect x="15" y="22" width="2"  height="5" fill="#E8C020"/>
  <rect x="14" y="24" width="4"  height="2" fill="#3A2010"/>
  <rect x="15" y="23" width="2"  height="3" fill="#E8C020"/>
  <rect x="16" y="24" width="1"  height="2" fill="#1A0808"/>
  <!-- 모래시계 주머니들 -->
  <rect x="8"  y="21" width="3"  height="5" fill="#4A3018"/>
  <rect x="9"  y="22" width="2"  height="3" fill="#C8A000"/>
  <rect x="21" y="21" width="3"  height="5" fill="#4A3018"/>
  <rect x="21" y="22" width="2"  height="3" fill="#C8A000"/>
  <!-- 로브 옆 -->
  <rect x="7"  y="20" width="3"  height="8" fill="#2A1808"/>
  <rect x="22" y="20" width="3"  height="8" fill="#2A1808"/>
  <!-- 다리·부츠 -->
  <rect x="10" y="27" width="5" height="3" fill="#2A1808"/>
  <rect x="17" y="27" width="5" height="3" fill="#2A1808"/>
  <rect x="9"  y="30" width="6" height="2" fill="#3A2810"/>
  <rect x="9"  y="30" width="6" height="1" fill="#C8A000"/>
  <rect x="17" y="30" width="6" height="2" fill="#3A2810"/>
  <rect x="17" y="30" width="6" height="1" fill="#C8A000"/>
</svg>
