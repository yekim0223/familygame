<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 용사왕 왕관 (화려) -->
  <rect x="8"  y="1" width="16" height="3" fill="#FFD700"/>
  <rect x="7"  y="2" width="18" height="2" fill="#FFD700"/>
  <rect x="8"  y="1" width="16" height="1" fill="#FFEE88"/>
  <!-- 왕관 봉우리 3개 -->
  <rect x="9"  y="0" width="3"  height="3" fill="#FFD700"/>
  <rect x="14" y="0" width="4"  height="4" fill="#FFD700"/>
  <rect x="14" y="0" width="4"  height="1" fill="#FFEE88"/>
  <rect x="20" y="0" width="3"  height="3" fill="#FFD700"/>
  <!-- 보석 -->
  <rect x="10" y="0" width="1"  height="1" fill="#FF0040"/>
  <rect x="15" y="0" width="2"  height="1" fill="#00AAFF"/>
  <rect x="21" y="0" width="1"  height="1" fill="#00FF80"/>

  <!-- ══ 머리 (왕의 금발) ══ -->
  <rect x="8"  y="3" width="16" height="3" fill="#E8C840"/>
  <rect x="7"  y="5" width="2"  height="8" fill="#E8C840"/>
  <rect x="23" y="5" width="2"  height="8" fill="#E8C840"/>
  <rect x="8"  y="13" width="3" height="2" fill="#E8C840"/>
  <rect x="21" y="13" width="3" height="2" fill="#E8C840"/>

  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="5"  width="14" height="9" fill="#F5C17A"/>
  <rect x="10" y="14" width="12" height="1" fill="#F5C17A"/>
  <rect x="11" y="15" width="10" height="1" fill="#F5C17A"/>

  <!-- ══ 눈썹·눈 (왕의 카리스마) ══ -->
  <rect x="10" y="6"  width="6" height="1" fill="#9A7020"/>
  <rect x="16" y="6"  width="6" height="1" fill="#9A7020"/>
  <rect x="10" y="8"  width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="8"  width="5" height="3" fill="#D09000"/>
  <rect x="10" y="8"  width="5" height="1" fill="#FFD700"/>
  <rect x="14" y="8"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="8"  width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="8"  width="5" height="3" fill="#D09000"/>
  <rect x="17" y="8"  width="5" height="1" fill="#FFD700"/>
  <rect x="17" y="8"  width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ 볼·입 ══ -->
  <rect x="9"  y="11" width="3" height="1" fill="#F0A080"/>
  <rect x="20" y="11" width="3" height="1" fill="#F0A080"/>
  <rect x="13" y="12" width="6" height="1" fill="#CC6633"/>
  <rect x="14" y="13" width="4" height="1" fill="#AA4411"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="16" width="4" height="2" fill="#F5C17A"/>

  <!-- ══ 용사왕 갑옷 (금+빨+파) ══ -->
  <!-- 망토 (빨강) -->
  <rect x="4"  y="19" width="5" height="13" fill="#CC0020"/>
  <rect x="23" y="19" width="5" height="13" fill="#CC0020"/>
  <rect x="3"  y="23" width="4" height="9"  fill="#AA0010"/>
  <rect x="25" y="23" width="4" height="9"  fill="#AA0010"/>
  <!-- 어깨 (금) -->
  <rect x="6"  y="18" width="7"  height="6" fill="#E8C040"/>
  <rect x="19" y="18" width="7"  height="6" fill="#E8C040"/>
  <rect x="6"  y="18" width="7"  height="1" fill="#FFD700"/>
  <rect x="19" y="18" width="7"  height="1" fill="#FFD700"/>
  <rect x="6"  y="23" width="7"  height="1" fill="#CC9000"/>
  <rect x="19" y="23" width="7"  height="1" fill="#CC9000"/>
  <!-- 칼라 (파랑) -->
  <rect x="12" y="18" width="8"  height="1" fill="#0060C0"/>
  <!-- 가슴 (파랑 + 금) -->
  <rect x="9"  y="19" width="14" height="6" fill="#1040A0"/>
  <rect x="10" y="19" width="5"  height="3" fill="#2050B8"/>
  <!-- 왕 문양 (별+왕관) -->
  <rect x="14" y="21" width="4"  height="4" fill="#FFD700"/>
  <rect x="13" y="22" width="6"  height="2" fill="#FFD700"/>
  <rect x="15" y="21" width="2"  height="4" fill="#FFFFFF"/>
  <rect x="14" y="22" width="4"  height="1" fill="#0060C0"/>

  <!-- ══ 벨트 ══ -->
  <rect x="9"  y="25" width="14" height="2" fill="#CC9000"/>
  <rect x="9"  y="25" width="14" height="1" fill="#FFD700"/>
  <rect x="14" y="24" width="4"  height="3" fill="#FFFFFF"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="27" width="5" height="3" fill="#1040A0"/>
  <rect x="17" y="27" width="5" height="3" fill="#1040A0"/>
  <rect x="9"  y="30" width="6" height="2" fill="#CC9000"/>
  <rect x="9"  y="30" width="6" height="1" fill="#FFD700"/>
  <rect x="17" y="30" width="6" height="2" fill="#CC9000"/>
  <rect x="17" y="30" width="6" height="1" fill="#FFD700"/>
</svg>
