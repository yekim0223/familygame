<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- ══ 마법사 고깔 (길고 화려) ══ -->
  <rect x="15" y="0" width="2" height="1" fill="#1830A0"/>
  <rect x="14" y="1" width="4" height="1" fill="#2040B8"/>
  <rect x="13" y="2" width="6" height="1" fill="#2040B8"/>
  <rect x="12" y="3" width="8" height="2" fill="#3050C8"/>
  <rect x="11" y="5" width="10" height="2" fill="#4060D8"/>
  <!-- 고깔 별 장식 -->
  <rect x="19" y="2" width="1" height="1" fill="#FFD700"/>
  <rect x="12" y="4" width="1" height="1" fill="#C0C0FF"/>
  <!-- 모자 챙 -->
  <rect x="8"  y="7" width="16" height="2" fill="#1830A0"/>
  <rect x="7"  y="8" width="18" height="1" fill="#2040B8"/>

  <!-- ══ 머리 (보라빛) ══ -->
  <rect x="8"  y="8" width="2"  height="8" fill="#6040A0"/>
  <rect x="22" y="8" width="2"  height="8" fill="#6040A0"/>
  <rect x="7"  y="9" width="2"  height="7" fill="#4020808"/>
  <rect x="23" y="9" width="2"  height="7" fill="#402080"/>
  <rect x="8"  y="16" width="3" height="2" fill="#6040A0"/>
  <rect x="21" y="16" width="3" height="2" fill="#6040A0"/>

  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="8"  width="14" height="9" fill="#F5C17A"/>
  <rect x="10" y="17" width="12" height="1" fill="#F5C17A"/>
  <rect x="11" y="18" width="10" height="1" fill="#F5C17A"/>

  <!-- ══ 눈썹 ══ -->
  <rect x="10" y="9" width="4" height="1" fill="#4020808"/>
  <rect x="18" y="9" width="4" height="1" fill="#402080"/>

  <!-- ══ 눈 (마법 빛남) ══ -->
  <rect x="10" y="11" width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="11" width="5" height="3" fill="#8050C0"/>
  <rect x="10" y="11" width="5" height="1" fill="#C090F0"/>
  <rect x="14" y="11" width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="11" width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="11" width="5" height="3" fill="#8050C0"/>
  <rect x="17" y="11" width="5" height="1" fill="#C090F0"/>
  <rect x="17" y="11" width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ 볼·입 ══ -->
  <rect x="9"  y="13" width="3" height="1" fill="#F0A090"/>
  <rect x="20" y="13" width="3" height="1" fill="#F0A090"/>
  <rect x="13" y="15" width="6" height="1" fill="#CC5533"/>
  <rect x="14" y="16" width="4" height="1" fill="#AA3311"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="19" width="4" height="2" fill="#F5C17A"/>

  <!-- ══ 마법 로브 (별빛 파랑) ══ -->
  <rect x="8"  y="21" width="16" height="2" fill="#2040B8"/>
  <rect x="8"  y="21" width="16" height="1" fill="#4060D8"/>
  <!-- 로브 몸통 -->
  <rect x="8"  y="23" width="16" height="7" fill="#1830A0"/>
  <rect x="9"  y="23" width="5"  height="3" fill="#3050C8"/>
  <!-- 별 무늬 -->
  <rect x="14" y="25" width="1" height="1" fill="#FFD700"/>
  <rect x="13" y="26" width="1" height="1" fill="#FFD700"/>
  <rect x="15" y="26" width="2" height="1" fill="#FFD700"/>
  <rect x="18" y="24" width="1" height="1" fill="#C0C0FF"/>
  <rect x="11" y="28" width="1" height="1" fill="#FFD700"/>
  <!-- 로브 양쪽 -->
  <rect x="7"  y="23" width="2" height="9" fill="#2040B8"/>
  <rect x="23" y="23" width="2" height="9" fill="#2040B8"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="28" width="5" height="2" fill="#1030808"/>
  <rect x="17" y="28" width="5" height="2" fill="#103080"/>
  <rect x="9"  y="30" width="6" height="2" fill="#2040A0"/>
  <rect x="9"  y="30" width="6" height="1" fill="#4060C0"/>
  <rect x="17" y="30" width="6" height="2" fill="#2040A0"/>
  <rect x="17" y="30" width="6" height="1" fill="#4060C0"/>
</svg>
