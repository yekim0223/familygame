<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 광전사 — 붉은 머리 (야생) -->
  <rect x="9"  y="0" width="3"  height="4" fill="#AA1010"/>
  <rect x="20" y="0" width="3"  height="4" fill="#AA1010"/>
  <rect x="9"  y="1" width="14" height="3" fill="#CC2020"/>
  <rect x="8"  y="2" width="16" height="3" fill="#EE3030"/>
  <rect x="7"  y="4" width="2"  height="9" fill="#AA1010"/>
  <rect x="23" y="4" width="2"  height="9" fill="#AA1010"/>
  <!-- 머리 위 스파이크 -->
  <rect x="10" y="0" width="2"  height="2" fill="#EE4040"/>
  <rect x="14" y="0" width="3"  height="3" fill="#EE4040"/>
  <rect x="19" y="0" width="2"  height="2" fill="#EE4040"/>
  <rect x="8"  y="13" width="3" height="2" fill="#AA1010"/>
  <rect x="21" y="13" width="3" height="2" fill="#AA1010"/>

  <!-- ══ 얼굴 (근육, 그을림) ══ -->
  <rect x="9"  y="5"  width="14" height="9" fill="#C07840"/>
  <rect x="10" y="14" width="12" height="1" fill="#C07840"/>
  <rect x="11" y="15" width="10" height="1" fill="#C07840"/>
  <!-- 전투 흉터 -->
  <rect x="9"  y="7"  width="2" height="3" fill="#A06030"/>
  <rect x="21" y="9"  width="2" height="2" fill="#A06030"/>

  <!-- ══ 눈썹 (매우 두껍게) ══ -->
  <rect x="10" y="6"  width="6" height="2" fill="#5A1A0A"/>
  <rect x="16" y="6"  width="6" height="2" fill="#5A1A0A"/>

  <!-- ══ 눈 (붉은 광기) ══ -->
  <rect x="10" y="8"  width="5" height="3" fill="#1A0808"/>
  <rect x="10" y="8"  width="5" height="2" fill="#8A0010"/>
  <rect x="10" y="8"  width="5" height="1" fill="#FF2020"/>
  <rect x="14" y="8"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="8"  width="5" height="3" fill="#1A0808"/>
  <rect x="17" y="8"  width="5" height="2" fill="#8A0010"/>
  <rect x="17" y="8"  width="5" height="1" fill="#FF2020"/>
  <rect x="17" y="8"  width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ 코·입 (포효) ══ -->
  <rect x="15" y="10" width="2" height="2" fill="#906040"/>
  <rect x="12" y="12" width="8" height="1" fill="#8B1A1A"/>
  <rect x="11" y="11" width="1" height="2" fill="#8B1A1A"/>
  <rect x="20" y="11" width="1" height="2" fill="#8B1A1A"/>
  <!-- 이빨 -->
  <rect x="13" y="12" width="2" height="1" fill="#FFFFFF"/>
  <rect x="17" y="12" width="2" height="1" fill="#FFFFFF"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="16" width="4" height="2" fill="#C07840"/>

  <!-- ══ 광전사 갑옷 (반노출, 분노) ══ -->
  <!-- 분노 아우라 -->
  <rect x="3"  y="17" width="3" height="12" fill="#AA0010"/>
  <rect x="26" y="17" width="3" height="12" fill="#AA0010"/>
  <!-- 어깨 (뿔 장식) -->
  <rect x="4"  y="15" width="7"  height="8" fill="#5A1010"/>
  <rect x="21" y="15" width="7"  height="8" fill="#5A1010"/>
  <!-- 뿔 -->
  <rect x="5"  y="13" width="2"  height="3" fill="#AA2020"/>
  <rect x="8"  y="13" width="2"  height="3" fill="#AA2020"/>
  <rect x="22" y="13" width="2"  height="3" fill="#AA2020"/>
  <rect x="25" y="13" width="2"  height="3" fill="#AA2020"/>
  <rect x="4"  y="17" width="7"  height="1" fill="#CC3030"/>
  <rect x="21" y="17" width="7"  height="1" fill="#CC3030"/>
  <rect x="4"  y="22" width="7"  height="1" fill="#883030"/>
  <rect x="21" y="22" width="7"  height="1" fill="#883030"/>
  <!-- 칼라 (체인) -->
  <rect x="11" y="17" width="10" height="1" fill="#808080"/>
  <!-- 가슴 갑옷 -->
  <rect x="9"  y="18" width="14" height="6" fill="#4A0A0A"/>
  <rect x="10" y="18" width="4"  height="3" fill="#6A1A1A"/>
  <!-- 불꽃 가슴 문양 -->
  <rect x="14" y="20" width="4"  height="4" fill="#FF4400"/>
  <rect x="13" y="21" width="6"  height="2" fill="#FF4400"/>
  <rect x="15" y="20" width="2"  height="4" fill="#FF8800"/>

  <!-- ══ 벨트 (뼈) ══ -->
  <rect x="9"  y="24" width="14" height="2" fill="#CCCCAA"/>
  <rect x="9"  y="24" width="14" height="1" fill="#EEEECC"/>
  <rect x="14" y="23" width="4"  height="3" fill="#FF4400"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="26" width="5" height="4" fill="#3A0808"/>
  <rect x="17" y="26" width="5" height="4" fill="#3A0808"/>
  <rect x="9"  y="30" width="6" height="2" fill="#5A1010"/>
  <rect x="9"  y="30" width="6" height="1" fill="#7A2020"/>
  <rect x="17" y="30" width="6" height="2" fill="#5A1010"/>
  <rect x="17" y="30" width="6" height="1" fill="#7A2020"/>
</svg>
