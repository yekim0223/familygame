<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- ══ NINJA HEAD (dark suit covers everything) ══ -->
  <!-- head shape -->
  <rect x="8"  y="2" width="16" height="14" fill="#202830"/>
  <!-- headband (navy blue) -->
  <rect x="8"  y="6" width="16" height="3" fill="#1A2A60"/>
  <rect x="8"  y="6" width="16" height="1" fill="#2A3A80"/>
  <!-- headband knot right -->
  <rect x="24" y="5" width="4" height="5" fill="#1A2A60"/>
  <rect x="25" y="10" width="2" height="3" fill="#1A2A60"/>

  <!-- ══ EYES (only visible part) ══ -->
  <rect x="10" y="7" width="5" height="3" fill="#1A0828"/>
  <rect x="10" y="7" width="5" height="2" fill="#483090"/>
  <rect x="14" y="7" width="1" height="1" fill="#FFFFFF"/>

  <rect x="17" y="7" width="5" height="3" fill="#1A0828"/>
  <rect x="17" y="7" width="5" height="2" fill="#483090"/>
  <rect x="17" y="7" width="1" height="1" fill="#FFFFFF"/>

  <!-- eye slit (mask opening) -->
  <rect x="9"  y="7" width="14" height="3" fill="none"/>
  <!-- mask above/below eyes -->
  <rect x="8"  y="10" width="16" height="6" fill="#202830"/>
  <rect x="8"  y="2"  width="16" height="5" fill="#202830"/>

  <!-- ══ NECK ══ -->
  <rect x="13" y="16" width="6" height="2" fill="#202830"/>

  <!-- ══ NINJA SUIT (very dark with subtle texture) ══ -->
  <!-- chest -->
  <rect x="8"  y="18" width="16" height="8" fill="#181E26"/>
  <rect x="9"  y="18" width="5"  height="3" fill="#222C38"/>
  <!-- diagonal scarf -->
  <rect x="8"  y="18" width="6" height="1" fill="#1A2A60"/>
  <rect x="9"  y="19" width="5" height="1" fill="#1A2A60"/>
  <rect x="10" y="20" width="4" height="1" fill="#1A2A60"/>
  <!-- utility belt -->
  <rect x="8"  y="24" width="16" height="2" fill="#2A3040"/>
  <rect x="8"  y="24" width="16" height="1" fill="#3A4050"/>
  <!-- shuriken on belt -->
  <rect x="14" y="24" width="4" height="2" fill="#A8A8A8"/>
  <rect x="15" y="23" width="2" height="3" fill="#C0C0C0"/>

  <!-- ══ LEGS ══ -->
  <rect x="10" y="26" width="5" height="4" fill="#181E26"/>
  <rect x="17" y="26" width="5" height="4" fill="#181E26"/>
  <!-- leg wraps -->
  <rect x="10" y="27" width="5" height="1" fill="#2A2E36"/>
  <rect x="17" y="27" width="5" height="1" fill="#2A2E36"/>
  <rect x="10" y="29" width="5" height="1" fill="#2A2E36"/>
  <rect x="17" y="29" width="5" height="1" fill="#2A2E36"/>

  <!-- ══ TABI BOOTS (dark split-toe) ══ -->
  <rect x="9"  y="30" width="6" height="2" fill="#141820"/>
  <rect x="9"  y="30" width="3" height="2" fill="#1C2028"/>
  <rect x="17" y="30" width="6" height="2" fill="#141820"/>
  <rect x="20" y="30" width="3" height="2" fill="#1C2028"/>
</svg>
