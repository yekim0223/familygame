<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 불사왕 — 해골 왕관 -->
  <rect x="8"  y="1" width="16" height="3" fill="#888898"/>
  <rect x="7"  y="2" width="18" height="2" fill="#9898A8"/>
  <!-- 왕관 해골 스파이크 -->
  <rect x="9"  y="0" width="3"  height="3" fill="#AAAACC"/>
  <rect x="10" y="0" width="1"  height="2" fill="#CCCCEE"/>
  <rect x="14" y="0" width="4"  height="4" fill="#AAAACC"/>
  <rect x="15" y="0" width="2"  height="3" fill="#CCCCEE"/>
  <rect x="20" y="0" width="3"  height="3" fill="#AAAACC"/>
  <rect x="21" y="0" width="1"  height="2" fill="#CCCCEE"/>
  <!-- 왕관 보석 (초록 언데드) -->
  <rect x="10" y="1" width="1"  height="1" fill="#00FF80"/>
  <rect x="15" y="1" width="2"  height="1" fill="#00FF80"/>
  <rect x="21" y="1" width="1"  height="1" fill="#00FF80"/>

  <!-- ══ 머리 (해골빛 창백) ══ -->
  <rect x="7"  y="4" width="2"  height="9" fill="#8888A0"/>
  <rect x="23" y="4" width="2"  height="9" fill="#8888A0"/>
  <rect x="6"  y="6" width="2"  height="7" fill="#606080"/>
  <rect x="24" y="6" width="2"  height="7" fill="#606080"/>
  <rect x="7"  y="13" width="3" height="2" fill="#8888A0"/>
  <rect x="22" y="13" width="3" height="2" fill="#8888A0"/>

  <!-- ══ 얼굴 (해골처럼 창백) ══ -->
  <rect x="9"  y="5"  width="14" height="9" fill="#C8C8D8"/>
  <rect x="10" y="14" width="12" height="1" fill="#C8C8D8"/>
  <rect x="11" y="15" width="10" height="1" fill="#C8C8D8"/>
  <!-- 관자놀이 어두움 -->
  <rect x="9"  y="7"  width="2" height="5" fill="#9898B0"/>
  <rect x="21" y="7"  width="2" height="5" fill="#9898B0"/>

  <!-- ══ 눈 (언데드 초록 불꽃) ══ -->
  <rect x="10" y="7"  width="6" height="4" fill="#00A040"/>
  <rect x="10" y="7"  width="6" height="2" fill="#00D060"/>
  <rect x="10" y="7"  width="6" height="1" fill="#00FF80"/>
  <rect x="15" y="7"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="16" y="7"  width="6" height="4" fill="#00A040"/>
  <rect x="16" y="7"  width="6" height="2" fill="#00D060"/>
  <rect x="16" y="7"  width="6" height="1" fill="#00FF80"/>
  <rect x="16" y="7"  width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ 코 없음 + 이빨 ══ -->
  <rect x="15" y="11" width="2" height="1" fill="#888898"/>
  <rect x="13" y="13" width="2" height="1" fill="#DDDDEE"/>
  <rect x="16" y="13" width="2" height="1" fill="#DDDDEE"/>
  <rect x="19" y="13" width="2" height="1" fill="#DDDDEE"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="16" width="4" height="2" fill="#C8C8D8"/>

  <!-- ══ 불사왕 갑옷 (뼈+어둠) ══ -->
  <!-- 어둠 아우라 -->
  <rect x="3"  y="17" width="4" height="14" fill="#002010"/>
  <rect x="25" y="17" width="4" height="14" fill="#002010"/>
  <!-- 뼈 어깨 갑옷 -->
  <rect x="4"  y="17" width="8"  height="6" fill="#AAAACC"/>
  <rect x="20" y="17" width="8"  height="6" fill="#AAAACC"/>
  <rect x="4"  y="17" width="8"  height="1" fill="#CCCCEE"/>
  <rect x="20" y="17" width="8"  height="1" fill="#CCCCEE"/>
  <!-- 해골 문양 어깨 -->
  <rect x="6"  y="19" width="4"  height="3" fill="#00FF80"/>
  <rect x="22" y="19" width="4"  height="3" fill="#00FF80"/>
  <rect x="7"  y="19" width="2"  height="2" fill="#AAAACC"/>
  <rect x="23" y="19" width="2"  height="2" fill="#AAAACC"/>
  <rect x="4"  y="22" width="8"  height="1" fill="#00FF80"/>
  <rect x="20" y="22" width="8"  height="1" fill="#00FF80"/>
  <!-- 칼라 -->
  <rect x="11" y="17" width="10" height="1" fill="#00FF80"/>
  <!-- 가슴 (어둠+뼈) -->
  <rect x="9"  y="18" width="14" height="7" fill="#1A1A2A"/>
  <rect x="10" y="18" width="4"  height="3" fill="#252535"/>
  <!-- 왕 해골 문양 -->
  <rect x="13" y="21" width="6"  height="4" fill="#AAAACC"/>
  <rect x="12" y="22" width="8"  height="2" fill="#AAAACC"/>
  <rect x="14" y="21" width="4"  height="4" fill="#CCCCEE"/>
  <rect x="13" y="23" width="2"  height="1" fill="#1A1A2A"/>
  <rect x="17" y="23" width="2"  height="1" fill="#1A1A2A"/>
  <rect x="14" y="24" width="4"  height="1" fill="#1A1A2A"/>
  <rect x="15" y="23" width="1"  height="2" fill="#CCCCEE"/>
  <rect x="17" y="23" width="1"  height="2" fill="#CCCCEE"/>

  <!-- ══ 벨트 ══ -->
  <rect x="9"  y="25" width="14" height="2" fill="#0A0A1A"/>
  <rect x="9"  y="25" width="14" height="1" fill="#1A1A2A"/>
  <rect x="14" y="24" width="4"  height="3" fill="#00FF80"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="27" width="5" height="3" fill="#1A1A2A"/>
  <rect x="17" y="27" width="5" height="3" fill="#1A1A2A"/>
  <rect x="9"  y="30" width="6" height="2" fill="#0A0A18"/>
  <rect x="9"  y="30" width="6" height="1" fill="#00FF80"/>
  <rect x="17" y="30" width="6" height="2" fill="#0A0A18"/>
  <rect x="17" y="30" width="6" height="1" fill="#00FF80"/>
</svg>
