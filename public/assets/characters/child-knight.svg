<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- ══ 투구 (강철) ══ -->
  <rect x="8"  y="1" width="16" height="5" fill="#8090A0"/>
  <rect x="7"  y="3" width="18" height="4" fill="#90A0B0"/>
  <rect x="8"  y="1" width="16" height="1" fill="#B0C0D0"/>
  <!-- 투구 바이저 -->
  <rect x="9"  y="5" width="14" height="4" fill="#607080"/>
  <rect x="9"  y="5" width="14" height="1" fill="#809090"/>
  <!-- 바이저 슬릿 (눈) -->
  <rect x="10" y="6" width="5" height="1" fill="#1A1A2A"/>
  <rect x="17" y="6" width="5" height="1" fill="#1A1A2A"/>
  <!-- 눈빛 (파랑) -->
  <rect x="11" y="6" width="3" height="1" fill="#4080C0"/>
  <rect x="18" y="6" width="3" height="1" fill="#4080C0"/>
  <!-- 목 보호대 -->
  <rect x="11" y="9" width="10" height="3" fill="#607080"/>
  <rect x="12" y="10" width="8"  height="1" fill="#8090A0"/>

  <!-- ══ 청색 망토 (뒤) ══ -->
  <rect x="5"  y="19" width="5" height="13" fill="#2040C0"/>
  <rect x="22" y="19" width="5" height="13" fill="#2040C0"/>
  <rect x="4"  y="24" width="4" height="8"  fill="#1830A0"/>
  <rect x="24" y="24" width="4" height="8"  fill="#1830A0"/>

  <!-- ══ 갑옷 (어깨) ══ -->
  <rect x="5"  y="18" width="6"  height="5" fill="#8090A0"/>
  <rect x="21" y="18" width="6"  height="5" fill="#8090A0"/>
  <rect x="5"  y="18" width="6"  height="1" fill="#B0C0D0"/>
  <rect x="21" y="18" width="6"  height="1" fill="#B0C0D0"/>
  <!-- 금 어깨 가장자리 -->
  <rect x="5"  y="22" width="6"  height="1" fill="#FFD700"/>
  <rect x="21" y="22" width="6"  height="1" fill="#FFD700"/>

  <!-- ══ 가슴 갑옷 ══ -->
  <rect x="9"  y="19" width="14" height="7" fill="#90A0B0"/>
  <rect x="10" y="19" width="5"  height="3" fill="#A0B0C0"/>
  <!-- 방패 문양 (금) -->
  <rect x="14" y="21" width="4"  height="4" fill="#FFD700"/>
  <rect x="13" y="22" width="6"  height="2" fill="#FFD700"/>
  <rect x="14" y="21" width="4"  height="1" fill="#FFEE88"/>
  <!-- 십자 문양 -->
  <rect x="15" y="21" width="2"  height="4" fill="#C8A000"/>

  <!-- ══ 허리 띠 ══ -->
  <rect x="9"  y="26" width="14" height="2" fill="#607080"/>
  <rect x="9"  y="26" width="14" height="1" fill="#8090A0"/>
  <rect x="14" y="25" width="4"  height="3" fill="#FFD700"/>

  <!-- ══ 다리 (갑옷 바지) ══ -->
  <rect x="10" y="28" width="5"  height="2" fill="#6070808"/>
  <rect x="17" y="28" width="5"  height="2" fill="#607080"/>

  <!-- ══ 철제 부츠 ══ -->
  <rect x="9"  y="30" width="6"  height="2" fill="#607080"/>
  <rect x="9"  y="30" width="6"  height="1" fill="#8090A0"/>
  <rect x="17" y="30" width="6"  height="2" fill="#607080"/>
  <rect x="17" y="30" width="6"  height="1" fill="#8090A0"/>
</svg>
