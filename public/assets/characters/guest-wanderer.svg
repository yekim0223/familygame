<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated">
  <!-- 옵저버 기본 — 이름없는 나그네 (정체불명의 여행자) -->
  <!-- 후드 (회색/갈색 망토) -->
  <rect x="7"  y="0"  width="18" height="8"  fill="#3A3028"/>
  <rect x="5"  y="2"  width="22" height="6"  fill="#4A3830"/>
  <rect x="4"  y="4"  width="3"  height="8"  fill="#3A3028"/>
  <rect x="25" y="4"  width="3"  height="8"  fill="#3A3028"/>
  <!-- 후드 그림자 (얼굴 반 가림) -->
  <rect x="8"  y="4"  width="16" height="4"  fill="#2A2018"/>
  <!-- 얼굴 (하단만 보임) -->
  <rect x="9"  y="7"  width="14" height="10" fill="#DDBB99"/>
  <!-- 보이는 눈 (한쪽만, 미스터리) -->
  <rect x="18" y="9"  width="4"  height="3"  fill="#FFFFFF"/>
  <rect x="19" y="10" width="2"  height="2"  fill="#556633"/>
  <rect x="20" y="10" width="1"  height="1"  fill="#FFFFFF"/>
  <!-- 왼쪽 눈 그림자로 가려짐 -->
  <rect x="10" y="8"  width="6"  height="4"  fill="#2A2018"/>
  <!-- 입 (중립 표정) -->
  <rect x="12" y="14" width="8"  height="1"  fill="#AA8866"/>
  <!-- 여행 스카프 -->
  <rect x="9"  y="16" width="14" height="3"  fill="#5A4433"/>
  <rect x="9"  y="16" width="14" height="1"  fill="#7A6644"/>
  <!-- 목 -->
  <rect x="13" y="17" width="6"  height="2"  fill="#DDBB99"/>
  <!-- 낡은 여행 망토 -->
  <rect x="4"  y="19" width="24" height="13" fill="#4A3830"/>
  <rect x="4"  y="19" width="24" height="2"  fill="#5A4840"/>
  <!-- 망토 낡음 효과 -->
  <rect x="4"  y="24" width="3"  height="8"  fill="#3A2820"/>
  <rect x="25" y="24" width="3"  height="8"  fill="#3A2820"/>
  <!-- 여행 가방 끈 -->
  <rect x="20" y="20" width="2"  height="12" fill="#6A4A28"/>
  <!-- 물음표 (미스터리 심볼) -->
  <rect x="9"  y="22" width="4"  height="1"  fill="#AABB66"/>
  <rect x="12" y="22" width="1"  height="3"  fill="#AABB66"/>
  <rect x="10" y="24" width="2"  height="1"  fill="#AABB66"/>
  <rect x="10" y="26" width="2"  height="1"  fill="#AABB66"/>
</svg>
