<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 신계전사 — 신성 십자 투구 -->
  <rect x="8"  y="1" width="16" height="5" fill="#FFFFFF"/>
  <rect x="7"  y="3" width="18" height="4" fill="#F0F0FF"/>
  <rect x="9"  y="1" width="14" height="1" fill="#FFFFFF"/>
  <!-- 황금 십자 문양 -->
  <rect x="14" y="0" width="4"  height="6" fill="#FFD700"/>
  <rect x="10" y="2" width="12" height="2" fill="#FFD700"/>
  <rect x="14" y="0" width="4"  height="1" fill="#FFEE88"/>
  <rect x="10" y="2" width="12" height="1" fill="#FFEE88"/>
  <!-- 신성 광채 -->
  <rect x="4"  y="2" width="4"  height="3" fill="#FFFFC0"/>
  <rect x="24" y="2" width="4"  height="3" fill="#FFFFC0"/>
  <!-- 투구 바이저 -->
  <rect x="9"  y="5" width="14" height="3" fill="#E8E8FF"/>
  <rect x="10" y="6" width="5"  height="1" fill="#A0C0FF"/>
  <rect x="17" y="6" width="5"  height="1" fill="#A0C0FF"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="8" width="4"  height="3" fill="#FFEECC"/>
  <rect x="11" y="8" width="10" height="3" fill="#E8E8FF"/>

  <!-- ══ 신계 아우라 (사방) ══ -->
  <rect x="0"  y="17" width="5" height="14" fill="#FFFFFF"/>
  <rect x="27" y="17" width="5" height="14" fill="#FFFFFF"/>
  <rect x="0"  y="15" width="4" height="4"  fill="#FFD700"/>
  <rect x="28" y="15" width="4" height="4"  fill="#FFD700"/>

  <!-- ══ 신계 갑옷 (순백+금) ══ -->
  <!-- 날개 어깨 -->
  <rect x="3"  y="17" width="9"  height="7" fill="#F0F0FF"/>
  <rect x="20" y="17" width="9"  height="7" fill="#F0F0FF"/>
  <rect x="3"  y="17" width="9"  height="1" fill="#FFFFFF"/>
  <rect x="20" y="17" width="9"  height="1" fill="#FFFFFF"/>
  <rect x="3"  y="23" width="9"  height="1" fill="#FFD700"/>
  <rect x="20" y="23" width="9"  height="1" fill="#FFD700"/>
  <!-- 칼라 (금+광채) -->
  <rect x="11" y="17" width="10" height="1" fill="#FFD700"/>
  <!-- 가슴 -->
  <rect x="9"  y="18" width="14" height="7" fill="#F0F0FF"/>
  <rect x="10" y="18" width="5"  height="3" fill="#FFFFFF"/>
  <!-- 신성 문양 (다이아몬드+십자) -->
  <rect x="14" y="20" width="4"  height="4" fill="#FFD700"/>
  <rect x="13" y="21" width="6"  height="2" fill="#FFD700"/>
  <rect x="15" y="20" width="2"  height="4" fill="#FFFFFF"/>
  <rect x="14" y="21" width="4"  height="2" fill="#FFFFFF"/>
  <rect x="15" y="21" width="2"  height="2" fill="#FFD700"/>

  <!-- ══ 벨트 ══ -->
  <rect x="9"  y="25" width="14" height="2" fill="#E0E0F8"/>
  <rect x="9"  y="25" width="14" height="1" fill="#FFFFFF"/>
  <rect x="14" y="24" width="4"  height="3" fill="#FFD700"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="27" width="5" height="3" fill="#E0E0F0"/>
  <rect x="17" y="27" width="5" height="3" fill="#E0E0F0"/>
  <rect x="9"  y="30" width="6" height="2" fill="#D8D8F0"/>
  <rect x="9"  y="30" width="6" height="1" fill="#FFD700"/>
  <rect x="17" y="30" width="6" height="2" fill="#D8D8F0"/>
  <rect x="17" y="30" width="6" height="1" fill="#FFD700"/>
</svg>
