<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- ══ HAIR auburn/red-brown ══ -->
  <rect x="9"  y="1" width="14" height="1" fill="#8B2E0A"/>
  <rect x="8"  y="2" width="16" height="3" fill="#8B2E0A"/>
  <rect x="7"  y="4" width="2"  height="10" fill="#8B2E0A"/>
  <rect x="23" y="4" width="2"  height="10" fill="#8B2E0A"/>
  <!-- ponytail right side -->
  <rect x="24" y="6" width="3" height="6" fill="#6B1E00"/>
  <rect x="25" y="12" width="2" height="4" fill="#6B1E00"/>
  <!-- hair bottom -->
  <rect x="8"  y="14" width="3" height="2" fill="#8B2E0A"/>

  <!-- ══ FACE skin ══ -->
  <rect x="9"  y="4"  width="14" height="10" fill="#F5C17A"/>
  <rect x="10" y="14" width="12" height="1"  fill="#F5C17A"/>
  <rect x="11" y="15" width="10" height="1"  fill="#F5C17A"/>

  <!-- ══ EYEBROWS ══ -->
  <rect x="10" y="5" width="5" height="1" fill="#5A1E00"/>
  <rect x="17" y="5" width="5" height="1" fill="#5A1E00"/>

  <!-- ══ EYES LEFT (blue - focused archer) ══ -->
  <rect x="10" y="7" width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="7" width="5" height="3" fill="#2050A0"/>
  <rect x="10" y="7" width="5" height="1" fill="#4080D0"/>
  <rect x="14" y="7" width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ EYES RIGHT ══ -->
  <rect x="17" y="7" width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="7" width="5" height="3" fill="#2050A0"/>
  <rect x="17" y="7" width="5" height="1" fill="#4080D0"/>
  <rect x="17" y="7" width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ NOSE ══ -->
  <rect x="15" y="10" width="2" height="1" fill="#DDA055"/>

  <!-- ══ CHEEKS ══ -->
  <rect x="9"  y="10" width="3" height="1" fill="#F0A090"/>
  <rect x="20" y="10" width="3" height="1" fill="#F0A090"/>

  <!-- ══ MOUTH (focused, slight smile) ══ -->
  <rect x="13" y="12" width="6" height="1" fill="#CC5533"/>
  <rect x="14" y="13" width="4" height="1" fill="#AA3311"/>

  <!-- ══ NECK ══ -->
  <rect x="14" y="16" width="4" height="2" fill="#F5C17A"/>

  <!-- ══ ARCHER HOOD/COLLAR (leaf green) ══ -->
  <rect x="8"  y="17" width="16" height="3" fill="#2A6020"/>
  <rect x="8"  y="17" width="16" height="1" fill="#4A8040"/>
  <!-- hood outline top -->
  <rect x="7"  y="16" width="18" height="2" fill="#1A4010"/>
  <rect x="8"  y="15" width="16" height="1" fill="#2A6020"/>

  <!-- ══ TUNIC (forest green) ══ -->
  <rect x="9"  y="20" width="14" height="6" fill="#286018"/>
  <rect x="10" y="20" width="4"  height="2" fill="#40802A"/>
  <!-- leather straps (quiver harness) -->
  <rect x="13" y="20" width="2" height="6" fill="#806030"/>
  <rect x="17" y="20" width="2" height="6" fill="#806030"/>

  <!-- ══ BELT ══ -->
  <rect x="9"  y="26" width="14" height="2" fill="#5A3820"/>
  <rect x="9"  y="26" width="14" height="1" fill="#7A5830"/>
  <rect x="14" y="25" width="4"  height="3" fill="#9A7840"/>

  <!-- ══ LEGS ══ -->
  <rect x="10" y="28" width="5" height="2" fill="#2A3820"/>
  <rect x="17" y="28" width="5" height="2" fill="#2A3820"/>

  <!-- ══ BOOTS ══ -->
  <rect x="9"  y="30" width="6" height="2" fill="#4E342E"/>
  <rect x="9"  y="30" width="6" height="1" fill="#6E5440"/>
  <rect x="17" y="30" width="6" height="2" fill="#4E342E"/>
  <rect x="17" y="30" width="6" height="1" fill="#6E5440"/>
</svg>
