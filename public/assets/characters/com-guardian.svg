  <rect x="10" y="27" width="5" height="3" fill="#305080"/>
  <rect x="17" y="27" width="5" height="3" fill="#305080"/>
  <rect x="9"  y="30" width="6" height="2" fill="#4080A0"/>
  <rect x="9"  y="30" width="6" height="1" fill="#60A0C0"/>
