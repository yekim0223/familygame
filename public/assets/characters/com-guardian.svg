  <rect x="5"  y="23" width="7"  height="1" fill="#FFD700"/>
  <rect x="20" y="23" width="7"  height="1" fill="#FFD700"/>
  <!-- 칼라 -->
  <rect x="11" y="17" width="10" height="1" fill="#FFD700"/>
  <!-- 가슴 -->
  <rect x="9"  y="18" width="14" height="7" fill="#4080A0"/>
  <rect x="10" y="18" width="5"  height="3" fill="#5090B0"/>
  <!-- 방패 문양 -->
  <rect x="13" y="21" width="6"  height="4" fill="#FFD700"/>
