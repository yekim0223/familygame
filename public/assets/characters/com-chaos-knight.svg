<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 혼돈 기사 투구 (보라+검) -->
  <rect x="8"  y="1" width="16" height="5" fill="#200840"/>
  <rect x="7"  y="3" width="18" height="4" fill="#301060"/>
  <rect x="9"  y="1" width="14" height="1" fill="#501880"/>
  <!-- 뿔 (보라) -->
  <rect x="8"  y="0" width="4"  height="4" fill="#8030C0"/>
  <rect x="9"  y="0" width="2"  height="3" fill="#C060FF"/>
  <rect x="20" y="0" width="4"  height="4" fill="#8030C0"/>
  <rect x="21" y="0" width="2"  height="3" fill="#C060FF"/>
  <!-- 혼돈 눈 슬릿 -->
  <rect x="9"  y="5" width="14" height="3" fill="#100620"/>
  <rect x="10" y="6" width="5"  height="1" fill="#8030C0"/>
  <rect x="17" y="6" width="5"  height="1" fill="#FF4400"/>
  <!-- 목 -->
  <rect x="11" y="8" width="10" height="3" fill="#100620"/>
  <rect x="14" y="11" width="4" height="2" fill="#C07840"/>
  <!-- ══ 혼돈 갑옷 ══ -->
  <!-- 혼돈 아우라 (보라+빨) -->
  <rect x="3"  y="17" width="4" height="14" fill="#5010808"/>
  <rect x="25" y="17" width="4" height="14" fill="#501080"/>
  <rect x="2"  y="21" width="3" height="8"  fill="#C060FF"/>
  <rect x="27" y="21" width="3" height="8"  fill="#FF4400"/>
  <!-- 어깨 -->
  <rect x="4"  y="17" width="8"  height="6" fill="#200840"/>
  <rect x="20" y="17" width="8"  height="6" fill="#200840"/>
  <rect x="4"  y="17" width="8"  height="1" fill="#8030C0"/>
  <rect x="20" y="17" width="8"  height="1" fill="#FF4400"/>
  <rect x="4"  y="22" width="4"  height="1" fill="#C060FF"/>
  <rect x="8"  y="22" width="4"  height="1" fill="#FF6600"/>
  <rect x="20" y="22" width="4"  height="1" fill="#FF6600"/>
  <rect x="24" y="22" width="4"  height="1" fill="#C060FF"/>
  <!-- 칼라 -->
  <rect x="11" y="17" width="5"  height="1" fill="#8030C0"/>
  <rect x="16" y="17" width="5"  height="1" fill="#FF4400"/>
  <!-- 가슴 -->
  <rect x="9"  y="18" width="14" height="6" fill="#100620"/>
  <rect x="10" y="18" width="4"  height="3" fill="#200840"/>
  <!-- 혼돈 문양 (반반) -->
  <rect x="9"  y="21" width="7"  height="3" fill="#8030C0"/>
  <rect x="16" y="21" width="7"  height="3" fill="#FF4400"/>
  <rect x="14" y="20" width="4"  height="4" fill="#FFFFFF"/>
  <rect x="15" y="20" width="2"  height="4" fill="#C060FF"/>
  <!-- ══ 벨트·다리·부츠 ══ -->
  <rect x="9"  y="24" width="14" height="2" fill="#100620"/>
  <rect x="9"  y="24" width="7"  height="1" fill="#8030C0"/>
  <rect x="16" y="24" width="7"  height="1" fill="#FF4400"/>
  <rect x="10" y="26" width="5"  height="4" fill="#100620"/>
  <rect x="17" y="26" width="5"  height="4" fill="#100620"/>
  <rect x="9"  y="30" width="6"  height="2" fill="#200840"/>
  <rect x="9"  y="30" width="6"  height="1" fill="#8030C0"/>
  <rect x="17" y="30" width="6"  height="2" fill="#200840"/>
  <rect x="17" y="30" width="6"  height="1" fill="#FF4400"/>
</svg>
