  <rect x="3"  y="16" width="10" height="8" fill="#050310"/>
  <rect x="19" y="16" width="10" height="8" fill="#050310"/>
  <rect x="3"  y="16" width="10" height="1" fill="#5000A0"/>
  <rect x="19" y="16" width="10" height="1" fill="#5000A0"/>
  <rect x="3"  y="23" width="10" height="1" fill="#C040FF"/>
