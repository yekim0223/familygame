  <rect x="9"  y="7"  width="2" height="4" fill="#5000A0"/>
  <rect x="21" y="9"  width="2" height="2" fill="#5000A0"/>
  <!-- 눈 (공허 보라) -->
  <rect x="10" y="6"  width="5" height="4" fill="#0A0010"/>
