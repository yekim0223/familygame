  <!-- ══ 벨트·다리·부츠 ══ -->
  <rect x="9"  y="24" width="14" height="2" fill="#030208"/>
  <rect x="9"  y="24" width="14" height="1" fill="#5000A0"/>
  <rect x="10" y="26" width="5"  height="4" fill="#030208"/>
  <rect x="17" y="26" width="5"  height="4" fill="#030208"/>
  <rect x="9"  y="30" width="6"  height="2" fill="#050310"/>
  <rect x="9"  y="30" width="6"  height="1" fill="#C040FF"/>
