<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 광대 모자 (방울) -->
  <rect x="8"  y="3" width="8"  height="5" fill="#CC0020"/>
  <rect x="16" y="3" width="8"  height="5" fill="#0040CC"/>
  <rect x="7"  y="4" width="18" height="3" fill="#AA0018"/>
  <!-- 방울 -->
  <rect x="8"  y="1" width="4"  height="4" fill="#CC0020"/>
  <rect x="9"  y="0" width="2"  height="2" fill="#EE2040"/>
  <rect x="10" y="0" width="2"  height="2" fill="#FFCC00"/>
  <rect x="20" y="1" width="4"  height="4" fill="#0040CC"/>
  <rect x="21" y="0" width="2"  height="2" fill="#2060EE"/>
  <rect x="21" y="0" width="2"  height="2" fill="#FFCC00"/>
  <!-- ══ 머리 (노란) ══ -->
  <rect x="8"  y="6" width="2"  height="7" fill="#E8C040"/>
  <rect x="22" y="6" width="2"  height="7" fill="#E8C040"/>
  <rect x="8"  y="13" width="3" height="1" fill="#E8C040"/>
  <rect x="21" y="13" width="3" height="1" fill="#E8C040"/>
  <!-- ══ 얼굴 (광대 분장) ══ -->
  <rect x="9"  y="6"  width="14" height="9" fill="#FFFFFF"/>
  <rect x="10" y="15" width="12" height="1" fill="#FFFFFF"/>
  <rect x="11" y="16" width="10" height="1" fill="#FFFFFF"/>
  <!-- 눈 동그라미 -->
  <rect x="9"  y="7"  width="6" height="5" fill="#CC0020"/>
  <rect x="10" y="7"  width="5" height="4" fill="#FF2040"/>
  <rect x="17" y="7"  width="6" height="5" fill="#0040CC"/>
  <rect x="17" y="7"  width="5" height="4" fill="#2060EE"/>
  <!-- 눈동자 -->
  <rect x="11" y="8"  width="3" height="3" fill="#1A0828"/>
  <rect x="11" y="8"  width="3" height="1" fill="#FFFFFF"/>
  <rect x="11" y="8"  width="1" height="1" fill="#AAAAAA"/>
  <rect x="18" y="8"  width="3" height="3" fill="#1A0828"/>
  <rect x="18" y="8"  width="3" height="1" fill="#FFFFFF"/>
  <rect x="18" y="8"  width="1" height="1" fill="#AAAAAA"/>
  <!-- 빨간 코 -->
  <rect x="14" y="11" width="4"  height="3" fill="#FF0020"/>
  <rect x="15" y="11" width="2"  height="2" fill="#FF4050"/>
  <!-- 큰 입 (웃음) -->
  <rect x="11" y="14" width="10" height="1" fill="#FF0020"/>
  <rect x="10" y="13" width="1"  height="1" fill="#FF0020"/>
  <rect x="21" y="13" width="1"  height="1" fill="#FF0020"/>
  <rect x="12" y="15" width="8"  height="1" fill="#CC0010"/>
  <rect x="13" y="14" width="6"  height="1" fill="#FFFFFF"/>
  <!-- 목 -->
  <rect x="14" y="17" width="4" height="2" fill="#FFFFFF"/>
  <!-- ══ 광대 의상 ══ -->
  <rect x="9"  y="19" width="7"  height="2" fill="#CC0020"/>
  <rect x="16" y="19" width="7"  height="2" fill="#0040CC"/>
  <rect x="9"  y="21" width="7"  height="7" fill="#EE2040"/>
  <rect x="16" y="21" width="7"  height="7" fill="#2060EE"/>
  <!-- 방울 장식 -->
  <rect x="13" y="23" width="2"  height="2" fill="#FFCC00"/>
  <rect x="17" y="25" width="2"  height="2" fill="#FFCC00"/>
  <!-- 다리 (반반) -->
  <rect x="10" y="28" width="5" height="2" fill="#EE2040"/>
  <rect x="17" y="28" width="5" height="2" fill="#2060EE"/>
  <rect x="9"  y="30" width="6" height="2" fill="#CC0020"/>
  <rect x="9"  y="30" width="6" height="1" fill="#EE2040"/>
  <rect x="17" y="30" width="6" height="2" fill="#0040CC"/>
  <rect x="17" y="30" width="6" height="1" fill="#2060EE"/>
</svg>
