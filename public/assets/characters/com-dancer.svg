<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 무희 — 꽃 머리장식 -->
  <rect x="8"  y="2" width="4"  height="3" fill="#FF69B4"/>
  <rect x="12" y="1" width="4"  height="3" fill="#FF3388"/>
  <rect x="16" y="2" width="4"  height="3" fill="#FF69B4"/>
  <rect x="10" y="2" width="12" height="2" fill="#FF4499"/>
  <!-- 꽃 중심 -->
  <rect x="15" y="1" width="2"  height="2" fill="#FFDD00"/>
  <!-- ══ 머리 (검은 윤기) ══ -->
  <rect x="9"  y="2" width="14" height="3" fill="#1A0A1A"/>
  <rect x="8"  y="4" width="16" height="3" fill="#2A1A2A"/>
  <rect x="7"  y="5" width="2"  height="8" fill="#1A0A1A"/>
  <rect x="23" y="5" width="2"  height="8" fill="#1A0A1A"/>
  <rect x="8"  y="13" width="3" height="3" fill="#1A0A1A"/>
  <rect x="21" y="13" width="3" height="3" fill="#1A0A1A"/>
  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="6"  width="14" height="8" fill="#E8A860"/>
  <rect x="10" y="14" width="12" height="1" fill="#E8A860"/>
  <rect x="11" y="15" width="10" height="1" fill="#E8A860"/>
  <!-- 눈썹·눈 (선명한 아이라인) -->
  <rect x="10" y="7"  width="5" height="1" fill="#0A0010"/>
  <rect x="17" y="7"  width="5" height="1" fill="#0A0010"/>
  <rect x="9"  y="8"  width="1" height="1" fill="#0A0010"/>
  <rect x="22" y="8"  width="1" height="1" fill="#0A0010"/>
  <rect x="10" y="9"  width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="9"  width="5" height="3" fill="#60208888"/>
  <rect x="10" y="9"  width="5" height="1" fill="#C040B0"/>
  <rect x="14" y="9"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="9"  width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="9"  width="5" height="3" fill="#602088"/>
  <rect x="17" y="9"  width="5" height="1" fill="#C040B0"/>
  <rect x="17" y="9"  width="1" height="1" fill="#FFFFFF"/>
  <!-- 볼 (붉은 연지) -->
  <rect x="9"  y="12" width="3" height="2" fill="#FF6080"/>
  <rect x="20" y="12" width="3" height="2" fill="#FF6080"/>
  <!-- 입 (붉은 입술) -->
  <rect x="13" y="13" width="6" height="1" fill="#EE1144"/>
  <rect x="14" y="14" width="4" height="1" fill="#CC0022"/>
  <!-- 목 -->
  <rect x="14" y="16" width="4" height="2" fill="#E8A860"/>
  <!-- ══ 무희 의상 ══ -->
  <!-- 목걸이 (금) -->
  <rect x="11" y="16" width="10" height="1" fill="#FFD700"/>
  <!-- 상의 (빨강) -->
  <rect x="10" y="17" width="12" height="4" fill="#CC1040"/>
  <rect x="10" y="17" width="12" height="1" fill="#EE3060"/>
  <!-- 벨 댄서 수건 (황금) -->
  <rect x="9"  y="18" width="3"  height="5" fill="#FFD700"/>
  <rect x="20" y="18" width="3"  height="5" fill="#FFD700"/>
  <rect x="9"  y="19" width="3"  height="1" fill="#FFEE88"/>
  <rect x="20" y="19" width="3"  height="1" fill="#FFEE88"/>
  <!-- 스커트 레이어 -->
  <rect x="8"  y="21" width="16" height="3" fill="#CC1040"/>
  <rect x="8"  y="21" width="16" height="1" fill="#EE3060"/>
  <rect x="7"  y="24" width="18" height="3" fill="#AA0030"/>
  <rect x="7"  y="24" width="18" height="1" fill="#CC1040"/>
  <rect x="6"  y="27" width="20" height="2" fill="#880020"/>
  <!-- 허리 장식 -->
  <rect x="9"  y="21" width="14" height="1" fill="#FFD700"/>
  <!-- 다리 (비단처럼) -->
  <rect x="11" y="28" width="4" height="2" fill="#E8A860"/>
  <rect x="17" y="28" width="4" height="2" fill="#E8A860"/>
  <!-- 발 (작은 신발) -->
  <rect x="10" y="30" width="5" height="2" fill="#CC1040"/>
  <rect x="17" y="30" width="5" height="2" fill="#CC1040"/>
  <rect x="11" y="30" width="3" height="1" fill="#EE3060"/>
  <rect x="18" y="30" width="3" height="1" fill="#EE3060"/>
</svg>
