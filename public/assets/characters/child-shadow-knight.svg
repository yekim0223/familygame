<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 그림자 기사 투구 (완전 어둠, 달 문양) -->
  <rect x="8"  y="1" width="16" height="6" fill="#050308"/>
  <rect x="7"  y="3" width="18" height="5" fill="#080510"/>
  <rect x="9"  y="1" width="14" height="1" fill="#100820"/>
  <!-- 달 문양 투구 -->
  <rect x="12" y="2" width="8"  height="4" fill="#1A1030"/>
  <rect x="13" y="2" width="6"  height="3" fill="#C0A000"/>
  <rect x="14" y="2" width="4"  height="2" fill="#E0C000"/>
  <rect x="13" y="3" width="1"  height="2" fill="#1A1030"/>
  <rect x="18" y="2" width="1"  height="3" fill="#1A1030"/>
  <!-- 투구 슬릿 -->
  <rect x="9"  y="6" width="14" height="3" fill="#050308"/>
  <rect x="10" y="7" width="5"  height="1" fill="#6040C0"/>
  <rect x="17" y="7" width="5"  height="1" fill="#6040C0"/>
  <!-- 목 -->
  <rect x="11" y="9" width="10" height="3" fill="#080510"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="12" width="4" height="2" fill="#D89050"/>

  <!-- ══ 그림자 아우라 ══ -->
  <rect x="3"  y="17" width="4" height="14" fill="#0A0818"/>
  <rect x="25" y="17" width="4" height="14" fill="#0A0818"/>

  <!-- ══ 그림자 갑옷 ══ -->
  <!-- 어깨 (안개 같이) -->
  <rect x="4"  y="17" width="8"  height="7" fill="#0D0A18"/>
  <rect x="20" y="17" width="8"  height="7" fill="#0D0A18"/>
  <rect x="4"  y="17" width="8"  height="1" fill="#1A1228"/>
  <rect x="20" y="17" width="8"  height="1" fill="#1A1228"/>
  <!-- 달 어깨 보석 -->
  <rect x="5"  y="20" width="4"  height="3" fill="#6040C0"/>
  <rect x="6"  y="19" width="3"  height="4" fill="#8060E0"/>
  <rect x="23" y="20" width="4"  height="3" fill="#6040C0"/>
  <rect x="23" y="19" width="3"  height="4" fill="#8060E0"/>
  <rect x="4"  y="23" width="8"  height="1" fill="#6040C0"/>
  <rect x="20" y="23" width="8"  height="1" fill="#6040C0"/>
  <!-- 칼라 -->
  <rect x="11" y="17" width="10" height="1" fill="#6040C0"/>
  <!-- 가슴 -->
  <rect x="9"  y="18" width="14" height="7" fill="#080510"/>
  <rect x="10" y="18" width="4"  height="3" fill="#100A20"/>
  <!-- 그림자 달 문양 -->
  <rect x="14" y="21" width="4"  height="4" fill="#C0A000"/>
  <rect x="13" y="22" width="6"  height="2" fill="#C0A000"/>
  <rect x="15" y="21" width="2"  height="4" fill="#E0C020"/>
  <rect x="14" y="22" width="4"  height="1" fill="#1A1030"/>
  <rect x="14" y="21" width="1"  height="3" fill="#1A1030"/>
  <rect x="17" y="21" width="1"  height="3" fill="#1A1030"/>

  <!-- ══ 벨트 ══ -->
  <rect x="9"  y="25" width="14" height="2" fill="#050308"/>
  <rect x="9"  y="25" width="14" height="1" fill="#100820"/>
  <rect x="14" y="24" width="4"  height="3" fill="#6040C0"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="27" width="5" height="3" fill="#080510"/>
  <rect x="17" y="27" width="5" height="3" fill="#080510"/>
  <rect x="9"  y="30" width="6" height="2" fill="#050308"/>
  <rect x="9"  y="30" width="6" height="1" fill="#100820"/>
  <rect x="17" y="30" width="6" height="2" fill="#050308"/>
  <rect x="17" y="30" width="6" height="1" fill="#100820"/>
</svg>
