<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 흑기사 투구 (완전 어둠) -->
  <rect x="8"  y="1" width="16" height="6" fill="#0A0810"/>
  <rect x="7"  y="3" width="18" height="5" fill="#100A18"/>
  <rect x="9"  y="1" width="14" height="1" fill="#1A1228"/>
  <!-- 투구 뿔 (보라빛) -->
  <rect x="9"  y="0" width="2"  height="3" fill="#4020608"/>
  <rect x="21" y="0" width="2"  height="3" fill="#402060"/>
  <!-- 눈 슬릿 (악마빛 붉은) -->
  <rect x="9"  y="5" width="14" height="3" fill="#0A0810"/>
  <rect x="10" y="6" width="5"  height="1" fill="#AA0020"/>
  <rect x="17" y="6" width="5"  height="1" fill="#AA0020"/>
  <rect x="11" y="6" width="3"  height="1" fill="#FF2040"/>
  <rect x="18" y="6" width="3"  height="1" fill="#FF2040"/>
  <!-- 목갑 -->
  <rect x="11" y="8" width="10" height="3" fill="#0A0810"/>
  <rect x="12" y="9" width="8"  height="1" fill="#1A1228"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="11" width="4" height="2" fill="#D89050"/>

  <!-- ══ 흑기사 갑옷 ══ -->
  <!-- 어둠 아우라 -->
  <rect x="4"  y="17" width="3" height="12" fill="#0A0808"/>
  <rect x="25" y="17" width="3" height="12" fill="#0A0808"/>
  <!-- 어깨 (어둠, 큰) -->
  <rect x="4"  y="17" width="8"  height="7" fill="#100A18"/>
  <rect x="20" y="17" width="8"  height="7" fill="#100A18"/>
  <rect x="4"  y="17" width="8"  height="1" fill="#1A1228"/>
  <rect x="20" y="17" width="8"  height="1" fill="#1A1228"/>
  <!-- 어깨 붉은 보석 -->
  <rect x="6"  y="19" width="3"  height="3" fill="#AA0020"/>
  <rect x="7"  y="19" width="2"  height="2" fill="#FF2040"/>
  <rect x="23" y="19" width="3"  height="3" fill="#AA0020"/>
  <rect x="23" y="19" width="2"  height="2" fill="#FF2040"/>
  <rect x="4"  y="23" width="8"  height="1" fill="#AA0020"/>
  <rect x="20" y="23" width="8"  height="1" fill="#AA0020"/>
  <!-- 칼라 -->
  <rect x="11" y="17" width="10" height="1" fill="#AA0020"/>
  <!-- 가슴 -->
  <rect x="9"  y="18" width="14" height="7" fill="#0A0810"/>
  <rect x="10" y="18" width="4"  height="3" fill="#1A1228"/>
  <!-- 악마 문양 (가슴) -->
  <rect x="14" y="21" width="4"  height="4" fill="#AA0020"/>
  <rect x="13" y="22" width="6"  height="2" fill="#AA0020"/>
  <rect x="14" y="21" width="4"  height="1" fill="#FF2040"/>
  <rect x="15" y="21" width="2"  height="4" fill="#FF4060"/>

  <!-- ══ 벨트 ══ -->
  <rect x="9"  y="25" width="14" height="2" fill="#060408"/>
  <rect x="9"  y="25" width="14" height="1" fill="#100A18"/>
  <rect x="14" y="24" width="4"  height="3" fill="#AA0020"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="27" width="5" height="3" fill="#0A0810"/>
  <rect x="17" y="27" width="5" height="3" fill="#0A0810"/>
  <rect x="9"  y="30" width="6" height="2" fill="#060408"/>
  <rect x="9"  y="30" width="6" height="1" fill="#100A18"/>
  <rect x="17" y="30" width="6" height="2" fill="#060408"/>
  <rect x="17" y="30" width="6" height="1" fill="#100A18"/>
</svg>
