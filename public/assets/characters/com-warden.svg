<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 감시자 — 녹색 레인저 모자 -->
  <rect x="9"  y="2" width="14" height="3" fill="#3A6020"/>
  <rect x="5"  y="4" width="22" height="2" fill="#2A5010"/>
  <rect x="6"  y="4" width="20" height="1" fill="#5A8030"/>
  <!-- ══ 머리 ══ -->
  <rect x="8"  y="5" width="2"  height="7" fill="#5A3010"/>
  <rect x="22" y="5" width="2"  height="7" fill="#5A3010"/>
  <rect x="8"  y="12" width="3" height="1" fill="#5A3010"/>
  <rect x="21" y="12" width="3" height="1" fill="#5A3010"/>
  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="5"  width="14" height="8" fill="#D89050"/>
  <rect x="10" y="13" width="12" height="1" fill="#D89050"/>
  <rect x="11" y="14" width="10" height="1" fill="#D89050"/>
  <!-- 눈썹·눈 -->
  <rect x="10" y="6"  width="5" height="1" fill="#3A1808"/>
  <rect x="17" y="6"  width="5" height="1" fill="#3A1808"/>
  <rect x="10" y="8"  width="5" height="3" fill="#1A0828"/>
  <rect x="10" y="8"  width="5" height="2" fill="#284820"/>
  <rect x="10" y="8"  width="5" height="1" fill="#508040"/>
  <rect x="14" y="8"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="8"  width="5" height="3" fill="#1A0828"/>
  <rect x="17" y="8"  width="5" height="2" fill="#284820"/>
  <rect x="17" y="8"  width="5" height="1" fill="#508040"/>
  <rect x="17" y="8"  width="1" height="1" fill="#FFFFFF"/>
  <!-- 볼·입 -->
  <rect x="9"  y="10" width="3" height="1" fill="#C08050"/>
  <rect x="20" y="10" width="3" height="1" fill="#C08050"/>
  <rect x="13" y="12" width="6" height="1" fill="#AA5522"/>
  <!-- 목 -->
  <rect x="14" y="15" width="4" height="2" fill="#D89050"/>
  <!-- ══ 감시자 갑옷 (초록 레인저) ══ -->
  <rect x="9"  y="17" width="14" height="2" fill="#2A5010"/>
  <rect x="9"  y="17" width="14" height="1" fill="#4A7030"/>
  <rect x="9"  y="19" width="14" height="9" fill="#284820"/>
  <rect x="8"  y="20" width="16" height="8" fill="#3A5828"/>
  <rect x="10" y="19" width="4"  height="3" fill="#4A6838"/>
  <!-- 어깨 갑옷 -->
  <rect x="6"  y="17" width="5"  height="5" fill="#4A7830"/>
  <rect x="21" y="17" width="5"  height="5" fill="#4A7830"/>
  <rect x="6"  y="17" width="5"  height="1" fill="#6A9850"/>
  <rect x="21" y="17" width="5"  height="1" fill="#6A9850"/>
  <!-- 배지 (감시 문양) -->
  <rect x="14" y="22" width="4"  height="4" fill="#6A4820"/>
  <rect x="13" y="23" width="6"  height="2" fill="#8B6A30"/>
  <rect x="15" y="22" width="2"  height="4" fill="#C8A060"/>
  <!-- 화살통 끈 -->
  <rect x="13" y="19" width="2"  height="8" fill="#6B4A18"/>
  <rect x="17" y="19" width="2"  height="8" fill="#6B4A18"/>
  <!-- 로브 옆 -->
  <rect x="7"  y="20" width="3"  height="7" fill="#1A3810"/>
  <rect x="22" y="20" width="3"  height="7" fill="#1A3810"/>
  <!-- 다리·부츠 -->
  <rect x="10" y="28" width="5" height="2" fill="#1A3010"/>
  <rect x="17" y="28" width="5" height="2" fill="#1A3010"/>
  <rect x="9"  y="30" width="6" height="2" fill="#3A5020"/>
  <rect x="9"  y="30" width="6" height="1" fill="#5A7030"/>
  <rect x="17" y="30" width="6" height="2" fill="#3A5020"/>
  <rect x="17" y="30" width="6" height="1" fill="#5A7030"/>
</svg>
