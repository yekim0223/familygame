  <rect x="17" y="28" width="5" height="2" fill="#100818"/>
  <rect x="9"  y="30" width="6" height="2" fill="#1A0828"/>
  <rect x="9"  y="30" width="6" height="1" fill="#2A1040"/>
  <rect x="17" y="30" width="6" height="2" fill="#1A0828"/>
  <rect x="17" y="30" width="6" height="1" fill="#2A1040"/>
