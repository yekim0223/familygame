<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 절대마법사 — 우주 고깔 (은하) -->
  <rect x="15" y="0" width="2"  height="1" fill="#080520"/>
  <rect x="14" y="1" width="4"  height="1" fill="#0A0828"/>
  <rect x="13" y="2" width="6"  height="2" fill="#100A38"/>
  <rect x="12" y="4" width="8"  height="2" fill="#1A1248"/>
  <rect x="11" y="6" width="10" height="2" fill="#2A2058"/>
  <!-- 우주 별 고깔 -->
  <rect x="16" y="0" width="1"  height="2" fill="#FFD700"/>
  <rect x="14" y="2" width="1"  height="1" fill="#FFFFFF"/>
  <rect x="19" y="3" width="1"  height="1" fill="#88CCFF"/>
  <rect x="12" y="5" width="1"  height="1" fill="#FF80FF"/>
  <!-- 고깔 챙 -->
  <rect x="6"  y="7" width="20" height="3" fill="#080520"/>
  <rect x="5"  y="8" width="22" height="2" fill="#100A38"/>
  <!-- 챙 별자리 -->
  <rect x="8"  y="8" width="2"  height="1" fill="#FFD700"/>
  <rect x="14" y="7" width="4"  height="1" fill="#A080FF"/>
  <rect x="22" y="8" width="2"  height="1" fill="#FFD700"/>

  <!-- ══ 머리 (백발) ══ -->
  <rect x="7"  y="9" width="2"  height="8" fill="#C0C8D8"/>
  <rect x="23" y="9" width="2"  height="8" fill="#C0C8D8"/>
  <rect x="6"  y="11" width="2" height="6" fill="#A0A8B8"/>
  <rect x="24" y="11" width="2" height="6" fill="#A0A8B8"/>
  <rect x="7"  y="17" width="3" height="2" fill="#C0C8D8"/>
  <rect x="22" y="17" width="3" height="2" fill="#C0C8D8"/>

  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="10" width="14" height="8" fill="#D8D0E0"/>
  <rect x="10" y="18" width="12" height="1" fill="#D8D0E0"/>
  <rect x="11" y="19" width="10" height="1" fill="#D8D0E0"/>

  <!-- ══ 눈썹·눈 (우주빛 보라+금) ══ -->
  <rect x="10" y="11" width="5" height="1" fill="#5040808"/>
  <rect x="17" y="11" width="5" height="1" fill="#504080"/>
  <rect x="10" y="13" width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="13" width="5" height="3" fill="#5020A0"/>
  <rect x="10" y="13" width="5" height="1" fill="#A040FF"/>
  <rect x="14" y="13" width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="13" width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="13" width="5" height="3" fill="#5020A0"/>
  <rect x="17" y="13" width="5" height="1" fill="#A040FF"/>
  <rect x="17" y="13" width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ 볼·입 ══ -->
  <rect x="9"  y="16" width="3" height="1" fill="#C0B0C8"/>
  <rect x="20" y="16" width="3" height="1" fill="#C0B0C8"/>
  <rect x="13" y="17" width="6" height="1" fill="#907090"/>
  <rect x="14" y="18" width="4" height="1" fill="#705070"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="20" width="4" height="2" fill="#D8D0E0"/>

  <!-- ══ 절대 로브 (우주) ══ -->
  <rect x="8"  y="22" width="16" height="2" fill="#050318"/>
  <rect x="8"  y="22" width="16" height="1" fill="#0A0828"/>
  <!-- 우주 마법진 칼라 -->
  <rect x="10" y="21" width="12" height="2" fill="#A040FF"/>
  <rect x="11" y="22" width="2"  height="1" fill="#FFD700"/>
  <rect x="14" y="22" width="2"  height="1" fill="#FFFFFF"/>
  <rect x="17" y="22" width="2"  height="1" fill="#88CCFF"/>
  <rect x="19" y="22" width="2"  height="1" fill="#FF80FF"/>
  <!-- 로브 -->
  <rect x="8"  y="24" width="16" height="6" fill="#030212"/>
  <rect x="7"  y="25" width="18" height="5" fill="#050318"/>
  <rect x="9"  y="24" width="5"  height="3" fill="#080520"/>
  <!-- 우주 마법진 문양 -->
  <rect x="13" y="26" width="6"  height="2" fill="#A040FF"/>
  <rect x="15" y="25" width="2"  height="4" fill="#A040FF"/>
  <rect x="14" y="26" width="4"  height="2" fill="#FFD700"/>
  <rect x="15" y="26" width="2"  height="2" fill="#FFFFFF"/>
  <!-- 별들 -->
  <rect x="9"  y="26" width="1"  height="1" fill="#FFD700"/>
  <rect x="22" y="27" width="1"  height="1" fill="#FFFFFF"/>
  <rect x="10" y="29" width="1"  height="1" fill="#88CCFF"/>
  <rect x="21" y="25" width="1"  height="1" fill="#FF80FF"/>
  <!-- 로브 옆 -->
  <rect x="5"  y="25" width="4"  height="5" fill="#030212"/>
  <rect x="23" y="25" width="4"  height="5" fill="#030212"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="30" width="5" height="2" fill="#030212"/>
  <rect x="17" y="30" width="5" height="2" fill="#030212"/>
</svg>
