  <rect x="14" y="3" width="4"  height="2" fill="#C0C0D0"/>
  <rect x="15" y="3" width="2"  height="1" fill="#E8E8F8"/>
  <!-- ══ 머리 (어두운) ══ -->
  <rect x="8"  y="6" width="2"  height="7" fill="#1A1A2A"/>
  <rect x="22" y="6" width="2"  height="7" fill="#1A1A2A"/>
  <rect x="8"  y="13" width="3" height="1" fill="#1A1A2A"/>
  <rect x="21" y="13" width="3" height="1" fill="#1A1A2A"/>
  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="6"  width="14" height="8" fill="#D89050"/>
  <rect x="10" y="14" width="12" height="1" fill="#D89050"/>
  <rect x="11" y="15" width="10" height="1" fill="#D89050"/>
  <!-- 눈썹·눈 -->
  <rect x="10" y="7"  width="5" height="1" fill="#0A0010"/>
  <rect x="17" y="7"  width="5" height="1" fill="#0A0010"/>
  <rect x="10" y="9"  width="5" height="3" fill="#1A0828"/>
  <rect x="10" y="9"  width="5" height="2" fill="#402040"/>
  <rect x="10" y="9"  width="5" height="1" fill="#8040808"/>
  <rect x="14" y="9"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="9"  width="5" height="3" fill="#1A0828"/>
  <rect x="17" y="9"  width="5" height="2" fill="#402040"/>
  <rect x="17" y="9"  width="5" height="1" fill="#804080"/>
  <rect x="17" y="9"  width="1" height="1" fill="#FFFFFF"/>
  <!-- 볼·입 -->
  <rect x="9"  y="11" width="3" height="1" fill="#C08040"/>
  <rect x="20" y="11" width="3" height="1" fill="#C08040"/>
  <rect x="13" y="13" width="6" height="1" fill="#AA5522"/>
  <!-- 목 -->
  <rect x="14" y="16" width="4" height="2" fill="#D89050"/>
  <!-- ══ 마녀사냥꾼 코트 ══ -->
  <rect x="9"  y="18" width="14" height="2" fill="#1A1A2A"/>
  <rect x="9"  y="18" width="14" height="1" fill="#2A2A3A"/>
  <rect x="9"  y="20" width="14" height="8" fill="#0A0A18"/>
  <rect x="8"  y="21" width="16" height="7" fill="#141428"/>
  <rect x="10" y="20" width="4"  height="3" fill="#1A1A28"/>
  <!-- 은 버튼 라인 -->
  <rect x="15" y="20" width="2"  height="7" fill="#606080"/>
  <rect x="15" y="21" width="2"  height="1" fill="#C0C0D0"/>
  <rect x="15" y="23" width="2"  height="1" fill="#C0C0D0"/>
  <rect x="15" y="25" width="2"  height="1" fill="#C0C0D0"/>
