  <rect x="7"  y="21" width="3"  height="7" fill="#0A0A18"/>
  <rect x="22" y="21" width="3"  height="7" fill="#0A0A18"/>
  <!-- 다리·부츠 -->
  <rect x="10" y="28" width="5" height="2" fill="#0A0A18"/>
  <rect x="17" y="28" width="5" height="2" fill="#0A0A18"/>
  <rect x="9"  y="30" width="6" height="2" fill="#1A1A28"/>
  <rect x="9"  y="30" width="6" height="1" fill="#2A2A3A"/>
  <rect x="17" y="30" width="6" height="2" fill="#1A1A28"/>
  <rect x="17" y="30" width="6" height="1" fill="#2A2A3A"/>
</svg>
