<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 마녀사냥꾼 챙 모자 (검은) -->
  <rect x="10" y="2" width="12" height="4" fill="#1A1A2A"/>
  <rect x="5"  y="5" width="22" height="2" fill="#0A0A18"/>
  <rect x="6"  y="5" width="20" height="1" fill="#2A2A3A"/>
