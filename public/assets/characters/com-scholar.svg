<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 학자 모자 (사각 학사모) -->
  <rect x="7"  y="3" width="18" height="2" fill="#1A1A2A"/>
  <rect x="8"  y="4" width="16" height="1" fill="#2A2A3A"/>
  <rect x="6"  y="4" width="20" height="1" fill="#0A0A18"/>
  <!-- 모자 꼭대기 -->
  <rect x="10" y="1" width="12" height="3" fill="#1A1A2A"/>
  <rect x="11" y="0" width="10" height="2" fill="#2A2A3A"/>
  <!-- 졸업 줄 (금) -->
  <rect x="21" y="4" width="3"  height="5" fill="#FFD700"/>
  <rect x="22" y="8" width="2"  height="3" fill="#C8A000"/>
  <!-- ══ 머리 (안경+갈색) ══ -->
  <rect x="7"  y="5" width="2"  height="8" fill="#5A3010"/>
  <rect x="23" y="5" width="2"  height="8" fill="#5A3010"/>
  <rect x="8"  y="13" width="3" height="1" fill="#5A3010"/>
  <rect x="21" y="13" width="3" height="1" fill="#5A3010"/>
  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="5"  width="14" height="9" fill="#F5C17A"/>
  <rect x="10" y="14" width="12" height="1" fill="#F5C17A"/>
  <rect x="11" y="15" width="10" height="1" fill="#F5C17A"/>
  <!-- 안경 -->
  <rect x="9"  y="7"  width="6" height="4" fill="#2A2A3A"/>
  <rect x="9"  y="7"  width="6" height="1" fill="#3A3A4A"/>
  <rect x="9"  y="10" width="6" height="1" fill="#3A3A4A"/>
  <rect x="9"  y="7"  width="1" height="4" fill="#3A3A4A"/>
  <rect x="14" y="7"  width="1" height="4" fill="#3A3A4A"/>
  <rect x="15" y="9"  width="2" height="1" fill="#2A2A3A"/>
  <rect x="17" y="7"  width="6" height="4" fill="#2A2A3A"/>
  <rect x="17" y="7"  width="6" height="1" fill="#3A3A4A"/>
  <rect x="17" y="10" width="6" height="1" fill="#3A3A4A"/>
  <rect x="17" y="7"  width="1" height="4" fill="#3A3A4A"/>
  <rect x="22" y="7"  width="1" height="4" fill="#3A3A4A"/>
  <!-- 눈 -->
  <rect x="10" y="8"  width="4" height="2" fill="#2050A0"/>
  <rect x="10" y="8"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="18" y="8"  width="4" height="2" fill="#2050A0"/>
  <rect x="18" y="8"  width="1" height="1" fill="#FFFFFF"/>
  <!-- 볼·입 -->
  <rect x="9"  y="12" width="3" height="1" fill="#F0A090"/>
  <rect x="20" y="12" width="3" height="1" fill="#F0A090"/>
  <rect x="13" y="13" width="6" height="1" fill="#CC5533"/>
  <!-- 목 -->
  <rect x="14" y="16" width="4" height="2" fill="#F5C17A"/>
  <!-- ══ 학자 가운 (진한 청남) ══ -->
  <rect x="9"  y="18" width="14" height="2" fill="#1A2858"/>
  <rect x="9"  y="18" width="14" height="1" fill="#2A3868"/>
  <rect x="9"  y="20" width="14" height="8" fill="#101A3A"/>
  <rect x="8"  y="21" width="16" height="7" fill="#1A2848"/>
  <rect x="10" y="20" width="4"  height="3" fill="#2A3858"/>
  <!-- 책 (왼손) -->
  <rect x="5"  y="20" width="5"  height="6" fill="#8B1A1A"/>
  <rect x="5"  y="20" width="5"  height="1" fill="#CC3030"/>
  <rect x="6"  y="21" width="3"  height="1" fill="#FFFFFF"/>
  <rect x="6"  y="23" width="3"  height="1" fill="#FFFFFF"/>
  <!-- 중앙 문양 (스크롤) -->
  <rect x="14" y="23" width="4"  height="4" fill="#C8A040"/>
  <rect x="15" y="22" width="2"  height="5" fill="#E8C060"/>
  <!-- 가운 옆 -->
  <rect x="7"  y="21" width="3"  height="7" fill="#101A3A"/>
  <rect x="22" y="21" width="3"  height="7" fill="#101A3A"/>
  <!-- 다리·부츠 -->
  <rect x="10" y="28" width="5" height="2" fill="#101838"/>
  <rect x="17" y="28" width="5" height="2" fill="#101838"/>
  <rect x="9"  y="30" width="6" height="2" fill="#1A2848"/>
  <rect x="9"  y="30" width="6" height="1" fill="#2A3868"/>
  <rect x="17" y="30" width="6" height="2" fill="#1A2848"/>
  <rect x="17" y="30" width="6" height="1" fill="#2A3868"/>
</svg>
