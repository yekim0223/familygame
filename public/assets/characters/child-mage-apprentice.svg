<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- ══ HAIR lavender/light purple ══ -->
  <rect x="9"  y="1" width="14" height="1" fill="#9B7FCC"/>
  <rect x="8"  y="2" width="16" height="2" fill="#9B7FCC"/>
  <!-- wizard hat base -->
  <rect x="10" y="0" width="12" height="2" fill="#2840A0"/>
  <rect x="11" y="0" width="10" height="1" fill="#1820608"/>
  <!-- hat peak -->
  <rect x="14" y="0" width="4"  height="1" fill="#2040C0"/>
  <rect x="7"  y="4" width="2"  height="9" fill="#9B7FCC"/>
  <rect x="23" y="4" width="2"  height="9" fill="#9B7FCC"/>
  <!-- twin tails down sides -->
  <rect x="6"  y="6" width="2"  height="8" fill="#7B5FAA"/>
  <rect x="24" y="6" width="2"  height="8" fill="#7B5FAA"/>
  <!-- hair bottom -->
  <rect x="8"  y="13" width="3" height="2" fill="#9B7FCC"/>
  <rect x="21" y="13" width="3" height="2" fill="#9B7FCC"/>

  <!-- ══ HAT (dark wizard blue) ══ -->
  <rect x="8"  y="3" width="16" height="2" fill="#2840A0"/>
  <rect x="7"  y="4" width="18" height="1" fill="#1A2880"/>
  <!-- hat star decoration -->
  <rect x="14" y="3" width="4" height="1" fill="#FFD700"/>
  <rect x="15" y="2" width="2" height="1" fill="#FFD700"/>

  <!-- ══ FACE skin ══ -->
  <rect x="9"  y="5"  width="14" height="9" fill="#F5C17A"/>
  <rect x="10" y="14" width="12" height="1" fill="#F5C17A"/>
  <rect x="11" y="15" width="10" height="1" fill="#F5C17A"/>

  <!-- ══ EYEBROWS (thin, curious) ══ -->
  <rect x="10" y="6" width="4" height="1" fill="#6040A0"/>
  <rect x="18" y="6" width="4" height="1" fill="#6040A0"/>

  <!-- ══ EYES LEFT (large, sparkly magic purple) ══ -->
  <rect x="10" y="8" width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="8" width="5" height="3" fill="#7050C0"/>
  <rect x="10" y="8" width="5" height="1" fill="#A080E0"/>
  <rect x="14" y="8" width="1" height="1" fill="#FFFFFF"/>
  <rect x="10" y="11" width="1" height="1" fill="#C0A0FF"/>

  <!-- ══ EYES RIGHT ══ -->
  <rect x="17" y="8" width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="8" width="5" height="3" fill="#7050C0"/>
  <rect x="17" y="8" width="5" height="1" fill="#A080E0"/>
  <rect x="17" y="8" width="1" height="1" fill="#FFFFFF"/>
  <rect x="21" y="11" width="1" height="1" fill="#C0A0FF"/>

  <!-- ══ NOSE ══ -->
  <rect x="15" y="10" width="2" height="1" fill="#DDA055"/>

  <!-- ══ CHEEKS (sparkle) ══ -->
  <rect x="9"  y="11" width="3" height="1" fill="#F0A0C0"/>
  <rect x="20" y="11" width="3" height="1" fill="#F0A0C0"/>

  <!-- ══ MOUTH (small wonder O) ══ -->
  <rect x="14" y="13" width="4" height="1" fill="#CC5533"/>
  <rect x="13" y="12" width="1" height="1" fill="#CC5533"/>
  <rect x="18" y="12" width="1" height="1" fill="#CC5533"/>

  <!-- ══ NECK ══ -->
  <rect x="14" y="16" width="4" height="2" fill="#F5C17A"/>

  <!-- ══ ROBE (deep royal blue) ══ -->
  <rect x="7"  y="18" width="18" height="2" fill="#2840A0"/>
  <rect x="7"  y="18" width="18" height="1" fill="#4060C0"/>
  <!-- robe body -->
  <rect x="8"  y="20" width="16" height="8" fill="#2030A0"/>
  <rect x="9"  y="20" width="5"  height="2" fill="#3848C0"/>
  <!-- star pattern on robe -->
  <rect x="14" y="22" width="2" height="1" fill="#FFD700"/>
  <rect x="13" y="23" width="1" height="1" fill="#FFD700"/>
  <rect x="15" y="23" width="2" height="1" fill="#FFD700"/>
  <rect x="14" y="24" width="2" height="1" fill="#FFD700"/>
  <!-- magic glow trim -->
  <rect x="8"  y="20" width="2" height="8" fill="#8060C8"/>
  <rect x="22" y="20" width="2" height="8" fill="#8060C8"/>

  <!-- ══ LEGS ══ -->
  <rect x="10" y="28" width="5" height="2" fill="#18208A"/>
  <rect x="17" y="28" width="5" height="2" fill="#18208A"/>

  <!-- ══ BOOTS (deep purple) ══ -->
  <rect x="9"  y="30" width="6" height="2" fill="#3A2060"/>
  <rect x="9"  y="30" width="6" height="1" fill="#5040A0"/>
  <rect x="17" y="30" width="6" height="2" fill="#3A2060"/>
  <rect x="17" y="30" width="6" height="1" fill="#5040A0"/>
</svg>
