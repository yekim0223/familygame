  <rect x="16" y="16" width="7"  height="2" fill="#44AAFF"/>
  <rect x="9"  y="18" width="7"  height="10" fill="#CC1166"/>
  <rect x="16" y="18" width="7"  height="10" fill="#1188CC"/>
  <rect x="8"  y="19" width="3"  height="9" fill="#CC1166"/>
  <rect x="21" y="19" width="3"  height="9" fill="#1188CC"/>
