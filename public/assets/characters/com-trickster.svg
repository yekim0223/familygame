  <rect x="8"  y="11" width="3" height="2" fill="#FF4499"/>
  <rect x="21" y="11" width="3" height="2" fill="#44AAFF"/>
  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="5"  width="14" height="7" fill="#F5C17A"/>
  <rect x="10" y="12" width="12" height="1" fill="#F5C17A"/>
