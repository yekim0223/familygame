  <rect x="15" y="18" width="2"  height="9" fill="#FFFFFF"/>
  <rect x="15" y="19" width="2"  height="1" fill="#FFD700"/>
  <rect x="15" y="22" width="2"  height="1" fill="#FFD700"/>
  <rect x="15" y="25" width="2"  height="1" fill="#FFD700"/>
