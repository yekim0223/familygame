<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 예언자 눈 문양 두건 -->
  <rect x="8"  y="2" width="16" height="4" fill="#2A1840"/>
  <rect x="7"  y="3" width="18" height="4" fill="#3A2050"/>
  <!-- 눈 문양 -->
  <rect x="13" y="2" width="6"  height="3" fill="#E8D060"/>
  <rect x="14" y="2" width="4"  height="2" fill="#FFEE80"/>
  <rect x="15" y="3" width="2"  height="1" fill="#2A1840"/>
  <rect x="16" y="2" width="1"  height="2" fill="#2A1840"/>

  <!-- ══ 머리 (보라빛 장발) ══ -->
  <rect x="7"  y="5" width="2"  height="9" fill="#5A3080"/>
  <rect x="23" y="5" width="2"  height="9" fill="#5A3080"/>
  <rect x="6"  y="7" width="2"  height="7" fill="#3A1860"/>
  <rect x="24" y="7" width="2"  height="7" fill="#3A1860"/>
  <rect x="7"  y="14" width="4" height="3" fill="#5A3080"/>
  <rect x="21" y="14" width="4" height="3" fill="#5A3080"/>

  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="6"  width="14" height="9" fill="#E8D8C0"/>
  <rect x="10" y="15" width="12" height="1" fill="#E8D8C0"/>
  <rect x="11" y="16" width="10" height="1" fill="#E8D8C0"/>

  <!-- 예언 문양 볼 -->
  <rect x="9"  y="11" width="2" height="2" fill="#8040C0"/>
  <rect x="21" y="11" width="2" height="2" fill="#8040C0"/>

  <!-- ══ 눈썹·눈 (예언 금눈) ══ -->
  <rect x="10" y="7"  width="5" height="1" fill="#3A1860"/>
  <rect x="17" y="7"  width="5" height="1" fill="#3A1860"/>
  <rect x="10" y="9"  width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="9"  width="5" height="3" fill="#806800"/>
  <rect x="10" y="9"  width="5" height="1" fill="#E8D060"/>
  <rect x="14" y="9"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="9"  width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="9"  width="5" height="3" fill="#806800"/>
  <rect x="17" y="9"  width="5" height="1" fill="#E8D060"/>
  <rect x="17" y="9"  width="1" height="1" fill="#FFFFFF"/>
  <!-- 제3의 눈 (이마) -->
  <rect x="15" y="7"  width="2" height="2" fill="#E8D060"/>
  <rect x="15" y="7"  width="2" height="1" fill="#FFFFFF"/>

  <!-- ══ 볼·입 ══ -->
  <rect x="13" y="13" width="6" height="1" fill="#B09060"/>
  <rect x="14" y="14" width="4" height="1" fill="#907040"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="17" width="4" height="2" fill="#E8D8C0"/>

  <!-- ══ 예언자 로브 ══ -->
  <rect x="9"  y="19" width="14" height="2" fill="#2A1840"/>
  <rect x="9"  y="19" width="14" height="1" fill="#5A3080"/>
  <!-- 로브 -->
  <rect x="9"  y="21" width="14" height="8" fill="#1A1028"/>
  <rect x="8"  y="22" width="16" height="7" fill="#221838"/>
  <rect x="10" y="21" width="4"  height="3" fill="#2A2040"/>
  <!-- 예언 문자 패턴 -->
  <rect x="12" y="24" width="8"  height="1" fill="#E8D060"/>
  <rect x="11" y="26" width="10" height="1" fill="#8040C0"/>
  <rect x="13" y="28" width="6"  height="1" fill="#E8D060"/>
  <!-- 예언의 구슬 -->
  <rect x="6"  y="22" width="4"  height="4" fill="#5A3080"/>
  <rect x="7"  y="23" width="2"  height="2" fill="#E8D060"/>
  <rect x="22" y="22" width="4"  height="4" fill="#5A3080"/>
  <rect x="23" y="23" width="2"  height="2" fill="#8040C0"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="29" width="5" height="1" fill="#1A1028"/>
  <rect x="17" y="29" width="5" height="1" fill="#1A1028"/>
  <rect x="9"  y="30" width="6" height="2" fill="#1A1028"/>
  <rect x="9"  y="30" width="6" height="1" fill="#2A1840"/>
  <rect x="17" y="30" width="6" height="2" fill="#1A1028"/>
  <rect x="17" y="30" width="6" height="1" fill="#2A1840"/>
</svg>
