<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 깃털 머리장식 -->
  <rect x="6"  y="0" width="2" height="5" fill="#C84020"/>
  <rect x="9"  y="0" width="2" height="4" fill="#FF8800"/>
  <rect x="12" y="0" width="2" height="6" fill="#4080FF"/>
  <rect x="15" y="0" width="2" height="5" fill="#FF4444"/>
  <rect x="18" y="0" width="2" height="4" fill="#FFCC00"/>
  <rect x="21" y="0" width="2" height="5" fill="#40C040"/>
  <rect x="24" y="0" width="2" height="4" fill="#FF69B4"/>

  <!-- 머리띠 (골드) -->
  <rect x="8"  y="4" width="16" height="2" fill="#C08020"/>
  <rect x="7"  y="5" width="18" height="1" fill="#E0A030"/>
  <!-- 보석 장식 -->
  <rect x="14" y="3" width="4"  height="3" fill="#8040C0"/>
  <rect x="15" y="3" width="2"  height="3" fill="#A060E0"/>

  <!-- ══ 머리 (검은) ══ -->
  <rect x="7"  y="5" width="2"  height="9" fill="#1A0A1A"/>
  <rect x="23" y="5" width="2"  height="9" fill="#1A0A1A"/>
  <rect x="6"  y="7" width="2"  height="7" fill="#0A0010"/>
  <rect x="24" y="7" width="2"  height="7" fill="#0A0010"/>
  <rect x="7"  y="14" width="4" height="2" fill="#1A0A1A"/>
  <rect x="21" y="14" width="4" height="2" fill="#1A0A1A"/>

  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="5"  width="14" height="10" fill="#D89050"/>
  <rect x="10" y="15" width="12" height="1"  fill="#D89050"/>
  <rect x="11" y="16" width="10" height="1"  fill="#D89050"/>

  <!-- 얼굴 부족 문양 -->
  <rect x="9"  y="8"  width="3" height="1" fill="#8040C0"/>
  <rect x="20" y="8"  width="3" height="1" fill="#8040C0"/>

  <!-- ══ 눈썹·눈 ══ -->
  <rect x="10" y="6"  width="5" height="1" fill="#0A0010"/>
  <rect x="17" y="6"  width="5" height="1" fill="#0A0010"/>
  <rect x="10" y="8"  width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="8"  width="5" height="3" fill="#6020A0"/>
  <rect x="10" y="8"  width="5" height="1" fill="#C040FF"/>
  <rect x="14" y="8"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="8"  width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="8"  width="5" height="3" fill="#6020A0"/>
  <rect x="17" y="8"  width="5" height="1" fill="#C040FF"/>
  <rect x="17" y="8"  width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ 코·입 ══ -->
  <rect x="15" y="11" width="2" height="1" fill="#B07040"/>
  <rect x="12" y="13" width="8" height="1" fill="#AA4422"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="17" width="4" height="2" fill="#D89050"/>

  <!-- ══ 주술사 의상 ══ -->
  <!-- 토템 목걸이 -->
  <rect x="10" y="17" width="12" height="2" fill="#C08020"/>
  <rect x="13" y="17" width="6"  height="3" fill="#A06010"/>
  <rect x="14" y="18" width="4"  height="2" fill="#8040C0"/>
  <!-- 로브 -->
  <rect x="8"  y="20" width="16" height="8" fill="#3A1A2A"/>
  <rect x="7"  y="21" width="18" height="7" fill="#4A2838"/>
  <rect x="9"  y="20" width="5"  height="3" fill="#5A3848"/>
  <!-- 부족 문양 (로브) -->
  <rect x="11" y="23" width="10" height="1" fill="#C08020"/>
  <rect x="10" y="25" width="12" height="1" fill="#8040C0"/>
  <!-- 지팡이 (오른손) -->
  <rect x="22" y="15" width="2"  height="13" fill="#8B5A1A"/>
  <rect x="22" y="15" width="2"  height="1"  fill="#C8A060"/>
  <!-- 마법 구슬 -->
  <rect x="21" y="13" width="4"  height="4" fill="#8040C0"/>
  <rect x="22" y="12" width="2"  height="5" fill="#A060E0"/>
  <rect x="22" y="12" width="2"  height="1" fill="#FFFFFF"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="28" width="5" height="2" fill="#2A1020"/>
  <rect x="17" y="28" width="5" height="2" fill="#2A1020"/>
  <rect x="9"  y="30" width="6" height="2" fill="#4A2A30"/>
  <rect x="9"  y="30" width="6" height="1" fill="#6A3A40"/>
  <rect x="17" y="30" width="6" height="2" fill="#4A2A30"/>
  <rect x="17" y="30" width="6" height="1" fill="#6A3A40"/>
</svg>
