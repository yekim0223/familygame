<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 요리사 모자 (높고 흰) -->
  <rect x="9"  y="0" width="14" height="6" fill="#FFFFFF"/>
  <rect x="8"  y="2" width="16" height="4" fill="#F8F8F8"/>
  <rect x="7"  y="5" width="18" height="2" fill="#EEEEEE"/>
  <rect x="10" y="0" width="12" height="1" fill="#FFFFFF"/>
  <!-- 모자 그림자 -->
  <rect x="9"  y="5" width="14" height="1" fill="#DDDDDD"/>
  <!-- ══ 머리 (짧은 갈색) ══ -->
  <rect x="7"  y="6" width="2"  height="7" fill="#8B5A1A"/>
  <rect x="23" y="6" width="2"  height="7" fill="#8B5A1A"/>
  <rect x="8"  y="13" width="3" height="1" fill="#8B5A1A"/>
  <rect x="21" y="13" width="3" height="1" fill="#8B5A1A"/>
  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="6"  width="14" height="8" fill="#F5C17A"/>
  <rect x="10" y="14" width="12" height="1" fill="#F5C17A"/>
  <rect x="11" y="15" width="10" height="1" fill="#F5C17A"/>
  <!-- 눈썹·눈 -->
  <rect x="10" y="7"  width="5" height="1" fill="#5A3010"/>
  <rect x="17" y="7"  width="5" height="1" fill="#5A3010"/>
  <rect x="10" y="9"  width="5" height="3" fill="#1A0828"/>
  <rect x="10" y="9"  width="5" height="2" fill="#5A3818"/>
  <rect x="10" y="9"  width="5" height="1" fill="#8A5830"/>
  <rect x="14" y="9"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="9"  width="5" height="3" fill="#1A0828"/>
  <rect x="17" y="9"  width="5" height="2" fill="#5A3818"/>
  <rect x="17" y="9"  width="5" height="1" fill="#8A5830"/>
  <rect x="17" y="9"  width="1" height="1" fill="#FFFFFF"/>
  <!-- 볼·입 (행복한 미소) -->
  <rect x="9"  y="11" width="3" height="1" fill="#F0A090"/>
  <rect x="20" y="11" width="3" height="1" fill="#F0A090"/>
  <rect x="12" y="12" width="8" height="1" fill="#CC5533"/>
  <rect x="11" y="11" width="1" height="1" fill="#CC5533"/>
  <rect x="20" y="11" width="1" height="1" fill="#CC5533"/>
  <rect x="13" y="13" width="6" height="1" fill="#AA3311"/>
  <!-- 목 -->
  <rect x="14" y="16" width="4" height="2" fill="#F5C17A"/>
  <!-- ══ 흰 요리사 유니폼 ══ -->
  <rect x="9"  y="18" width="14" height="2" fill="#FFFFFF"/>
  <rect x="9"  y="18" width="14" height="1" fill="#F8F8F8"/>
  <rect x="9"  y="20" width="14" height="8" fill="#F0F0F0"/>
  <rect x="8"  y="21" width="16" height="7" fill="#F8F8F8"/>
  <rect x="10" y="20" width="4"  height="3" fill="#FFFFFF"/>
  <!-- 단추 -->
  <rect x="15" y="20" width="2"  height="7" fill="#DDDDDD"/>
  <rect x="15" y="21" width="2"  height="1" fill="#888888"/>
  <rect x="15" y="23" width="2"  height="1" fill="#888888"/>
  <rect x="15" y="25" width="2"  height="1" fill="#888888"/>
  <!-- 앞치마 (빨강) -->
  <rect x="9"  y="23" width="14" height="5" fill="#CC3030"/>
  <rect x="9"  y="23" width="14" height="1" fill="#EE5050"/>
  <!-- 앞치마 주머니 -->
  <rect x="12" y="25" width="4"  height="3" fill="#AA2020"/>
  <rect x="12" y="25" width="4"  height="1" fill="#DD4040"/>
  <!-- 국자 (오른손) -->
  <rect x="22" y="18" width="2"  height="8" fill="#C8A060"/>
  <rect x="21" y="16" width="4"  height="3" fill="#C8A060"/>
  <rect x="21" y="17" width="4"  height="1" fill="#E8C080"/>
  <!-- 다리·부츠 -->
  <rect x="10" y="28" width="5" height="2" fill="#2A2A2A"/>
  <rect x="17" y="28" width="5" height="2" fill="#2A2A2A"/>
  <rect x="9"  y="30" width="6" height="2" fill="#1A1A1A"/>
  <rect x="9"  y="30" width="6" height="1" fill="#3A3A3A"/>
  <rect x="17" y="30" width="6" height="2" fill="#1A1A1A"/>
  <rect x="17" y="30" width="6" height="1" fill="#3A3A3A"/>
</svg>
