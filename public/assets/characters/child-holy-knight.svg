<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 성기사 투구 (금+흰) -->
  <rect x="9"  y="1" width="14" height="4" fill="#E8D050"/>
  <rect x="8"  y="2" width="16" height="4" fill="#F0DC60"/>
  <rect x="9"  y="1" width="14" height="1" fill="#FFEE88"/>
  <!-- 투구 날개 -->
  <rect x="4"  y="3" width="5"  height="3" fill="#FFFFFF"/>
  <rect x="23" y="3" width="5"  height="3" fill="#FFFFFF"/>
  <rect x="3"  y="4" width="4"  height="2" fill="#FFFFEE"/>
  <rect x="25" y="4" width="4"  height="2" fill="#FFFFEE"/>
  <!-- 바이저 -->
  <rect x="9"  y="5" width="14" height="4" fill="#D0C040"/>
  <rect x="10" y="6" width="5"  height="1" fill="#FFD700"/>
  <rect x="17" y="6" width="5"  height="1" fill="#FFD700"/>
  <!-- 목 갑옷 -->
  <rect x="11" y="9" width="10" height="3" fill="#D0C040"/>
  <rect x="12" y="10" width="8" height="1" fill="#F0E060"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="12" width="4" height="2" fill="#FFEECC"/>

  <!-- ══ 신성 빛 아우라 ══ -->
  <rect x="6"  y="17" width="2" height="8" fill="#FFD700"/>
  <rect x="24" y="17" width="2" height="8" fill="#FFD700"/>
  <rect x="5"  y="20" width="2" height="4" fill="#FFEE88"/>
  <rect x="25" y="20" width="2" height="4" fill="#FFEE88"/>

  <!-- ══ 흰금 갑옷 ══ -->
  <!-- 어깨 -->
  <rect x="5"  y="17" width="7"  height="6" fill="#F0E0C0"/>
  <rect x="20" y="17" width="7"  height="6" fill="#F0E0C0"/>
  <rect x="5"  y="17" width="7"  height="1" fill="#FFFFFF"/>
  <rect x="20" y="17" width="7"  height="1" fill="#FFFFFF"/>
  <rect x="5"  y="22" width="7"  height="1" fill="#FFD700"/>
  <rect x="20" y="22" width="7"  height="1" fill="#FFD700"/>
  <rect x="11" y="17" width="1"  height="1" fill="#FFD700"/>
  <rect x="20" y="17" width="1"  height="1" fill="#FFD700"/>
  <!-- 칼라 (금) -->
  <rect x="10" y="17" width="12" height="1" fill="#FFD700"/>
  <!-- 가슴 (흰) -->
  <rect x="9"  y="18" width="14" height="7" fill="#F0E0C0"/>
  <rect x="10" y="18" width="5"  height="3" fill="#FFFFFF"/>
  <!-- 십자+광선 문양 -->
  <rect x="14" y="20" width="4"  height="5" fill="#FFD700"/>
  <rect x="12" y="22" width="8"  height="2" fill="#FFD700"/>
  <rect x="15" y="20" width="2"  height="5" fill="#FFEE88"/>
  <rect x="14" y="22" width="4"  height="1" fill="#FFFFFF"/>

  <!-- ══ 벨트 ══ -->
  <rect x="9"  y="25" width="14" height="2" fill="#C8A820"/>
  <rect x="9"  y="25" width="14" height="1" fill="#FFD700"/>
  <rect x="14" y="24" width="4"  height="3" fill="#FFFFFF"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="27" width="5" height="3" fill="#E0D0A0"/>
  <rect x="17" y="27" width="5" height="3" fill="#E0D0A0"/>
  <rect x="9"  y="30" width="6" height="2" fill="#C8A820"/>
  <rect x="9"  y="30" width="6" height="1" fill="#FFD700"/>
  <rect x="17" y="30" width="6" height="2" fill="#C8A820"/>
  <rect x="17" y="30" width="6" height="1" fill="#FFD700"/>
</svg>
