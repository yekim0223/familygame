<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- ══ 마검사 — 검은 머리 스파이크 ══ -->
  <rect x="10" y="0" width="3"  height="3" fill="#1A1020"/>
  <rect x="19" y="0" width="3"  height="3" fill="#1A1020"/>
  <rect x="9"  y="1" width="14" height="3" fill="#201828"/>
  <rect x="8"  y="3" width="16" height="3" fill="#2A2030"/>
  <rect x="7"  y="4" width="2"  height="9" fill="#1A1020"/>
  <rect x="23" y="4" width="2"  height="9" fill="#1A1020"/>
  <rect x="8"  y="13" width="3" height="2" fill="#201828"/>
  <rect x="21" y="13" width="3" height="2" fill="#201828"/>

  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="5"  width="14" height="9" fill="#E8A860"/>
  <rect x="10" y="14" width="12" height="1" fill="#E8A860"/>
  <rect x="11" y="15" width="10" height="1" fill="#E8A860"/>

  <!-- ══ 눈썹·눈 (전기 보라) ══ -->
  <rect x="10" y="6"  width="5" height="1" fill="#0A0818"/>
  <rect x="17" y="6"  width="5" height="1" fill="#0A0818"/>
