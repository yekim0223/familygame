  <rect x="17" y="8"  width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="8"  width="5" height="3" fill="#6020C0"/>
  <rect x="17" y="8"  width="5" height="1" fill="#C040FF"/>
  <rect x="17" y="8"  width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ 볼·입 (날카로운 미소) ══ -->
  <rect x="13" y="12" width="7"  height="1" fill="#AA3311"/>
