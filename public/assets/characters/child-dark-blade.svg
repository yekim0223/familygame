  <rect x="9"  y="18" width="14" height="7" fill="#181020"/>
  <rect x="10" y="18" width="4"  height="3" fill="#281830"/>
  <!-- 검기 문양 (X자) -->
  <rect x="13" y="20" width="6"  height="1" fill="#C040FF"/>
  <rect x="16" y="19" width="1"  height="5" fill="#C040FF"/>
  <rect x="14" y="20" width="4"  height="3" fill="#A020E0"/>
  <rect x="15" y="20" width="2"  height="3" fill="#C040FF"/>

