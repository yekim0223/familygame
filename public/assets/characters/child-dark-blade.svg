  <rect x="19" y="11" width="1"  height="1" fill="#AA3311"/>
  <rect x="14" y="13" width="5"  height="1" fill="#881100"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="16" width="4" height="2" fill="#E8A860"/>

  <!-- ══ 마검사 갑옷 ══ -->
  <!-- 전기 아우라 -->
  <rect x="5"  y="17" width="3" height="10" fill="#6020C0"/>
  <rect x="24" y="17" width="3" height="10" fill="#6020C0"/>
  <rect x="4"  y="20" width="2" height="6"  fill="#C040FF"/>
  <rect x="26" y="20" width="2" height="6"  fill="#C040FF"/>
  <!-- 어깨 (어둠) -->
  <rect x="6"  y="17" width="6"  height="6" fill="#201828"/>
  <rect x="20" y="17" width="6"  height="6" fill="#201828"/>
  <rect x="6"  y="17" width="6"  height="1" fill="#3A2840"/>
  <rect x="20" y="17" width="6"  height="1" fill="#3A2840"/>
  <rect x="6"  y="22" width="6"  height="1" fill="#C040FF"/>
  <rect x="20" y="22" width="6"  height="1" fill="#C040FF"/>
  <rect x="11" y="17" width="1"  height="1" fill="#C040FF"/>
  <rect x="20" y="17" width="1"  height="1" fill="#C040FF"/>
