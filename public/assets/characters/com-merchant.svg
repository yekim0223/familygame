  <rect x="6"  y="22" width="5"  height="6" fill="#C8A000"/>
  <rect x="7"  y="23" width="3"  height="4" fill="#FFCC00"/>
  <rect x="7"  y="23" width="3"  height="1" fill="#FFE040"/>
