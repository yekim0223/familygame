  <rect x="9"  y="10" width="3" height="1" fill="#D09060"/>
  <rect x="20" y="10" width="3" height="1" fill="#D09060"/>
  <rect x="12" y="12" width="8" height="1" fill="#CC6633"/>
  <rect x="11" y="11" width="1" height="1" fill="#CC6633"/>
