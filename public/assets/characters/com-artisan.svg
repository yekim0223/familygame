  <rect x="10" y="28" width="5" height="2" fill="#4A3010"/>
  <rect x="17" y="28" width="5" height="2" fill="#4A3010"/>
  <rect x="9"  y="30" width="6" height="2" fill="#6A4818"/>
  <rect x="9"  y="30" width="6" height="1" fill="#9A6828"/>
  <rect x="17" y="30" width="6" height="2" fill="#6A4818"/>
  <rect x="17" y="30" width="6" height="1" fill="#9A6828"/>
