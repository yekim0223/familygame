  <rect x="9"  y="10" width="3" height="1" fill="#C08050"/>
  <rect x="20" y="10" width="3" height="1" fill="#C08050"/>
  <rect x="13" y="12" width="6" height="1" fill="#AA5533"/>
  <!-- 목 -->
  <rect x="14" y="15" width="4" height="2" fill="#E8A860"/>
