  <rect x="7"  y="5" width="2"  height="7" fill="#5A3010"/>
  <rect x="23" y="5" width="2"  height="7" fill="#5A3010"/>
  <rect x="8"  y="12" width="3" height="1" fill="#5A3010"/>
  <rect x="21" y="12" width="3" height="1" fill="#5A3010"/>
