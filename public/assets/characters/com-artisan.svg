  <rect x="10" y="8"  width="5" height="1" fill="#A07040"/>
  <rect x="14" y="8"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="8"  width="5" height="3" fill="#1A0828"/>
  <rect x="17" y="8"  width="5" height="2" fill="#604820"/>
  <rect x="17" y="8"  width="5" height="1" fill="#A07040"/>
  <rect x="17" y="8"  width="1" height="1" fill="#FFFFFF"/>
