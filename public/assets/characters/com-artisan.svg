  <rect x="9"  y="17" width="14" height="2" fill="#5A3818"/>
  <rect x="9"  y="17" width="14" height="1" fill="#8B5A28"/>
  <rect x="9"  y="19" width="14" height="9" fill="#6A4828"/>
  <rect x="8"  y="20" width="16" height="8" fill="#7A5838"/>
