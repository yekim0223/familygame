  <rect x="9"  y="5"  width="14" height="8" fill="#E8A860"/>
  <rect x="10" y="13" width="12" height="1" fill="#E8A860"/>
  <rect x="11" y="14" width="10" height="1" fill="#E8A860"/>
  <!-- 눈썹·눈 -->
  <rect x="10" y="6"  width="5" height="1" fill="#3A1808"/>
  <rect x="17" y="6"  width="5" height="1" fill="#3A1808"/>
  <rect x="10" y="8"  width="5" height="3" fill="#1A0828"/>
