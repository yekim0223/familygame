<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 군주 투구 (어둠+금) -->
  <rect x="8"  y="1" width="16" height="5" fill="#1A1208"/>
  <rect x="7"  y="3" width="18" height="4" fill="#2A2010"/>
  <rect x="9"  y="1" width="14" height="1" fill="#FFD700"/>
  <rect x="9"  y="5" width="14" height="1" fill="#FFD700"/>
  <!-- 군주 뿔 -->
  <rect x="7"  y="0" width="3"  height="4" fill="#FFD700"/>
  <rect x="8"  y="0" width="2"  height="3" fill="#FFEE88"/>
  <rect x="22" y="0" width="3"  height="4" fill="#FFD700"/>
  <rect x="22" y="0" width="2"  height="3" fill="#FFEE88"/>
  <!-- 바이저 (눈 빨강) -->
  <rect x="9"  y="5" width="14" height="3" fill="#100A08"/>
  <rect x="10" y="6" width="5"  height="1" fill="#DD2020"/>
  <rect x="17" y="6" width="5"  height="1" fill="#DD2020"/>
  <!-- 목 -->
  <rect x="11" y="8" width="10" height="3" fill="#1A1208"/>
  <rect x="14" y="11" width="4" height="2" fill="#C07840"/>
  <!-- ══ 군주 갑옷 ══ -->
  <rect x="3"  y="17" width="4" height="13" fill="#1A1208"/>
  <rect x="25" y="17" width="4" height="13" fill="#1A1208"/>
  <!-- 어깨 (큰, 금 장식) -->
  <rect x="3"  y="16" width="9"  height="8" fill="#1A1208"/>
  <rect x="20" y="16" width="9"  height="8" fill="#1A1208"/>
  <rect x="3"  y="16" width="9"  height="1" fill="#FFD700"/>
  <rect x="20" y="16" width="9"  height="1" fill="#FFD700"/>
  <rect x="3"  y="23" width="9"  height="1" fill="#AA2020"/>
  <rect x="20" y="23" width="9"  height="1" fill="#AA2020"/>
  <!-- 금 장식 어깨 -->
  <rect x="5"  y="18" width="5"  height="3" fill="#C8A000"/>
  <rect x="22" y="18" width="5"  height="3" fill="#C8A000"/>
  <rect x="11" y="17" width="10" height="1" fill="#FFD700"/>
  <!-- 가슴 -->
  <rect x="9"  y="18" width="14" height="6" fill="#100A08"/>
  <rect x="10" y="18" width="4"  height="3" fill="#1A1208"/>
  <!-- 왕 문양 (검+금) -->
  <rect x="13" y="21" width="6"  height="3" fill="#AA2020"/>
  <rect x="12" y="22" width="8"  height="1" fill="#C8A000"/>
  <rect x="15" y="20" width="2"  height="4" fill="#FFD700"/>
  <!-- ══ 벨트·다리·부츠 ══ -->
  <rect x="9"  y="24" width="14" height="2" fill="#C8A000"/>
  <rect x="9"  y="24" width="14" height="1" fill="#FFD700"/>
  <rect x="10" y="26" width="5"  height="4" fill="#100A08"/>
  <rect x="17" y="26" width="5"  height="4" fill="#100A08"/>
  <rect x="9"  y="30" width="6"  height="2" fill="#1A1208"/>
  <rect x="9"  y="30" width="6"  height="1" fill="#FFD700"/>
  <rect x="17" y="30" width="6"  height="2" fill="#1A1208"/>
  <rect x="17" y="30" width="6"  height="1" fill="#FFD700"/>
</svg>
