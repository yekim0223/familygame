<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 성검사 — 신성 광휘 머리 -->
  <rect x="9"  y="1" width="14" height="3" fill="#F0D060"/>
  <rect x="8"  y="2" width="16" height="3" fill="#FFEE80"/>
  <rect x="7"  y="4" width="2"  height="8" fill="#F0D060"/>
  <rect x="23" y="4" width="2"  height="8" fill="#F0D060"/>
  <!-- 성검 문양 머리 위 -->
  <rect x="14" y="0" width="4"  height="3" fill="#FFFFFF"/>
  <rect x="15" y="0" width="2"  height="2" fill="#FFD700"/>
  <rect x="8"  y="12" width="3" height="2" fill="#F0D060"/>
  <rect x="21" y="12" width="3" height="2" fill="#F0D060"/>

  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="5"  width="14" height="8" fill="#FFEECC"/>
  <rect x="10" y="13" width="12" height="1" fill="#FFEECC"/>
  <rect x="11" y="14" width="10" height="1" fill="#FFEECC"/>

  <!-- ══ 눈썹·눈 (신성 빛) ══ -->
  <rect x="10" y="6"  width="5" height="1" fill="#C0A020"/>
  <rect x="17" y="6"  width="5" height="1" fill="#C0A020"/>
  <rect x="10" y="8"  width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="8"  width="5" height="3" fill="#D0A000"/>
  <rect x="10" y="8"  width="5" height="1" fill="#FFDD00"/>
  <rect x="14" y="8"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="8"  width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="8"  width="5" height="3" fill="#D0A000"/>
  <rect x="17" y="8"  width="5" height="1" fill="#FFDD00"/>
  <rect x="17" y="8"  width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ 볼·입 ══ -->
  <rect x="9"  y="10" width="3" height="1" fill="#FFD0A0"/>
  <rect x="20" y="10" width="3" height="1" fill="#FFD0A0"/>
  <rect x="13" y="11" width="6" height="1" fill="#D09040"/>
  <rect x="14" y="12" width="4" height="1" fill="#B07020"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="15" width="4" height="2" fill="#FFEECC"/>

  <!-- ══ 성검사 갑옷 (순금) ══ -->
  <!-- 신성 아우라 -->
  <rect x="4"  y="17" width="4" height="12" fill="#FFD700"/>
  <rect x="24" y="17" width="4" height="12" fill="#FFD700"/>
  <rect x="3"  y="20" width="3" height="7"  fill="#FFEE88"/>
  <rect x="26" y="20" width="3" height="7"  fill="#FFEE88"/>
  <!-- 어깨 (금) -->
  <rect x="5"  y="17" width="7"  height="6" fill="#E8D040"/>
  <rect x="20" y="17" width="7"  height="6" fill="#E8D040"/>
  <rect x="5"  y="17" width="7"  height="1" fill="#FFEE80"/>
  <rect x="20" y="17" width="7"  height="1" fill="#FFEE80"/>
  <rect x="5"  y="22" width="7"  height="1" fill="#C8A000"/>
  <rect x="20" y="22" width="7"  height="1" fill="#C8A000"/>
  <!-- 칼라 -->
  <rect x="11" y="17" width="10" height="1" fill="#FFFFFF"/>
  <!-- 가슴 (순금) -->
  <rect x="9"  y="18" width="14" height="7" fill="#E8D040"/>
  <rect x="10" y="18" width="5"  height="3" fill="#FFEE80"/>
  <!-- 성검 십자 + 빛 -->
  <rect x="14" y="20" width="4"  height="5" fill="#FFFFFF"/>
  <rect x="12" y="22" width="8"  height="2" fill="#FFFFFF"/>
  <rect x="15" y="20" width="2"  height="5" fill="#FFD700"/>
  <rect x="14" y="22" width="4"  height="1" fill="#FFD700"/>

  <!-- ══ 벨트 ══ -->
  <rect x="9"  y="25" width="14" height="2" fill="#C8A000"/>
  <rect x="9"  y="25" width="14" height="1" fill="#FFDD00"/>
  <rect x="14" y="24" width="4"  height="3" fill="#FFFFFF"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="27" width="5" height="3" fill="#D8C030"/>
  <rect x="17" y="27" width="5" height="3" fill="#D8C030"/>
  <rect x="9"  y="30" width="6" height="2" fill="#C8A000"/>
  <rect x="9"  y="30" width="6" height="1" fill="#FFDD00"/>
  <rect x="17" y="30" width="6" height="2" fill="#C8A000"/>
  <rect x="17" y="30" width="6" height="1" fill="#FFDD00"/>
</svg>
