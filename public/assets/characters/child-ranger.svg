<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- ══ 레인저 챙 모자 ══ -->
  <rect x="10" y="1" width="12" height="3" fill="#5A7A30"/>
  <rect x="6"  y="3" width="20" height="2" fill="#4A6A20"/>
  <rect x="10" y="2" width="12" height="1" fill="#7A9A50"/>
  <!-- 깃털 장식 -->
  <rect x="20" y="0" width="2" height="5" fill="#8B5A1A"/>
  <rect x="21" y="0" width="1" height="4" fill="#C8A060"/>

  <!-- ══ 머리 (밤색) ══ -->
  <rect x="8"  y="4" width="2"  height="9" fill="#8B4A1A"/>
  <rect x="22" y="4" width="2"  height="9" fill="#8B4A1A"/>
  <rect x="7"  y="5" width="2"  height="8" fill="#6B3A0A"/>
  <rect x="23" y="5" width="2"  height="8" fill="#6B3A0A"/>
  <rect x="8"  y="13" width="4" height="2" fill="#8B4A1A"/>
  <rect x="20" y="13" width="4" height="2" fill="#8B4A1A"/>

  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="5"  width="14" height="9" fill="#E8A860"/>
  <rect x="10" y="14" width="12" height="1" fill="#E8A860"/>
  <rect x="11" y="15" width="10" height="1" fill="#E8A860"/>

  <!-- ══ 눈썹 ══ -->
  <rect x="10" y="6" width="5" height="1" fill="#5A2A0A"/>
  <rect x="17" y="6" width="5" height="1" fill="#5A2A0A"/>

  <!-- ══ 눈 (초록, 집중) ══ -->
  <rect x="10" y="8" width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="8" width="5" height="3" fill="#287028"/>
  <rect x="10" y="8" width="5" height="1" fill="#48A848"/>
  <rect x="14" y="8" width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="8" width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="8" width="5" height="3" fill="#287028"/>
  <rect x="17" y="8" width="5" height="1" fill="#48A848"/>
  <rect x="17" y="8" width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ 볼·입 ══ -->
  <rect x="9"  y="10" width="3" height="1" fill="#D09060"/>
  <rect x="20" y="10" width="3" height="1" fill="#D09060"/>
  <rect x="13" y="12" width="6" height="1" fill="#AA5522"/>
  <rect x="14" y="13" width="4" height="1" fill="#883311"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="16" width="4" height="2" fill="#E8A860"/>

  <!-- ══ 초록 레인저 후드 ══ -->
  <rect x="8"  y="17" width="16" height="3" fill="#3A6820"/>
  <rect x="8"  y="17" width="16" height="1" fill="#5A8840"/>
  <rect x="7"  y="16" width="18" height="2" fill="#2A5010"/>
  <rect x="8"  y="15" width="16" height="1" fill="#3A6820"/>

  <!-- ══ 가죽 조끼 ══ -->
  <rect x="9"  y="20" width="14" height="6" fill="#7A5028"/>
  <rect x="10" y="20" width="4"  height="2" fill="#9A7040"/>
  <!-- 쿼이버 (화살통) 끈 -->
  <rect x="13" y="20" width="2"  height="6" fill="#5A3810"/>
  <rect x="17" y="20" width="2"  height="6" fill="#5A3810"/>
  <!-- 화살통 (오른쪽) -->
  <rect x="22" y="17" width="4"  height="9" fill="#8B5A1A"/>
  <rect x="22" y="17" width="4"  height="1" fill="#C8A060"/>
  <!-- 화살 깃 -->
  <rect x="23" y="16" width="1"  height="4" fill="#FF6666"/>
  <rect x="24" y="15" width="1"  height="4" fill="#FF6666"/>

  <!-- ══ 벨트 ══ -->
  <rect x="9"  y="26" width="14" height="2" fill="#5A3810"/>
  <rect x="9"  y="26" width="14" height="1" fill="#8B5A28"/>
  <rect x="14" y="25" width="4"  height="3" fill="#C8A060"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="28" width="5" height="2" fill="#3A5020"/>
  <rect x="17" y="28" width="5" height="2" fill="#3A5020"/>
  <rect x="9"  y="30" width="6" height="2" fill="#5A3810"/>
  <rect x="9"  y="30" width="6" height="1" fill="#8B5A28"/>
  <rect x="17" y="30" width="6" height="2" fill="#5A3810"/>
  <rect x="17" y="30" width="6" height="1" fill="#8B5A28"/>
</svg>
