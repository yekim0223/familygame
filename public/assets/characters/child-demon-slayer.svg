<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 악마사냥꾼 — 붉은 불꽃 머리 -->
  <rect x="10" y="0" width="3"  height="3" fill="#FF2000"/>
  <rect x="15" y="0" width="2"  height="4" fill="#FF4400"/>
  <rect x="19" y="0" width="3"  height="3" fill="#FF2000"/>
  <rect x="9"  y="1" width="14" height="3" fill="#EE3010"/>
  <rect x="8"  y="3" width="16" height="3" fill="#CC2008"/>
  <rect x="7"  y="5" width="2"  height="8" fill="#AA1800"/>
  <rect x="23" y="5" width="2"  height="8" fill="#AA1800"/>
  <rect x="8"  y="13" width="3" height="2" fill="#AA1800"/>
  <rect x="21" y="13" width="3" height="2" fill="#AA1800"/>

  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="5"  width="14" height="9" fill="#E8A060"/>
  <rect x="10" y="14" width="12" height="1" fill="#E8A060"/>
  <rect x="11" y="15" width="10" height="1" fill="#E8A060"/>

  <!-- ══ 눈썹·눈 (불꽃 주황) ══ -->
  <rect x="10" y="6"  width="6" height="1" fill="#7A1A0A"/>
  <rect x="16" y="6"  width="6" height="1" fill="#7A1A0A"/>
  <rect x="10" y="8"  width="5" height="4" fill="#1A0808"/>
  <rect x="10" y="8"  width="5" height="3" fill="#C04000"/>
  <rect x="10" y="8"  width="5" height="1" fill="#FF8800"/>
  <rect x="14" y="8"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="8"  width="5" height="4" fill="#1A0808"/>
  <rect x="17" y="8"  width="5" height="3" fill="#C04000"/>
  <rect x="17" y="8"  width="5" height="1" fill="#FF8800"/>
  <rect x="17" y="8"  width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ 볼·입 ══ -->
  <rect x="9"  y="11" width="3" height="1" fill="#E09060"/>
  <rect x="20" y="11" width="3" height="1" fill="#E09060"/>
  <rect x="13" y="12" width="6" height="1" fill="#CC4422"/>
  <rect x="14" y="13" width="4" height="1" fill="#AA2200"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="16" width="4" height="2" fill="#E8A060"/>

  <!-- ══ 사냥꾼 갑옷 (검+불꽃) ══ -->
  <!-- 불꽃 아우라 -->
  <rect x="4"  y="17" width="3" height="13" fill="#FF4400"/>
  <rect x="25" y="17" width="3" height="13" fill="#FF4400"/>
  <!-- 어깨 (어둠+불꽃 테두리) -->
  <rect x="5"  y="17" width="7"  height="6" fill="#1A0808"/>
  <rect x="20" y="17" width="7"  height="6" fill="#1A0808"/>
  <rect x="5"  y="17" width="7"  height="1" fill="#FF4400"/>
  <rect x="20" y="17" width="7"  height="1" fill="#FF4400"/>
  <rect x="5"  y="22" width="7"  height="1" fill="#FF8800"/>
  <rect x="20" y="22" width="7"  height="1" fill="#FF8800"/>
  <!-- 칼라 -->
  <rect x="11" y="17" width="10" height="1" fill="#FF4400"/>
  <!-- 가슴 -->
  <rect x="9"  y="18" width="14" height="7" fill="#0A0808"/>
  <rect x="10" y="18" width="4"  height="3" fill="#1A1010"/>
  <!-- 악마 사냥 문양 (X+불꽃) -->
  <rect x="12" y="20" width="8"  height="1" fill="#FF4400"/>
  <rect x="15" y="19" width="2"  height="5" fill="#FF4400"/>
  <rect x="12" y="23" width="8"  height="1" fill="#FF4400"/>
  <rect x="14" y="21" width="4"  height="2" fill="#FF8800"/>

  <!-- ══ 벨트 ══ -->
  <rect x="9"  y="25" width="14" height="2" fill="#0A0808"/>
  <rect x="9"  y="25" width="14" height="1" fill="#1A1010"/>
  <rect x="14" y="24" width="4"  height="3" fill="#FF4400"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="27" width="5" height="3" fill="#0A0808"/>
  <rect x="17" y="27" width="5" height="3" fill="#0A0808"/>
  <rect x="9"  y="30" width="6" height="2" fill="#1A0808"/>
  <rect x="9"  y="30" width="6" height="1" fill="#FF4400"/>
  <rect x="17" y="30" width="6" height="2" fill="#1A0808"/>
  <rect x="17" y="30" width="6" height="1" fill="#FF4400"/>
</svg>
