<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 패왕 투구 (검은 금 혼합) -->
  <rect x="8"  y="1" width="16" height="5" fill="#1A1208"/>
  <rect x="7"  y="3" width="18" height="4" fill="#242010"/>
  <!-- 금 문양 장식 -->
  <rect x="9"  y="2" width="14" height="1" fill="#FFD700"/>
  <rect x="9"  y="5" width="14" height="1" fill="#FFD700"/>
  <!-- 투구 뿔 (황금) -->
  <rect x="7"  y="0" width="4"  height="4" fill="#FFD700"/>
  <rect x="8"  y="0" width="2"  height="3" fill="#FFEE88"/>
  <rect x="21" y="0" width="4"  height="4" fill="#FFD700"/>
  <rect x="22" y="0" width="2"  height="3" fill="#FFEE88"/>
  <!-- 바이저 (눈 슬릿 빨강) -->
  <rect x="9"  y="5" width="14" height="3" fill="#0A0808"/>
  <rect x="10" y="6" width="5"  height="1" fill="#FF4400"/>
  <rect x="17" y="6" width="5"  height="1" fill="#FF4400"/>
  <!-- 목 갑옷 -->
  <rect x="11" y="8" width="10" height="3" fill="#1A1208"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="11" width="4" height="2" fill="#D09050"/>

  <!-- ══ 패왕 갑옷 ══ -->
  <!-- 불꽃 아우라 -->
  <rect x="2"  y="17" width="4" height="14" fill="#FF4400"/>
  <rect x="26" y="17" width="4" height="14" fill="#FF4400"/>
  <rect x="1"  y="20" width="3" height="10" fill="#FF8800"/>
  <rect x="28" y="20" width="3" height="10" fill="#FF8800"/>
  <!-- 어깨 (거대) -->
  <rect x="3"  y="16" width="10" height="8" fill="#1A1208"/>
  <rect x="19" y="16" width="10" height="8" fill="#1A1208"/>
  <rect x="3"  y="16" width="10" height="1" fill="#FFD700"/>
  <rect x="19" y="16" width="10" height="1" fill="#FFD700"/>
  <rect x="3"  y="23" width="10" height="1" fill="#FF4400"/>
  <rect x="19" y="23" width="10" height="1" fill="#FF4400"/>
  <!-- 어깨 해골 문양 -->
  <rect x="5"  y="18" width="5"  height="3" fill="#FFD700"/>
  <rect x="22" y="18" width="5"  height="3" fill="#FFD700"/>
  <!-- 칼라 (황금) -->
  <rect x="12" y="16" width="8"  height="1" fill="#FFD700"/>
  <!-- 가슴 -->
  <rect x="9"  y="17" width="14" height="7" fill="#0A0808"/>
  <rect x="10" y="17" width="4"  height="3" fill="#181008"/>
  <!-- 패왕 문양 -->
  <rect x="13" y="20" width="6"  height="4" fill="#FF4400"/>
  <rect x="12" y="21" width="8"  height="2" fill="#FF4400"/>
  <rect x="15" y="20" width="2"  height="4" fill="#FF8800"/>
  <rect x="14" y="22" width="4"  height="1" fill="#FFD700"/>

  <!-- ══ 벨트 ══ -->
  <rect x="9"  y="24" width="14" height="2" fill="#C8A000"/>
  <rect x="9"  y="24" width="14" height="1" fill="#FFD700"/>
  <rect x="14" y="23" width="4"  height="3" fill="#FF4400"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="26" width="5" height="4" fill="#0A0808"/>
  <rect x="17" y="26" width="5" height="4" fill="#0A0808"/>
  <rect x="9"  y="30" width="6" height="2" fill="#1A1208"/>
  <rect x="9"  y="30" width="6" height="1" fill="#FFD700"/>
  <rect x="17" y="30" width="6" height="2" fill="#1A1208"/>
  <rect x="17" y="30" width="6" height="1" fill="#FFD700"/>
</svg>
