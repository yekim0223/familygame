<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 성직자 수녀 두건 -->
  <rect x="8"  y="2" width="16" height="5" fill="#1A1A2A"/>
  <rect x="7"  y="4" width="18" height="3" fill="#2A2A3A"/>
  <rect x="9"  y="2" width="14" height="1" fill="#3A3A4A"/>
  <!-- 흰 두건 안쪽 -->
  <rect x="10" y="4" width="12" height="3" fill="#F0F0F8"/>
  <!-- 십자 -->
  <rect x="15" y="1" width="2"  height="5" fill="#C8A000"/>
  <rect x="13" y="2" width="6"  height="2" fill="#C8A000"/>
  <!-- ══ 머리 ══ -->
  <rect x="7"  y="6" width="2"  height="7" fill="#1A1A2A"/>
  <rect x="23" y="6" width="2"  height="7" fill="#1A1A2A"/>
  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="6"  width="14" height="8" fill="#FFE8CC"/>
  <rect x="10" y="14" width="12" height="1" fill="#FFE8CC"/>
  <rect x="11" y="15" width="10" height="1" fill="#FFE8CC"/>
  <!-- 눈썹·눈 -->
  <rect x="10" y="7"  width="5" height="1" fill="#6A4A20"/>
  <rect x="17" y="7"  width="5" height="1" fill="#6A4A20"/>
  <rect x="10" y="9"  width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="9"  width="5" height="3" fill="#3050808"/>
  <rect x="10" y="9"  width="5" height="1" fill="#5080D0"/>
  <rect x="14" y="9"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="9"  width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="9"  width="5" height="3" fill="#305080"/>
  <rect x="17" y="9"  width="5" height="1" fill="#5080D0"/>
  <rect x="17" y="9"  width="1" height="1" fill="#FFFFFF"/>
  <!-- 볼·입 -->
  <rect x="9"  y="12" width="3" height="1" fill="#FFD0D0"/>
  <rect x="20" y="12" width="3" height="1" fill="#FFD0D0"/>
  <rect x="13" y="13" width="6" height="1" fill="#CC7777"/>
  <!-- 목 -->
  <rect x="14" y="16" width="4" height="2" fill="#FFE8CC"/>
  <!-- ══ 검은 수도복 ══ -->
  <rect x="9"  y="18" width="14" height="2" fill="#1A1A2A"/>
  <rect x="9"  y="18" width="14" height="1" fill="#2A2A3A"/>
  <rect x="9"  y="20" width="14" height="8" fill="#0A0A18"/>
  <rect x="8"  y="21" width="16" height="7" fill="#141428"/>
  <rect x="10" y="20" width="4"  height="3" fill="#1A1A28"/>
  <!-- 흰 칼라 -->
  <rect x="10" y="18" width="12" height="2" fill="#F0F0F8"/>
  <rect x="12" y="18" width="8"  height="1" fill="#FFFFFF"/>
  <!-- 금 십자 목걸이 -->
  <rect x="14" y="20" width="4"  height="5" fill="#C8A000"/>
  <rect x="12" y="22" width="8"  height="2" fill="#C8A000"/>
  <rect x="15" y="20" width="2"  height="5" fill="#E8C020"/>
  <!-- 로브 옆 -->
  <rect x="7"  y="21" width="3"  height="7" fill="#0A0A18"/>
  <rect x="22" y="21" width="3"  height="7" fill="#0A0A18"/>
  <!-- 다리·부츠 -->
  <rect x="10" y="28" width="5" height="2" fill="#0A0A18"/>
  <rect x="17" y="28" width="5" height="2" fill="#0A0A18"/>
  <rect x="9"  y="30" width="6" height="2" fill="#0A0A18"/>
  <rect x="9"  y="30" width="6" height="1" fill="#1A1A28"/>
  <rect x="17" y="30" width="6" height="2" fill="#0A0A18"/>
  <rect x="17" y="30" width="6" height="1" fill="#1A1A28"/>
</svg>
