  <rect x="21" y="2" width="2"  height="1" fill="#FF40C0"/>
  <!-- ══ 머리 (은하 은발) ══ -->
  <rect x="7"  y="3" width="2"  height="9" fill="#5060A8"/>
  <rect x="23" y="3" width="2"  height="9" fill="#5060A8"/>
  <rect x="6"  y="5" width="2"  height="7" fill="#3A4888"/>
  <rect x="24" y="5" width="2"  height="7" fill="#3A4888"/>
  <rect x="7"  y="12" width="3" height="3" fill="#5060A8"/>
  <rect x="22" y="12" width="3" height="3" fill="#5060A8"/>
  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="3"  width="14" height="10" fill="#E8D8F8"/>
  <rect x="10" y="13" width="12" height="1"  fill="#E8D8F8"/>
  <rect x="11" y="14" width="10" height="1"  fill="#E8D8F8"/>
