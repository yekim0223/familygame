  <rect x="9"  y="0" width="3"  height="3" fill="#FF0040"/>
  <rect x="9"  y="0" width="1"  height="2" fill="#FF6080"/>
  <rect x="14" y="0" width="4"  height="4" fill="#FFD700"/>
