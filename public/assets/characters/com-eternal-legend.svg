  <rect x="12" y="17" width="2"  height="1" fill="#FF0040"/>
  <rect x="14" y="17" width="2"  height="1" fill="#FFD700"/>
  <rect x="16" y="17" width="2"  height="1" fill="#00C0FF"/>
  <rect x="18" y="17" width="2"  height="1" fill="#C060FF"/>
