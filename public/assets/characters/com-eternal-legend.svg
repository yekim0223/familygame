  <rect x="13" y="21" width="6"  height="3" fill="#FF0040"/>
  <rect x="14" y="20" width="5"  height="4" fill="#FFD700"/>
  <rect x="15" y="19" width="3"  height="5" fill="#00C0FF"/>
  <rect x="15" y="21" width="2"  height="2" fill="#FFFFFF"/>
