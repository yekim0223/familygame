  <rect x="9"  y="24" width="14" height="2" fill="#0A0520"/>
  <rect x="9"  y="24" width="4"  height="1" fill="#FF0040"/>
  <rect x="13" y="24" width="3"  height="1" fill="#FFD700"/>
  <rect x="16" y="24" width="3"  height="1" fill="#00C0FF"/>
  <rect x="19" y="24" width="4"  height="1" fill="#C060FF"/>
  <rect x="10" y="26" width="5"  height="4" fill="#0A0520"/>
  <rect x="17" y="26" width="5"  height="4" fill="#0A0520"/>
  <rect x="9"  y="30" width="6"  height="2" fill="#150838"/>
  <rect x="9"  y="30" width="3"  height="1" fill="#FF0040"/>
  <rect x="12" y="30" width="3"  height="1" fill="#FFD700"/>
  <rect x="17" y="30" width="3"  height="1" fill="#00C0FF"/>
  <rect x="20" y="30" width="3"  height="1" fill="#C060FF"/>
