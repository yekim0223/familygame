  <rect x="8"  y="17" width="2"  height="1" fill="#FFD700"/>
  <rect x="10" y="17" width="3"  height="1" fill="#00C0FF"/>
  <rect x="19" y="17" width="3"  height="1" fill="#FF80C0"/>
  <rect x="22" y="17" width="2"  height="1" fill="#FFD700"/>
  <rect x="24" y="17" width="2"  height="1" fill="#C060FF"/>
