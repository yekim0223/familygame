  <rect x="14" y="1" width="4"  height="5" fill="#CC0020"/>
  <rect x="10" y="3" width="12" height="2" fill="#CC0020"/>
  <rect x="15" y="1" width="2"  height="5" fill="#EE3040"/>
  <!-- 바이저 -->
  <rect x="9"  y="5" width="14" height="3" fill="#A0A8B8"/>
  <rect x="10" y="6" width="5"  height="1" fill="#C0D0E8"/>
  <rect x="17" y="6" width="5"  height="1" fill="#C0D0E8"/>
  <!-- 목 갑옷 -->
  <rect x="11" y="8" width="10" height="3" fill="#A0A8B8"/>
  <!-- ══ 목 ══ -->
  <rect x="14" y="11" width="4" height="2" fill="#FFEECC"/>
  <!-- ══ 템플러 갑옷 ══ -->
  <!-- 어깨 -->
  <rect x="5"  y="17" width="7"  height="6" fill="#B0B8C8"/>
  <rect x="20" y="17" width="7"  height="6" fill="#B0B8C8"/>
  <rect x="5"  y="17" width="7"  height="1" fill="#D0D8E8"/>
  <rect x="20" y="17" width="7"  height="1" fill="#D0D8E8"/>
  <rect x="5"  y="22" width="7"  height="1" fill="#CC0020"/>
  <rect x="20" y="22" width="7"  height="1" fill="#CC0020"/>
  <!-- 칼라 (붉은) -->
  <rect x="11" y="17" width="10" height="1" fill="#CC0020"/>
  <!-- 가슴 -->
  <rect x="9"  y="18" width="14" height="7" fill="#B0B8C8"/>
  <rect x="10" y="18" width="5"  height="3" fill="#C0C8D8"/>
  <!-- 붉은 십자 가슴 문양 -->
  <rect x="14" y="21" width="4"  height="4" fill="#CC0020"/>
  <rect x="12" y="22" width="8"  height="2" fill="#CC0020"/>
  <rect x="15" y="21" width="2"  height="4" fill="#FFFFFF"/>
  <rect x="14" y="22" width="4"  height="2" fill="#FFFFFF"/>
  <rect x="15" y="22" width="2"  height="2" fill="#CC0020"/>
  <!-- ══ 벨트 ══ -->
  <rect x="9"  y="25" width="14" height="2" fill="#888898"/>
  <rect x="9"  y="25" width="14" height="1" fill="#A0A8B8"/>
  <rect x="14" y="24" width="4"  height="3" fill="#CC0020"/>
  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="27" width="5" height="3" fill="#9090A0"/>
  <rect x="17" y="27" width="5" height="3" fill="#9090A0"/>
  <rect x="9"  y="30" width="6" height="2" fill="#808090"/>
  <rect x="9"  y="30" width="6" height="1" fill="#A0A8B8"/>
  <rect x="17" y="30" width="6" height="2" fill="#808090"/>
  <rect x="17" y="30" width="6" height="1" fill="#A0A8B8"/>
</svg>
