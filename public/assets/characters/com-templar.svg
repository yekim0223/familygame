<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 템플러 투구 (붉은 십자) -->
  <rect x="8"  y="1" width="16" height="5" fill="#C0C8D8"/>
  <rect x="7"  y="3" width="18" height="4" fill="#D0D8E8"/>
  <rect x="9"  y="1" width="14" height="1" fill="#E0E8F8"/>
