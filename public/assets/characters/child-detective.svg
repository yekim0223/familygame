<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- ══ DETECTIVE CAP (deerstalker) ══ -->
  <rect x="8"  y="2" width="16" height="3" fill="#8B7040"/>
  <rect x="7"  y="4" width="18" height="2" fill="#A08050"/>
  <rect x="8"  y="3" width="16" height="1" fill="#C0A060"/>
  <!-- cap brim front -->
  <rect x="6"  y="5" width="20" height="2" fill="#8B7040"/>
  <!-- cap brim back -->
  <rect x="9"  y="2" width="14" height="1" fill="#6B5020"/>
  <!-- cap earflaps -->
  <rect x="7"  y="6" width="3"  height="5" fill="#8B7040"/>
  <rect x="22" y="6" width="3"  height="5" fill="#8B7040"/>

  <!-- ══ HAIR (dark brown, peeking under cap) ══ -->
  <rect x="7"  y="7"  width="2" height="8" fill="#3A1C08"/>
  <rect x="23" y="7"  width="2" height="8" fill="#3A1C08"/>

  <!-- ══ FACE skin ══ -->
  <rect x="9"  y="6"  width="14" height="10" fill="#F5C17A"/>
  <rect x="10" y="16" width="12" height="1"  fill="#F5C17A"/>
  <rect x="11" y="17" width="10" height="1"  fill="#F5C17A"/>

  <!-- ══ EYEBROWS (focused, furrowed) ══ -->
  <rect x="10" y="7" width="5" height="1" fill="#2A1008"/>
  <rect x="17" y="7" width="5" height="1" fill="#2A1008"/>
  <!-- inner brow angle -->
  <rect x="14" y="7" width="1" height="1" fill="#1A0808"/>
  <rect x="17" y="7" width="1" height="1" fill="#1A0808"/>

  <!-- ══ EYES LEFT (sharp brown, observant) ══ -->
  <rect x="10" y="9" width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="9" width="5" height="3" fill="#604020"/>
  <rect x="10" y="9" width="5" height="1" fill="#906030"/>
  <rect x="14" y="9" width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ EYES RIGHT ══ -->
  <rect x="17" y="9" width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="9" width="5" height="3" fill="#604020"/>
  <rect x="17" y="9" width="5" height="1" fill="#906030"/>
  <rect x="17" y="9" width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ NOSE ══ -->
  <rect x="15" y="11" width="2" height="2" fill="#DDA055"/>

  <!-- ══ CHEEKS ══ -->
  <rect x="9"  y="12" width="3" height="1" fill="#F0A090"/>
  <rect x="20" y="12" width="3" height="1" fill="#F0A090"/>

  <!-- ══ MOUTH (investigator smirk) ══ -->
  <rect x="13" y="14" width="7" height="1" fill="#CC5533"/>
  <rect x="13" y="13" width="1" height="1" fill="#CC5533"/>
  <rect x="14" y="15" width="5" height="1" fill="#AA3311"/>

  <!-- ══ NECK ══ -->
  <rect x="14" y="18" width="4" height="2" fill="#F5C17A"/>

  <!-- ══ TRENCH COAT (tan) ══ -->
  <!-- collar up -->
  <rect x="10" y="18" width="12" height="3" fill="#C4A060"/>
  <rect x="10" y="18" width="12" height="1" fill="#E0C080"/>
  <!-- collar fold -->
  <rect x="10" y="19" width="4" height="2" fill="#A08040"/>
  <rect x="18" y="19" width="4" height="2" fill="#A08040"/>
  <!-- coat body -->
  <rect x="8"  y="21" width="16" height="7" fill="#C4A060"/>
  <rect x="9"  y="21" width="5"  height="3" fill="#D4B070"/>
  <!-- coat buttons -->
  <rect x="15" y="22" width="2" height="5" fill="#A08040"/>
  <rect x="15" y="23" width="2" height="1" fill="#8B7030"/>
  <rect x="15" y="25" width="2" height="1" fill="#8B7030"/>
  <!-- coat lapels -->
  <rect x="8"  y="21" width="3" height="5" fill="#A08040"/>
  <rect x="21" y="21" width="3" height="5" fill="#A08040"/>
  <!-- magnifying glass (right hand) -->
  <rect x="23" y="22" width="5" height="5" fill="none"/>
  <rect x="24" y="22" width="4" height="4" fill="#A0C8E8"/>
  <rect x="24" y="22" width="4" height="1" fill="#C0E0FF"/>
  <rect x="23" y="22" width="1" height="4" fill="#606060"/>
  <rect x="27" y="22" width="1" height="4" fill="#606060"/>
  <rect x="23" y="25" width="5" height="1" fill="#606060"/>
  <rect x="27" y="26" width="2" height="2" fill="#808080"/>

  <!-- ══ LEGS ══ -->
  <rect x="10" y="28" width="5" height="2" fill="#6A5030"/>
  <rect x="17" y="28" width="5" height="2" fill="#6A5030"/>

  <!-- ══ SHOES ══ -->
  <rect x="9"  y="30" width="6" height="2" fill="#2A1A08"/>
  <rect x="9"  y="30" width="6" height="1" fill="#4A3018"/>
  <rect x="17" y="30" width="6" height="2" fill="#2A1A08"/>
  <rect x="17" y="30" width="6" height="1" fill="#4A3018"/>
</svg>
