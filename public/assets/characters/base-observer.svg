<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- ══ EXPLORER HAT (tan, wide brim) ══ -->
  <rect x="10" y="1" width="12" height="4" fill="#A08040"/>
  <rect x="10" y="1" width="12" height="1" fill="#C0A060"/>
  <rect x="11" y="0" width="10" height="2" fill="#B09050"/>
  <!-- hat band (dark) -->
  <rect x="9"  y="4" width="14" height="2" fill="#604820"/>
  <!-- hat brim (wide) -->
  <rect x="5"  y="6" width="22" height="2" fill="#A08040"/>
  <rect x="5"  y="6" width="22" height="1" fill="#C0A060"/>
  <!-- hat dent -->
  <rect x="14" y="1" width="4"  height="1" fill="#907030"/>

  <!-- ══ HAIR (chestnut brown) ══ -->
  <rect x="8"  y="7" width="2"  height="9" fill="#5A3010"/>
  <rect x="22" y="7" width="2"  height="9" fill="#5A3010"/>
  <rect x="7"  y="9" width="2"  height="7" fill="#3A1808"/>
  <rect x="23" y="9" width="2"  height="7" fill="#3A1808"/>
  <rect x="8"  y="16" width="3" height="2" fill="#5A3010"/>
  <rect x="21" y="16" width="3" height="2" fill="#5A3010"/>

  <!-- ══ FACE ══ -->
  <rect x="9"  y="7"  width="14" height="10" fill="#E8A850"/>
  <rect x="10" y="17" width="12" height="1"  fill="#E8A850"/>
  <rect x="11" y="18" width="10" height="1"  fill="#E8A850"/>

  <!-- ══ EYEBROWS ══ -->
  <rect x="10" y="8" width="5" height="1" fill="#3A1808"/>
  <rect x="17" y="8" width="5" height="1" fill="#3A1808"/>

  <!-- ══ EYES (warm green, curious) ══ -->
  <rect x="10" y="10" width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="10" width="5" height="3" fill="#308028"/>
  <rect x="10" y="10" width="5" height="1" fill="#50B048"/>
  <rect x="14" y="10" width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="10" width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="10" width="5" height="3" fill="#308028"/>
  <rect x="17" y="10" width="5" height="1" fill="#50B048"/>
  <rect x="17" y="10" width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="9" width="1" height="1" fill="#FFFFFF"/>
  <rect x="19" y="9" width="3" height="1" fill="#FFFFFF"/>
  <rect x="17" y="13" width="2" height="1" fill="#58C048"/>

  <!-- ══ NOSE + CHEEKS + MOUTH ══ -->
  <rect x="15" y="12" width="2" height="2" fill="#C08030"/>
  <rect x="9"  y="13" width="3" height="1" fill="#D09060"/>
  <rect x="20" y="13" width="3" height="1" fill="#D09060"/>
  <rect x="12" y="15" width="8" height="1" fill="#AA5522"/>
  <rect x="11" y="14" width="1" height="1" fill="#AA5522"/>
  <rect x="20" y="14" width="1" height="1" fill="#AA5522"/>
  <rect x="13" y="16" width="6" height="1" fill="#883311"/>

  <!-- ══ NECK ══ -->
  <rect x="14" y="19" width="4" height="2" fill="#E8A850"/>

  <!-- ══ ADVENTURE JACKET (NO magnifying glass) ══ -->
  <rect x="9"  y="19" width="14" height="2" fill="#CC4010"/>
  <rect x="9"  y="19" width="14" height="1" fill="#EE6020"/>
  <!-- scarf tails (tucked, short) -->
  <rect x="9"  y="21" width="4"  height="3" fill="#CC4010"/>
  <!-- jacket body -->
  <rect x="8"  y="21" width="16" height="7" fill="#7A5030"/>
  <rect x="9"  y="21" width="5"  height="3" fill="#9A7050"/>
  <!-- pockets -->
  <rect x="9"  y="25" width="4"  height="3" fill="#6A4020"/>
  <rect x="19" y="25" width="4"  height="3" fill="#6A4020"/>
  <rect x="9"  y="25" width="4"  height="1" fill="#8A6040"/>
  <rect x="19" y="25" width="4"  height="1" fill="#8A6040"/>
  <!-- buttons -->
  <rect x="15" y="22" width="2"  height="5" fill="#5A3810"/>
  <rect x="15" y="23" width="2"  height="1" fill="#4A2808"/>
  <rect x="15" y="25" width="2"  height="1" fill="#4A2808"/>

  <!-- ══ BELT ══ -->
  <rect x="8"  y="28" width="16" height="2" fill="#4A3010"/>
  <rect x="8"  y="28" width="16" height="1" fill="#6A5030"/>
  <rect x="14" y="27" width="4"  height="3" fill="#C8A040"/>

  <!-- ══ ARMS (relaxed, empty hands) ══ -->
  <rect x="5"  y="21" width="4" height="8" fill="#7A5030"/>
  <rect x="23" y="21" width="4" height="8" fill="#7A5030"/>
  <!-- hands -->
  <rect x="4"  y="27" width="4" height="3" fill="#E8A850"/>
  <rect x="24" y="27" width="4" height="3" fill="#E8A850"/>

  <!-- ══ LEGS ══ -->
  <rect x="10" y="28" width="5" height="3" fill="#5A4020"/>
  <rect x="17" y="28" width="5" height="3" fill="#5A4020"/>

  <!-- ══ BOOTS ══ -->
  <rect x="9"  y="30" width="6" height="2" fill="#4A3010"/>
  <rect x="9"  y="30" width="6" height="1" fill="#6A5030"/>
  <rect x="17" y="30" width="6" height="2" fill="#4A3010"/>
  <rect x="17" y="30" width="6" height="1" fill="#6A5030"/>
</svg>
