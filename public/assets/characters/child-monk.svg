<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- ══ 머리 (짧은) ══ -->
  <rect x="9"  y="1" width="14" height="3" fill="#1A0A0A"/>
  <rect x="8"  y="2" width="16" height="2" fill="#2A1A1A"/>
  <rect x="7"  y="3" width="2"  height="7" fill="#1A0A0A"/>
  <rect x="23" y="3" width="2"  height="7" fill="#1A0A0A"/>
  <rect x="8"  y="10" width="3" height="1" fill="#1A0A0A"/>
  <rect x="21" y="10" width="3" height="1" fill="#1A0A0A"/>

  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="3"  width="14" height="8" fill="#E8A860"/>
  <rect x="10" y="11" width="12" height="1" fill="#E8A860"/>
  <rect x="11" y="12" width="10" height="1" fill="#E8A860"/>

  <!-- ══ 눈썹 (차분) ══ -->
  <rect x="11" y="4" width="4" height="1" fill="#5A2A0A"/>
  <rect x="17" y="4" width="4" height="1" fill="#5A2A0A"/>

  <!-- ══ 눈 (갈색, 평온) ══ -->
  <rect x="11" y="6" width="4" height="3" fill="#1A0828"/>
  <rect x="11" y="6" width="4" height="2" fill="#5A3010"/>
  <rect x="11" y="6" width="4" height="1" fill="#8A5020"/>
  <rect x="14" y="6" width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="6" width="4" height="3" fill="#1A0828"/>
  <rect x="17" y="6" width="4" height="2" fill="#5A3010"/>
  <rect x="17" y="6" width="4" height="1" fill="#8A5020"/>
  <rect x="17" y="6" width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ 코·입 (온화한 미소) ══ -->
  <rect x="15" y="8"  width="2" height="1" fill="#C08040"/>
  <rect x="13" y="10" width="6" height="1" fill="#CC7744"/>
  <rect x="14" y="11" width="4" height="1" fill="#AA5522"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="13" width="4" height="2" fill="#E8A860"/>

  <!-- ══ 승복 (오렌지) ══ -->
  <!-- 어깨 -->
  <rect x="7"  y="15" width="18" height="2" fill="#E87820"/>
  <rect x="7"  y="15" width="18" height="1" fill="#F09040"/>
  <!-- 가슴 -->
  <rect x="9"  y="17" width="14" height="8" fill="#E87820"/>
  <rect x="10" y="17" width="5"  height="3" fill="#F09040"/>
  <!-- 어깨띠 (한쪽) -->
  <rect x="9"  y="15" width="3"  height="10" fill="#C85A10"/>
  <!-- 승복 접힘 -->
  <rect x="12" y="17" width="8"  height="1" fill="#C85A10"/>
  <!-- 수련 기 (복부) -->
  <rect x="13" y="21" width="6"  height="4" fill="#C85A10"/>
  <rect x="14" y="21" width="4"  height="4" fill="#A84A08"/>
  <!-- 승복 옆 -->
  <rect x="7"  y="17" width="3"  height="9" fill="#D06A18"/>
  <rect x="22" y="17" width="3"  height="9" fill="#D06A18"/>

  <!-- ══ 허리띠 ══ -->
  <rect x="9"  y="25" width="14" height="2" fill="#8B4A10"/>
  <rect x="9"  y="25" width="14" height="1" fill="#C86A18"/>
  <rect x="14" y="24" width="4"  height="3" fill="#FFD700"/>

  <!-- ══ 다리·발 ══ -->
  <rect x="10" y="27" width="5" height="3" fill="#D06A18"/>
  <rect x="17" y="27" width="5" height="3" fill="#D06A18"/>
  <rect x="9"  y="30" width="6" height="2" fill="#8B4A10"/>
  <rect x="9"  y="30" width="6" height="1" fill="#C06818"/>
  <rect x="17" y="30" width="6" height="2" fill="#8B4A10"/>
  <rect x="17" y="30" width="6" height="1" fill="#C06818"/>
</svg>
