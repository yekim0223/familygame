<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 챔피언 — 투구+깃발 -->
  <rect x="8"  y="1" width="16" height="5" fill="#C87820"/>
  <rect x="7"  y="3" width="18" height="4" fill="#E89030"/>
  <rect x="9"  y="1" width="14" height="1" fill="#FFAA40"/>
  <!-- 깃발 -->
  <rect x="22" y="0" width="3"  height="8" fill="#CC0020"/>
  <rect x="22" y="0" width="3"  height="1" fill="#EE2040"/>
  <rect x="22" y="3" width="3"  height="2" fill="#FFFFFF"/>
  <!-- 투구 슬릿 -->
  <rect x="9"  y="5" width="14" height="3" fill="#A86010"/>
  <rect x="10" y="6" width="5"  height="1" fill="#FFD700"/>
  <rect x="17" y="6" width="5"  height="1" fill="#FFD700"/>
  <!-- 목 -->
  <rect x="11" y="8" width="10" height="3" fill="#A86010"/>
  <rect x="14" y="11" width="4" height="2" fill="#D09050"/>
