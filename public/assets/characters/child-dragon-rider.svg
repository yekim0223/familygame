<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 용기사 투구 (용 뿔) -->
  <rect x="8"  y="1" width="16" height="4" fill="#2A4020"/>
  <rect x="7"  y="3" width="18" height="3" fill="#3A5830"/>
  <!-- 뿔 -->
  <rect x="8"  y="0" width="3"  height="4" fill="#FFD700"/>
  <rect x="9"  y="0" width="2"  height="3" fill="#FFEE88"/>
  <rect x="21" y="0" width="3"  height="4" fill="#FFD700"/>
  <rect x="21" y="0" width="2"  height="3" fill="#FFEE88"/>
  <!-- 투구 바이저 -->
  <rect x="9"  y="4" width="14" height="5" fill="#1A3010"/>
  <rect x="9"  y="5" width="14" height="1" fill="#2A5020"/>
  <!-- 눈 슬릿 (불꽃) -->
  <rect x="10" y="5" width="5"  height="1" fill="#FF4400"/>
  <rect x="17" y="5" width="5"  height="1" fill="#FF4400"/>
  <rect x="11" y="5" width="3"  height="1" fill="#FF8800"/>
  <rect x="18" y="5" width="3"  height="1" fill="#FF8800"/>
  <!-- 목 갑옷 -->
  <rect x="11" y="9" width="10" height="3" fill="#2A5020"/>
  <rect x="12" y="10" width="8" height="1" fill="#3A7030"/>

  <!-- ══ 머리 ══ -->
  <rect x="7"  y="5" width="2"  height="4" fill="#2A4020"/>
  <rect x="23" y="5" width="2"  height="4" fill="#2A4020"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="12" width="4" height="2" fill="#D89050"/>

  <!-- ══ 용기사 갑옷 (녹색 비늘) ══ -->
  <!-- 어깨 (큰) -->
  <rect x="4"  y="17" width="8"  height="6" fill="#3A6028"/>
  <rect x="20" y="17" width="8"  height="6" fill="#3A6028"/>
  <rect x="4"  y="17" width="8"  height="1" fill="#5A8840"/>
  <rect x="20" y="17" width="8"  height="1" fill="#5A8840"/>
  <!-- 어깨 비늘 무늬 -->
  <rect x="5"  y="19" width="2"  height="2" fill="#4A8030"/>
  <rect x="8"  y="20" width="2"  height="2" fill="#2A5020"/>
  <rect x="22" y="19" width="2"  height="2" fill="#4A8030"/>
  <rect x="25" y="20" width="2"  height="2" fill="#2A5020"/>
  <!-- 금 테두리 -->
  <rect x="4"  y="22" width="8"  height="1" fill="#FFD700"/>
  <rect x="20" y="22" width="8"  height="1" fill="#FFD700"/>
  <rect x="11" y="17" width="1"  height="1" fill="#FFD700"/>
  <rect x="20" y="17" width="1"  height="1" fill="#FFD700"/>
  <!-- 칼라 -->
  <rect x="10" y="17" width="12" height="1" fill="#FFD700"/>
  <!-- 가슴 -->
  <rect x="9"  y="18" width="14" height="7" fill="#3A6028"/>
  <rect x="10" y="18" width="5"  height="3" fill="#5A8840"/>
  <!-- 용 문양 (가슴) -->
  <rect x="13" y="21" width="6"  height="4" fill="#FFD700"/>
  <rect x="12" y="22" width="8"  height="2" fill="#FFD700"/>
  <rect x="14" y="21" width="4"  height="1" fill="#FFEE88"/>

  <!-- ══ 벨트 ══ -->
  <rect x="9"  y="25" width="14" height="2" fill="#2A4020"/>
  <rect x="9"  y="25" width="14" height="1" fill="#4A7030"/>
  <rect x="14" y="24" width="4"  height="3" fill="#FFD700"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="27" width="5" height="3" fill="#2A4020"/>
  <rect x="17" y="27" width="5" height="3" fill="#2A4020"/>
  <rect x="9"  y="30" width="6" height="2" fill="#3A5028"/>
  <rect x="9"  y="30" width="6" height="1" fill="#5A8040"/>
  <rect x="17" y="30" width="6" height="2" fill="#3A5028"/>
  <rect x="17" y="30" width="6" height="1" fill="#5A8040"/>
</svg>
