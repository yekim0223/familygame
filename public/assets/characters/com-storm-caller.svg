  <rect x="5"  y="19" width="4"  height="9" fill="#506080"/>
  <rect x="23" y="19" width="4"  height="9" fill="#506080"/>
  <!-- 다리·부츠 -->
  <rect x="10" y="27" width="5" height="3" fill="#2A3848"/>
  <rect x="17" y="27" width="5" height="3" fill="#2A3848"/>
  <rect x="9"  y="30" width="6" height="2" fill="#364858"/>
  <rect x="9"  y="30" width="6" height="1" fill="#60A0D0"/>
  <rect x="17" y="30" width="6" height="2" fill="#364858"/>
  <rect x="17" y="30" width="6" height="1" fill="#60A0D0"/>
</svg>
