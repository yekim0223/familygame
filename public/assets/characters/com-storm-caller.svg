<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 폭풍술사 — 구름+번개 머리 -->
  <rect x="9"  y="1" width="14" height="3" fill="#506080"/>
  <rect x="8"  y="2" width="16" height="3" fill="#6070888"/>
  <rect x="7"  y="4" width="2"  height="8" fill="#506080"/>
  <rect x="23" y="4" width="2"  height="8" fill="#506080"/>
  <!-- 번개 스파이크 -->
  <rect x="11" y="0" width="2"  height="3" fill="#FFD700"/>
  <rect x="19" y="0" width="2"  height="3" fill="#FFD700"/>
  <rect x="8"  y="12" width="3" height="2" fill="#506080"/>
  <rect x="21" y="12" width="3" height="2" fill="#506080"/>
  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="4"  width="14" height="9" fill="#D0C8D8"/>
  <rect x="10" y="13" width="12" height="1" fill="#D0C8D8"/>
  <rect x="11" y="14" width="10" height="1" fill="#D0C8D8"/>
  <!-- 눈썹·눈 -->
  <rect x="10" y="5"  width="5" height="1" fill="#304050"/>
  <rect x="17" y="5"  width="5" height="1" fill="#304050"/>
  <rect x="10" y="7"  width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="7"  width="5" height="3" fill="#2050708"/>
  <rect x="10" y="7"  width="5" height="1" fill="#60A0D0"/>
  <rect x="14" y="7"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="7"  width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="7"  width="5" height="3" fill="#205070"/>
  <rect x="17" y="7"  width="5" height="1" fill="#60A0D0"/>
  <rect x="17" y="7"  width="1" height="1" fill="#FFFFFF"/>
  <!-- 볼·입 -->
  <rect x="9"  y="10" width="3" height="1" fill="#B0B8C8"/>
  <rect x="20" y="10" width="3" height="1" fill="#B0B8C8"/>
  <rect x="13" y="11" width="6" height="1" fill="#7080A0"/>
  <!-- 목 -->
  <rect x="14" y="15" width="4" height="2" fill="#D0C8D8"/>
  <!-- ══ 폭풍 로브 ══ -->
  <rect x="9"  y="17" width="14" height="2" fill="#304060"/>
  <rect x="9"  y="17" width="14" height="1" fill="#5060808"/>
  <rect x="9"  y="19" width="14" height="8" fill="#2A3848"/>
  <rect x="8"  y="20" width="16" height="7" fill="#364858"/>
  <rect x="10" y="19" width="4"  height="3" fill="#465868"/>
  <!-- 구름+번개 문양 -->
  <rect x="11" y="23" width="10" height="2" fill="#9090A8"/>
  <rect x="13" y="21" width="6"  height="4" fill="#9090A8"/>
  <rect x="15" y="22" width="2"  height="5" fill="#FFD700"/>
  <rect x="14" y="25" width="4"  height="2" fill="#FFD700"/>
