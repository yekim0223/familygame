  <rect x="6"  y="25" width="3" height="5" fill="#6030A0"/>
  <rect x="23" y="25" width="3" height="5" fill="#6030A0"/>
  <!-- hands -->
  <rect x="5"  y="28" width="3" height="2" fill="#FFDDAA"/>
  <rect x="24" y="28" width="3" height="2" fill="#FFDDAA"/>

  <!-- ══ FAIRY LEGS (light lavender stockings) ══ -->
  <rect x="11" y="29" width="4" height="1" fill="#E8D0FF"/>
  <rect x="17" y="29" width="4" height="1" fill="#E8D0FF"/>

  <!-- ══ FAIRY SHOES (sparkly purple) ══ -->
  <rect x="10" y="30" width="5" height="2" fill="#C060F0"/>
  <rect x="10" y="30" width="5" height="1" fill="#E090FF"/>
  <rect x="17" y="30" width="5" height="2" fill="#C060F0"/>
  <rect x="17" y="30" width="5" height="1" fill="#E090FF"/>
