  <rect x="14" y="23" width="4" height="2" fill="#FFDDAA"/>

  <!-- ══ FAIRY DRESS ══ -->
  <rect x="10" y="23" width="12" height="2" fill="#8840C0"/>
  <rect x="10" y="23" width="12" height="1" fill="#B070E8"/>
  <rect x="8"  y="25" width="16" height="2" fill="#9050D0"/>
  <rect x="8"  y="25" width="16" height="1" fill="#C090F0"/>
