  <rect x="11" y="4" width="1" height="1" fill="#C0C0FF"/>

  <!-- ══ HAIR (dark purple, flowing) ══ -->
  <rect x="7"  y="11" width="2" height="10" fill="#5A1090"/>
  <rect x="23" y="11" width="2" height="10" fill="#5A1090"/>
  <rect x="6"  y="13" width="2" height="9"  fill="#3A0060"/>
  <rect x="24" y="13" width="2" height="9"  fill="#3A0060"/>
  <rect x="7"  y="21" width="4" height="3"  fill="#5A1090"/>
  <rect x="21" y="21" width="4" height="3"  fill="#5A1090"/>

  <!-- ══ FACE ══ -->
  <rect x="9"  y="11" width="14" height="10" fill="#FFDDAA"/>
  <rect x="10" y="21" width="12" height="1"  fill="#FFDDAA"/>
  <rect x="11" y="22" width="10" height="1"  fill="#FFDDAA"/>

  <!-- ══ EYEBROWS ══ -->
  <rect x="10" y="12" width="4" height="1" fill="#3A0060"/>
  <rect x="18" y="12" width="4" height="1" fill="#3A0060"/>

  <!-- ══ EYES (mysterious purple) ══ -->
  <rect x="10" y="14" width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="14" width="5" height="3" fill="#7030B8"/>
  <rect x="10" y="14" width="5" height="1" fill="#B060F0"/>
  <rect x="14" y="14" width="1" height="1" fill="#FFFFFF"/>
  <rect x="9"  y="14" width="1" height="1" fill="#1A0828"/>
  <rect x="15" y="14" width="1" height="1" fill="#1A0828"/>
  <rect x="17" y="14" width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="14" width="5" height="3" fill="#7030B8"/>
  <rect x="17" y="14" width="5" height="1" fill="#B060F0"/>
  <rect x="17" y="14" width="1" height="1" fill="#FFFFFF"/>
  <rect x="16" y="14" width="1" height="1" fill="#1A0828"/>
  <rect x="22" y="14" width="1" height="1" fill="#1A0828"/>

