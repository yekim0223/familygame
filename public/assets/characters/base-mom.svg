<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- ══ WITCH HAT (tall, dark purple) ══ -->
  <rect x="15" y="0" width="2" height="1" fill="#2A0048"/>
  <rect x="14" y="1" width="4" height="1" fill="#3A0060"/>
  <rect x="13" y="2" width="6" height="1" fill="#3A0060"/>
  <rect x="12" y="3" width="8" height="1" fill="#4A1080"/>
  <rect x="11" y="4" width="10" height="1" fill="#4A1080"/>
