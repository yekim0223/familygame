  <rect x="15" y="17" width="2" height="1" fill="#EEB888"/>
  <rect x="9"  y="17" width="3" height="1" fill="#F0B0C0"/>
  <rect x="20" y="17" width="3" height="1" fill="#F0B0C0"/>
  <rect x="13" y="19" width="6" height="1" fill="#AA3355"/>
  <rect x="12" y="18" width="1" height="1" fill="#AA3355"/>
  <rect x="19" y="18" width="1" height="1" fill="#AA3355"/>

