  <rect x="15" y="28" width="1" height="1" fill="#FFFFFF"/>
  <rect x="20" y="27" width="1" height="1" fill="#FFFFFF"/>
  <rect x="12" y="26" width="1" height="1" fill="#FFD700"/>
  <rect x="19" y="26" width="1" height="1" fill="#FFD700"/>

