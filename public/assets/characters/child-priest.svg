<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- ══ 작은 성직자 모자 ══ -->
  <rect x="10" y="1" width="12" height="3" fill="#FFFFFF"/>
  <rect x="9"  y="2" width="14" height="2" fill="#EEEEEE"/>
  <rect x="10" y="1" width="12" height="1" fill="#FFFFFF"/>
  <!-- 십자 문양 -->
  <rect x="15" y="1" width="2" height="3" fill="#4040A0"/>
  <rect x="14" y="2" width="4" height="1" fill="#4040A0"/>

  <!-- ══ 머리 (연한 금발) ══ -->
  <rect x="8"  y="3" width="2"  height="9" fill="#D4C060"/>
  <rect x="22" y="3" width="2"  height="9" fill="#D4C060"/>
  <rect x="7"  y="5" width="2"  height="7" fill="#B8A040"/>
  <rect x="23" y="5" width="2"  height="7" fill="#B8A040"/>
  <rect x="8"  y="12" width="3" height="2" fill="#D4C060"/>
  <rect x="21" y="12" width="3" height="2" fill="#D4C060"/>

  <!-- ══ 얼굴 ══ -->
  <rect x="9"  y="3"  width="14" height="10" fill="#FFEECC"/>
  <rect x="10" y="13" width="12" height="1"  fill="#FFEECC"/>
  <rect x="11" y="14" width="10" height="1"  fill="#FFEECC"/>

  <!-- ══ 눈썹 ══ -->
  <rect x="10" y="4" width="5" height="1" fill="#9A8030"/>
  <rect x="17" y="4" width="5" height="1" fill="#9A8030"/>

  <!-- ══ 눈 (파랑, 온화) ══ -->
  <rect x="10" y="6" width="5" height="4" fill="#1A0828"/>
  <rect x="10" y="6" width="5" height="3" fill="#2050A8"/>
  <rect x="10" y="6" width="5" height="1" fill="#4080E0"/>
  <rect x="14" y="6" width="1" height="1" fill="#FFFFFF"/>
  <rect x="17" y="6" width="5" height="4" fill="#1A0828"/>
  <rect x="17" y="6" width="5" height="3" fill="#2050A8"/>
  <rect x="17" y="6" width="5" height="1" fill="#4080E0"/>
  <rect x="17" y="6" width="1" height="1" fill="#FFFFFF"/>

  <!-- ══ 볼·입 ══ -->
  <rect x="9"  y="9"  width="3" height="1" fill="#FFB0C0"/>
  <rect x="20" y="9"  width="3" height="1" fill="#FFB0C0"/>
  <rect x="13" y="11" width="6" height="1" fill="#CC8888"/>
  <rect x="14" y="12" width="4" height="1" fill="#AA6666"/>

  <!-- ══ 목 ══ -->
  <rect x="14" y="15" width="4" height="2" fill="#FFEECC"/>

  <!-- ══ 흰 사제복 ══ -->
  <!-- 칼라 -->
  <rect x="10" y="15" width="12" height="3" fill="#FFFFFF"/>
  <rect x="10" y="15" width="12" height="1" fill="#EEEEEE"/>
  <!-- 어깨 -->
  <rect x="7"  y="17" width="5"  height="5" fill="#EEEEEE"/>
  <rect x="20" y="17" width="5"  height="5" fill="#EEEEEE"/>
  <rect x="7"  y="17" width="5"  height="1" fill="#FFFFFF"/>
  <rect x="20" y="17" width="5"  height="1" fill="#FFFFFF"/>
  <rect x="7"  y="21" width="5"  height="1" fill="#CCCCCC"/>
  <rect x="20" y="21" width="5"  height="1" fill="#CCCCCC"/>
  <!-- 가슴 -->
  <rect x="9"  y="18" width="14" height="7" fill="#F0F0F0"/>
  <rect x="10" y="18" width="5"  height="3" fill="#FFFFFF"/>
  <!-- 십자 가슴 문양 -->
  <rect x="14" y="20" width="4"  height="5" fill="#4040A0"/>
  <rect x="12" y="22" width="8"  height="2" fill="#4040A0"/>
  <rect x="14" y="20" width="4"  height="1" fill="#6060C0"/>
  <!-- 성배 장식 -->
  <rect x="21" y="20" width="3"  height="4" fill="#FFD700"/>
  <rect x="21" y="23" width="3"  height="1" fill="#C8A000"/>

  <!-- ══ 벨트 ══ -->
  <rect x="9"  y="25" width="14" height="2" fill="#CCCCCC"/>
  <rect x="9"  y="25" width="14" height="1" fill="#FFFFFF"/>
  <rect x="14" y="24" width="4"  height="3" fill="#FFD700"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="27" width="5" height="3" fill="#D0D0D0"/>
  <rect x="17" y="27" width="5" height="3" fill="#D0D0D0"/>
  <rect x="9"  y="30" width="6" height="2" fill="#888888"/>
  <rect x="9"  y="30" width="6" height="1" fill="#AAAAAA"/>
  <rect x="17" y="30" width="6" height="2" fill="#888888"/>
  <rect x="17" y="30" width="6" height="1" fill="#AAAAAA"/>
</svg>
