<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated;image-rendering:crisp-edges">
  <!-- 신탁사 — 황금 투구 + 눈 문양 -->
  <rect x="8"  y="1" width="16" height="5" fill="#C8A000"/>
  <rect x="7"  y="3" width="18" height="4" fill="#E8C020"/>
  <!-- 투구 눈 -->
  <rect x="13" y="2" width="6"  height="3" fill="#FFD700"/>
  <rect x="14" y="2" width="4"  height="2" fill="#FFEE88"/>
  <rect x="15" y="2" width="2"  height="1" fill="#1A0808"/>
  <!-- 바이저 -->
  <rect x="9"  y="5" width="14" height="3" fill="#A08000"/>
  <rect x="10" y="6" width="5"  height="1" fill="#FFD700"/>
  <rect x="17" y="6" width="5"  height="1" fill="#FFD700"/>
  <!-- 목 -->
  <rect x="11" y="8" width="10" height="3" fill="#A08000"/>
  <rect x="14" y="11" width="4" height="2" fill="#EEDDCC"/>
  <!-- ══ 신탁사 갑옷 (금) ══ -->
  <rect x="5"  y="17" width="7"  height="6" fill="#C8A000"/>
  <rect x="20" y="17" width="7"  height="6" fill="#C8A000"/>
  <rect x="5"  y="17" width="7"  height="1" fill="#FFD700"/>
  <rect x="20" y="17" width="7"  height="1" fill="#FFD700"/>
  <rect x="5"  y="22" width="7"  height="1" fill="#806800"/>
  <rect x="20" y="22" width="7"  height="1" fill="#806800"/>
  <rect x="11" y="17" width="10" height="1" fill="#FFD700"/>
  <rect x="9"  y="18" width="14" height="7" fill="#A08000"/>
  <rect x="10" y="18" width="5"  height="3" fill="#C0A020"/>
  <!-- 눈 3개 문양 -->
  <rect x="12" y="21" width="3"  height="3" fill="#FFD700"/>
  <rect x="12" y="21" width="3"  height="2" fill="#C8A000"/>
  <rect x="13" y="21" width="1"  height="1" fill="#1A0808"/>
  <rect x="16" y="21" width="3"  height="3" fill="#FFD700"/>
  <rect x="16" y="21" width="3"  height="2" fill="#C8A000"/>
  <rect x="17" y="21" width="1"  height="1" fill="#1A0808"/>
  <rect x="20" y="21" width="3"  height="3" fill="#FFD700"/>
  <rect x="20" y="21" width="3"  height="2" fill="#C8A000"/>
  <rect x="21" y="21" width="1"  height="1" fill="#1A0808"/>
  <!-- ══ 벨트·다리·부츠 ══ -->
  <rect x="9"  y="25" width="14" height="2" fill="#806800"/>
  <rect x="9"  y="25" width="14" height="1" fill="#C8A000"/>
  <rect x="10" y="27" width="5"  height="3" fill="#706000"/>
  <rect x="17" y="27" width="5"  height="3" fill="#706000"/>
  <rect x="9"  y="30" width="6"  height="2" fill="#A08000"/>
  <rect x="9"  y="30" width="6"  height="1" fill="#C8A000"/>
  <rect x="17" y="30" width="6"  height="2" fill="#A08000"/>
  <rect x="17" y="30" width="6"  height="1" fill="#C8A000"/>
</svg>
