  <rect x="5"  y="23" width="22" height="1"  fill="#FFD700"/>
  <!-- 성십자 -->
  <rect x="14" y="20" width="4"  height="8"  fill="#FFD700"/>
  <rect x="11" y="22" width="10" height="3"  fill="#FFD700"/>
  <rect x="15" y="21" width="2"  height="7"  fill="#FFEE88"/>
  <rect x="12" y="23" width="8"  height="1"  fill="#FFEE88"/>
