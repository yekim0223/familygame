  <rect x="10" y="7"  width="5"  height="1"  fill="#331508"/>
  <rect x="18" y="7"  width="5"  height="1"  fill="#331508"/>
  <!-- 미소 -->
  <rect x="12" y="13" width="8"  height="2"  fill="#CC7788"/>
  <rect x="13" y="14" width="6"  height="1"  fill="#FFAACC"/>
  <!-- 볼 홍조 -->
  <rect x="9"  y="12" width="3"  height="2"  fill="#FFB0D8"/>
  <rect x="21" y="12" width="3"  height="2"  fill="#FFB0D8"/>
