  <rect x="24" y="4"  width="3"  height="7"  fill="#220E04"/>
  <rect x="24" y="3"  width="5"  height="7"  fill="#2A1006"/>
  <rect x="26" y="4"  width="4"  height="5"  fill="#3A1A0A"/>
  <!-- 얼굴 -->
  <rect x="8"  y="6"  width="16" height="11" fill="#FFDDC8"/>
  <!-- 눈 (따뜻한 보라) -->
  <rect x="10" y="8"  width="5"  height="4"  fill="#FFFFFF"/>
