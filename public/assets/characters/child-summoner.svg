  <rect x="7"  y="21" width="3"  height="7" fill="#3A1060"/>
  <rect x="22" y="21" width="3"  height="7" fill="#3A1060"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="28" width="5" height="2" fill="#2A0848"/>
  <rect x="17" y="28" width="5" height="2" fill="#2A0848"/>
  <rect x="9"  y="30" width="6" height="2" fill="#3A1060"/>
