  <rect x="13" y="18" width="2"  height="7" fill="#6B4A18"/>
  <rect x="17" y="18" width="2"  height="7" fill="#6B4A18"/>

  <!-- ══ 벨트 ══ -->
  <rect x="9"  y="25" width="14" height="2" fill="#4A6840"/>
  <rect x="9"  y="25" width="14" height="1" fill="#5A8050"/>
  <rect x="14" y="24" width="4"  height="3" fill="#C0D8C0"/>

  <!-- ══ 다리·부츠 ══ -->
  <rect x="10" y="27" width="5" height="3" fill="#2A4830"/>
  <rect x="17" y="27" width="5" height="3" fill="#2A4830"/>
  <rect x="9"  y="30" width="6" height="2" fill="#3A5840"/>
  <rect x="9"  y="30" width="6" height="1" fill="#5A7858"/>
  <rect x="17" y="30" width="6" height="2" fill="#3A5840"/>
  <rect x="17" y="30" width="6" height="1" fill="#5A7858"/>
</svg>
