<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated">
  <!-- 아빠 — 전술가 + 길드마스터 (전략과 보호의 아이콘) -->

  <!-- 헤어 (단정한 다크브라운, 옆가리마) -->
  <rect x="9"  y="0"  width="14" height="2"  fill="#1A0E04"/>
  <rect x="7"  y="2"  width="18" height="4"  fill="#2A1A08"/>
  <rect x="5"  y="3"  width="3"  height="6"  fill="#1A0E04"/>
  <rect x="24" y="3"  width="3"  height="6"  fill="#1A0E04"/>
  <!-- 옆가리마 -->
  <rect x="9"  y="2"  width="5"  height="1"  fill="#1A0E04"/>

  <!-- 얼굴 -->
  <rect x="8"  y="5"  width="16" height="12" fill="#F0B870"/>

  <!-- 안경 (남색 프레임 — 지성) -->
  <rect x="9"  y="8"  width="6"  height="1"  fill="#334488"/>
  <rect x="9"  y="11" width="6"  height="1"  fill="#334488"/>
  <rect x="9"  y="8"  width="1"  height="4"  fill="#334488"/>
  <rect x="14" y="8"  width="1"  height="4"  fill="#334488"/>
  <rect x="18" y="8"  width="6"  height="1"  fill="#334488"/>
  <rect x="18" y="11" width="6"  height="1"  fill="#334488"/>
  <rect x="18" y="8"  width="1"  height="4"  fill="#334488"/>
  <rect x="23" y="8"  width="1"  height="4"  fill="#334488"/>
  <rect x="15" y="9"  width="3"  height="1"  fill="#334488"/>

  <!-- 눈동자 (다크 블루 — 전략가의 예리함) -->
  <rect x="10" y="9"  width="3"  height="2"  fill="#1A3A88"/>
  <rect x="19" y="9"  width="3"  height="2"  fill="#1A3A88"/>
  <rect x="12" y="9"  width="1"  height="1"  fill="#FFFFFF"/>
  <rect x="21" y="9"  width="1"  height="1"  fill="#FFFFFF"/>

  <!-- 수염 (중후함) -->
  <rect x="10" y="14" width="12" height="1"  fill="#4A3010"/>
  <rect x="11" y="15" width="3"  height="1"  fill="#4A3010"/>
  <rect x="18" y="15" width="3"  height="1"  fill="#4A3010"/>

  <!-- 자신감 있는 입 -->
  <rect x="12" y="13" width="8"  height="2"  fill="#CC7744"/>
  <rect x="13" y="14" width="6"  height="1"  fill="#AA5522"/>

  <!-- 목 -->
  <rect x="13" y="17" width="6"  height="2"  fill="#F0B870"/>

  <!-- 길드마스터 다크 코트 -->
  <rect x="4"  y="19" width="24" height="13" fill="#1A1828"/>
  <rect x="4"  y="19" width="24" height="2"  fill="#252238"/>
  <!-- 골드 어깨라인 -->
  <rect x="4"  y="19" width="5"  height="1"  fill="#FFD700"/>
  <rect x="23" y="19" width="5"  height="1"  fill="#FFD700"/>
  <!-- 화이트 셔츠 라펠 -->
  <rect x="12" y="19" width="8"  height="13" fill="#1A1828"/>
  <rect x="13" y="19" width="3"  height="5"  fill="#F0F0FF"/>
  <rect x="16" y="19" width="3"  height="5"  fill="#F0F0FF"/>
  <!-- 타이 (골드) -->
  <rect x="15" y="19" width="2"  height="13" fill="#FFD700"/>
  <rect x="15" y="22" width="2"  height="3"  fill="#CC9900"/>
  <!-- 길드 코인 마크 -->
  <rect x="8"  y="23" width="5"  height="5"  fill="#FFD700"/>
  <rect x="9"  y="24" width="3"  height="3"  fill="#FFEE88"/>
  <rect x="10" y="25" width="1"  height="1"  fill="#FFD700"/>
</svg>
