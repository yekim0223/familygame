  <rect x="23" y="19" width="3" height="8" fill="#1A30C0"/>
  <!-- hands open -->
  <rect x="5"  y="26" width="4" height="3" fill="#F0B870"/>
  <rect x="23" y="26" width="4" height="3" fill="#F0B870"/>

  <!-- ══ LEGS ══ -->
  <rect x="10" y="26" width="5" height="4" fill="#1A30C0"/>
  <rect x="17" y="26" width="5" height="4" fill="#1A30C0"/>

  <!-- ══ BOOTS ══ -->
  <rect x="9"  y="30" width="6" height="2" fill="#AA0010"/>
  <rect x="9"  y="30" width="6" height="1" fill="#CC2020"/>
  <rect x="17" y="30" width="6" height="2" fill="#AA0010"/>
  <rect x="17" y="30" width="6" height="1" fill="#CC2020"/>
